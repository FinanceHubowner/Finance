        +sec('CFF TARKIBI')


        +tbl([


          {l:'🏦 Bank kreditlari (kirdi)',s:'Yangi kreditlar olindi',v:fin_loans_in,fn:"_dgo('cff_loans')"},


          {l:'💎 Dividendlar (chiqdi)',s:'Ta\'sischilarga to\'lov',v:fin_div_paid,fn:"_dgo('cff_div')"},


          {l:'🏢 Holding xarajatlari',s:'Boshqaruv xarajatlari',v:fin_exp,fn:"_dgo('cff_exp')"},


          {l:'CFF JAMI',v:cff,bold:true},


        ])},


      net:{t:'🔄 Net Change in Cash',h:sumC(net_change,'Sof Naqd O\'zgarish','CFO + CFI + CFF')


        +tbl([


          {l:'🟢 CFO · Operatsion',v:cfo,fn:"_dgo('cfo')"},


          {l:'🔵 CFI · Investitsiya',v:cfi,fn:"_dgo('cfi')"},


          {l:'🟣 CFF · Moliyaviy',v:cff,fn:"_dgo('cff')"},


          {l:'= Net Change',v:net_change,bold:true},


        ])},


      end:{t:'💰 Ending Cash Balance',h:sumC(end_cash,'Yakuniy Kassa Balansi','Davr oxiri naqd pul','#00E5A0')


        +sec('HISOB-KITOB')


        +tbl([


          {l:'Davr boshi balansi',v:begin_cash,c:'var(--t2)',nosign:true},


          {l:'+ Net Change',v:net_change},


          {l:'= Davr oxiri balansi',v:end_cash,bold:true,nosign:true,c:'#00E5A0'},


        ])


        +note('Chinwakil kassa + Yo\'nalishlar bank hisoblari. IAS 7 ta\'rifi bo\'yicha naqd pul va ekvivalentlari.')},


      cfo_net:{t:'Net Income · Yo\'nalishlar',h:sumC(op_revenue+op_cogs+op_opex,'Op. Net Income','Tushum − Tannarx − Xarajat')+tbl(dirCFRows())},


      cfo_da:{t:'Amortizatsiya (D&A)',h:sumC(op_da,'Amortizatsiya add-back','Non-cash xarajat')


        +note('Amortizatsiya P&L da xarajat sifatida hisoblanadi lekin naqd pul chiqmaydi. Shuning uchun CFO ga qayta qo\'shiladi (indirect method, IAS 7).')},


      cfo_ar:_DRL.cfo_ar,cfo_inv:_DRL.cfo_inv,cfo_ap:_DRL.cfo_ap,


      cfo_tax:{t:'To\'langan Soliq',h:sumC(op_tax_paid,'Soliq to\'lovlari','Income tax paid cash basis')


        +tbl([


          {l:'📦 Cargo soliq ulushi',v:-Math.round(Math.abs(op_tax_paid)*0.35)},


          {l:'🚛 Logistics soliq ulushi',v:-Math.round(Math.abs(op_tax_paid)*0.30)},


          {l:'💱 Exchange soliq ulushi',v:-Math.round(Math.abs(op_tax_paid)*0.20)},


          {l:'🏭 Procurement soliq ulushi',v:-Math.round(Math.abs(op_tax_paid)*0.15)},


          {l:'Jami',v:op_tax_paid,bold:true},


        ])},


      cfi_capex:_DRL.cfi_capex,cfi_loans:_DRL.cfi_loans,cfi_rcv:_DRL.cfi_rcv,


      cff_loans:_DRL.cff_loans,cff_div:_DRL.cff_div,cff_exp:_DRL.cff_exp,


    };





    // pages ni ham _DRL ga saqlash (net → cfo/cfi/cff drill uchun)


    Object.keys(pages).forEach(function(k){ _DRL[k]=pages[k]; });





    var pg=pages[key];


    if(pg) drillOpen(pg);


  };


}

function renderBalance(){


  const el=document.getElementById('pg-l1');el.classList.add('on');


  setBc([{lbl:'Holding',fn:'goNav("l1")'},{lbl:'Balance Sheet',fn:''}]);





  const c=fil('cargo'),l=fil('logistics'),e=fil('exchange'),p=fil('procurement'),h=fil('holding');


  const rev=sk(c,'revenue')+sk(l,'revenue')+sk(e,'spread')+sk(p,'commission');


  const netIncome=sk(c,'margin')+sk(l,'margin')+sk(e,'net')+sk(p,'net');





  // ── IFRS Balance Sheet — HAQIQIY MA'LUMOTLAR ──────────────


  // ASSETS — ✅ CFO: AR/AP endi DC_DATA dan olinadi (formula emas)





  // Naqd va bank mablag'lari: Chinwakil + kassa balanslar


  const kassaTotalUSD = (function(){


    var total=0;


    ensureKassaData();


    DIRS.forEach(function(d){


      var kas=KASSA_DATA[d.id]||{};


      KTYPES.forEach(function(tp){


        total += (kas['USD_'+tp]||{}).balance||0;


        total += ((kas['RMB_'+tp]||{}).balance||0) / (OB.fx_rate_rmb||7.1);


        total += ((kas['UZS_'+tp]||{}).balance||0) / (OB.fx_rate_uzs||12700);


      });


    });


    return Math.round(total);


  })();


  const ca_cash      = EHSON_DATA.chinwakil_balance + kassaTotalUSD;





  // ✅ CFO: AR = DC_DATA debitorlardan haqiqiy qolgan qarz (rev×12% EMAS)


  const ca_ar        = DC_DATA.debitor.reduce(function(s,r){return s+(r.amount-r.paid);},0);





  // ✅ IAS 2: Inventar — real TXNS dan hisoblanadi (taxmin EMAS)


  // Inventar kirimi (+) va COGS Release (-) farqi = real inventar qoldig'i


  const invIn  = TXNS.filter(function(t){ return t.type==='inventory' && t.status!=='Bekor'; })


                      .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  const invOut = TXNS.filter(function(t){ return t.type==='inventory_release' && t.status!=='Bekor'; })


                      .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  // OB.inventory_ob = Boshlang'ich inventar qoldig'i (OB sozlamalarida kiritiladi)


  const ca_inventory = Math.max(0, (OB.inventory_ob||0) + invIn - invOut);





  // ── Inventar breakdown — mijoz / yo'nalish bo'yicha (drill-down uchun)


  const invByClient = (function(){


    var map={};


    TXNS.filter(function(t){return t.type==='inventory'&&t.status!=='Bekor';}).forEach(function(t){


      var cl = t.counterparty||'Noma\'lum';


      if(!map[cl]) map[cl]={in_:0, out_:0, dir:t.direction||'cargo', ref:t.note||t.purpose||''};


      map[cl].in_ += Math.abs(+(t.amount)||0);


    });


    TXNS.filter(function(t){return t.type==='inventory_release'&&t.status!=='Bekor';}).forEach(function(t){


      var cl = t.counterparty||'Noma\'lum';


      if(!map[cl]) map[cl]={in_:0, out_:0, dir:t.direction||'cargo', ref:''};


      map[cl].out_ += Math.abs(+(t.amount)||0);


    });


    return Object.keys(map).map(function(cl){


      return {client:cl, balance:Math.max(0,map[cl].in_-map[cl].out_), dir:map[cl].dir, ref:map[cl].ref};


    }).filter(function(x){return x.balance>0;}).sort(function(a,b){return b.balance-a.balance;});


  })();





  const ca_prepaid   = Math.round(rev*0.015); // kichik qoldiq


  const total_ca     = ca_cash+ca_ar+ca_inventory+ca_prepaid;





  // ✅ CFO: NCA — Boshlang'ich balansdan olinadi (rev×% emas)


  // ✅ CapEx tranzaksiyalar NCA ga qo'shiladi (IAS 16: aktivlashtirish)


  const capexAdded   = TXNS.filter(function(t){ return (t.is_capex||t.type==='capex') && t.status!=='Bekor'; })


                           .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  const capexIntang  = TXNS.filter(function(t){ return (t.is_capex||t.type==='capex') && t.status!=='Bekor' && t.coa_code==='22'; })


                           .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  // ✅ Loan-in tranzaksiyalar NCL ga qo'shiladi


  const loanInAdded  = TXNS.filter(function(t){ return (t.is_loan_in||t.type==='loan_in') && t.status!=='Bekor'; })


                           .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  const nca_ppe      = OB.ppe_net + (capexAdded - capexIntang); // OB + kiritilgan CapEx (21)


  const nca_intang   = OB.intangibles_net + capexIntang;         // OB + nomoddiy (22)


  const nca_invest   = OB.lt_investments + sk(h,'tr_out'); // Uzoq muddatli inv.


  const nca_other    = 0;


  const total_nca    = nca_ppe+nca_intang+nca_invest+nca_other;


  const total_assets = total_ca+total_nca;





  // LIABILITIES


  // ✅ CFO: AP = DC_DATA kreditorlardan (savdo qarzlari ONLY, bank kreditlari EMAS)


  const cl_ap        = DC_DATA.kreditor.reduce(function(s,r){return s+(r.amount-r.paid);},0);





  // Short-term bank loans: holding loan_in ning joriy yil qismi


  const cl_loans_st  = Math.round(OB.lt_loans_payable * 0.20); // 20% joriy yil to'lovi





  // ✅ CFO: To'lanmagan maosh


  const cl_accrued   = Math.round(PAYROLL.reduce(function(s,e){return s+prCalc(e).gross;},0));





  // ✅ CFO: Tax = netIncome × 12% (Soliq majburiyati)


  const cl_tax       = Math.max(0, Math.round(netIncome*0.12));


  const total_cl     = cl_ap+cl_loans_st+cl_accrued+cl_tax;





  // ✅ CFO: NCL — bank kreditlari OB dan olinadi (kreditor jadvali EMAS)


  // ✅ NCL: OB kreditlari + kiritilgan loan_in tranzaksiyalar (IAS 7)


  const ncl_loans_lt = Math.max(0, OB.lt_loans_payable + loanInAdded - cl_loans_st);


  const ncl_deferred = 0; // deferred tax — soddalashtirilgan


  const total_ncl    = ncl_loans_lt+ncl_deferred;


  const total_liab   = total_cl+total_ncl;





  // EQUITY — ✅ CFO: To'langan kapital va taqsimsiz foyda OB dan


  const eq_paid_in   = OB.paid_in_capital;


  const eq_retained  = OB.retained_prior;   // Oldingi yillar taqsimsiz foydasi


  const eq_current   = netIncome;            // Joriy davr sof foydasi


  const eq_ehson_fund= EHSON_DATA.payments.reduce(function(s,p){return s+p.amount;},0);


  const total_equity = eq_paid_in+eq_retained+eq_current-eq_ehson_fund;


  const total_le     = total_liab+total_equity;





  const balanced = Math.abs(total_assets-total_le)<500;


  const diff = total_assets - total_le;





  function bsRow(indent,label,val,isBold,key,note){


    const col=isBold?'var(--t1)':'var(--t3)';


    const bg=isBold?'background:rgba(255,255,255,0.03);border-top:1px solid var(--b2)':'';


    return `<tr class="${key?'cr':''}" style="${bg};cursor:${key?'pointer':'default'}" ${key?`onclick="bsDetail('${key}')"`:''}


      onmouseenter="${key?"this.style.background='rgba(108,142,255,0.05)'":''}"


      onmouseleave="${key?"this.style.background=''":""}">


      <td style="padding:4px 10px;font-size:11px;${isBold?'font-weight:700':'color:var(--t3)'}">


        ${'&nbsp;'.repeat(indent*3)}${label}${key?'<span style="font-size:9px;color:#6C8EFF;margin-left:5px">⤵</span>':''}


        ${note?`<div style="font-size:9px;color:var(--t3);margin-top:1px">${note}</div>`:''}


      </td>


      <td style="text-align:right;font-family:var(--mono);font-size:11px;padding:4px 10px;${isBold?'font-weight:700':''}color:${col}">


        ${val!==null?'$'+fmt(val):''}


      </td>


    </tr>`;


  }





  el.innerHTML=`


  <!-- KPI Summary -->


  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">


    ${[


      {l:'Jami Aktivlar',v:total_assets,c:'#00E5A0',key:'ta'},


      {l:'Jami Majburiyatlar',v:total_liab,c:'#FF4D6A',key:'tl'},


      {l:'Kapital (Equity)',v:total_equity,c:'#6C8EFF',key:'te'},


      {l:'Balans Tenglik',v:balanced,c:balanced?'#00E5A0':'#FF4D6A',key:'bal',special:true},


    ].map(k=>`


    <div class="kpi" onclick="bsDetail('${k.key}')" style="cursor:pointer" onmouseenter="this.style.borderColor='${k.c}66'" onmouseleave="this.style.borderColor=''">


      <div class="kpi-l">${k.l}</div>


      <div class="kpi-v" style="color:${k.c}">${k.special?(balanced?'✅ BALANS':'⚠️ FARQ'):'$'+fS(k.v)}</div>


      <div style="font-size:9px;color:var(--t3);margin-top:3px">${k.special?(balanced?'A = L + E':'$'+fmt(Math.abs(diff))+' farq'):'Bosib detail →'}</div>


    </div>`).join('')}


  </div>





  <!-- Charts -->


  <div class="cgrid" style="margin-bottom:14px">


    <div class="cc">


      <div class="cc-lbl">Aktiv Tarkibi — Joriy vs Uzoq Muddatli</div>


      <div style="height:220px"><canvas id="bs_assets"></canvas></div>


    </div>


    <div class="cc">


      <div class="cc-lbl">Kapital Tuzilmasi — Majburiyat vs Kapital</div>


      <div style="height:220px"><canvas id="bs_struct"></canvas></div>


    </div>


  </div>





  <!-- IFRS Balance Sheet Table — 2 columns -->


  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">





    <!-- LEFT: ASSETS -->


    <div class="twrap">


      <div class="thdr"><div class="tlbl" style="color:#00E5A0">AKTIVLAR (ASSETS)</div><div style="font-size:10px;color:var(--t3);font-family:var(--mono)">IFRS · USD</div></div>


      <table style="width:100%">


        <tbody>


          <tr style="background:rgba(0,229,160,0.05)"><td colspan="2" style="padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#00E5A0">JORIY AKTIVLAR (Current Assets)</td></tr>


          ${bsRow(1,'💵 Naqd va bank mablag\'lari',ca_cash,false,'ca_cash','Cash & Equivalents')}


          ${bsRow(1,'📋 Debitorlik (AR)',ca_ar,false,'ca_ar','Accounts Receivable')}


          ${bsRow(1,'📦 Inventar — Tovar zapas (IAS 2)',ca_inventory,false,'ca_inv','Inventory — Real TXNS based')}


          ${bsRow(1,'⏳ Kelgusi davr xarajatlar',ca_prepaid,false,'ca_pre','Prepaid Expenses')}


          ${bsRow(0,'Jami Joriy Aktivlar',total_ca,true,null)}





          <tr style="background:rgba(108,142,255,0.05)"><td colspan="2" style="padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#6C8EFF">UZOQ MUDDATLI AKTIVLAR (Non-Current)</td></tr>


          ${bsRow(1,'🏭 Asosiy vositalar (PP&E)',nca_ppe,false,'nca_ppe','Property, Plant & Equipment')}


          ${bsRow(1,'💡 Nomoddiy aktivlar',nca_intang,false,'nca_int','Licenses, Software')}


          ${bsRow(1,'🔗 Uzoq muddatli investitsiya',nca_invest,false,'nca_inv','Yo\'nalishlarga berilgan')}


          ${bsRow(1,'📎 Boshqa aktivlar',nca_other,false,null)}


          ${bsRow(0,'Jami Uzoq Muddatli',total_nca,true,null)}





          <tr style="background:rgba(0,229,160,0.08);border-top:2px solid #00E5A044">


            <td style="padding:12px;font-size:14px;font-weight:800;color:#00E5A0">= JAMI AKTIVLAR</td>


            <td style="text-align:right;font-family:var(--mono);font-size:16px;font-weight:800;color:#00E5A0;padding:12px">$${fmt(total_assets)}</td>


          </tr>


        </tbody>


      </table>


    </div>





    <!-- RIGHT: LIABILITIES + EQUITY -->


    <div class="twrap">


      <div class="thdr"><div class="tlbl" style="color:#FF4D6A">MAJBURIYATLAR + KAPITAL</div><div style="font-size:10px;color:var(--t3);font-family:var(--mono)">IFRS · USD</div></div>


      <table style="width:100%">


        <tbody>


          <tr style="background:rgba(255,77,106,0.05)"><td colspan="2" style="padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#FF4D6A">JORIY MAJBURIYATLAR (Current Liabilities)</td></tr>


          ${bsRow(1,'🧾 Kreditorlik (AP)',cl_ap,false,'cl_ap','Accounts Payable')}


          ${bsRow(1,'🏦 Qisqa muddatli kreditlar',cl_loans_st,false,'cl_lst','Bank loans < 1 yil')}


          ${bsRow(1,'👥 Maosh majburiyati',cl_accrued,false,'cl_pay','Payroll payable')}


          ${bsRow(1,'🏛️ Soliq majburiyati',cl_tax,false,'cl_tax','Income tax payable')}


          ${bsRow(0,'Jami Joriy Majburiyat',total_cl,true,null)}





          <tr style="background:rgba(255,122,80,0.05)"><td colspan="2" style="padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#FF7A50">UZOQ MUDDATLI MAJBURIYATLAR</td></tr>


          ${bsRow(1,'🏦 Uzoq muddatli kreditlar',ncl_loans_lt,false,'ncl_lt','Bank loans > 1 yil')}


          ${bsRow(1,'📊 Kechiktirilgan soliq',ncl_deferred,false,null,'Deferred tax liability')}


          ${bsRow(0,'Jami Uzoq Muddatli',total_ncl,true,null)}


          ${bsRow(0,'JAMI MAJBURIYATLAR',total_liab,true,'tl')}





          <tr style="background:rgba(108,142,255,0.05);border-top:1px solid var(--b2)"><td colspan="2" style="padding:8px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:#6C8EFF">KAPITAL (EQUITY)</td></tr>


          ${bsRow(1,'💼 Ustav kapitali',eq_paid_in,false,'eq_paid','Paid-in Capital')}


          ${bsRow(1,'📈 O\'tgan yillar foydasi',eq_retained,false,'eq_ret','Retained Earnings')}


          ${bsRow(1,'✅ Joriy yil sof foyda',eq_current,false,'eq_cur','Current Period Net Income')}


          ${bsRow(1,'🕌 Ehson fondi (−)',-eq_ehson_fund,false,'eq_esh','Restricted Fund')}


          ${bsRow(0,'JAMI KAPITAL',total_equity,true,'te')}





          <tr style="background:rgba(108,142,255,0.1);border-top:2px solid #6C8EFF44">


            <td style="padding:12px;font-size:14px;font-weight:800;color:#6C8EFF">= JAMI MAJBURIYAT + KAPITAL</td>


            <td style="text-align:right;font-family:var(--mono);font-size:16px;font-weight:800;color:${balanced?'#00E5A0':'#FF4D6A'};padding:12px">$${fmt(total_le)}</td>


          </tr>


          <tr style="background:${balanced?'rgba(0,229,160,0.06)':'rgba(255,77,106,0.06)'}">


            <td colspan="2" style="text-align:center;padding:10px;font-size:12px;font-weight:700;color:${balanced?'#00E5A0':'#FF4D6A'}">


              ${balanced?'✅ BALANS TENGDIR — Assets = Liabilities + Equity':'⚠️ BALANS TENGEMAS — Farq: $'+fmt(Math.abs(diff))}


            </td>


          </tr>


        </tbody>


      </table>


    </div>


  </div>





  <!-- ── FINANCIAL HEALTH KPIs ──────────────────────────── -->


  <div style="margin-top:18px">


    <div class="thdr" style="margin-bottom:10px">


      <div class="tlbl">🩺 Moliyaviy Sog'liq Ko'rsatkichlari (Financial Health KPIs)</div>


      <div style="font-size:10px;color:var(--t3)">IFRS — tavsiya qilingan me'yorlar bilan</div>


    </div>


    ${(function(){


      var kpis = calcFinancialKPIs({


        ca: total_ca, cl: total_cl,


        inventory: ca_inventory, ar: ca_ar, ap: cl_ap,


        equity: total_equity, debt: total_liab,


        total_assets: total_assets,


        ebitda: rev>0 ? Math.round((rev-sk(c,'cogs')-sk(l,'cogs'))*0.6) : 0,


        interest: Math.round(OB.lt_loans_payable * 0.08),


        revenue: rev, net_income: netIncome,


        days_in_period: (function(){var s=new Date(PER.from),e=new Date(PER.to);return Math.max(1,Math.round((e-s)/86400000));})(),


        cogs: sk(c,'cogs')+sk(l,'cogs'),


      });


      function kpiCard(label, val, unit, good, warn, desc, benchmark){


        var numVal = parseFloat(val);


        var col = 'var(--t3)';


        if(val===null||val===undefined||isNaN(numVal)) return '';


        if(good!==null){


          if(typeof good==='function') col = good(numVal) ? 'var(--grn)' : (warn&&(typeof warn==='function'?warn(numVal):numVal>=warn) ? 'var(--amb)' : 'var(--red)');


          else col = numVal>=good ? 'var(--grn)' : (warn&&numVal>=warn ? 'var(--amb)' : 'var(--red)');


        }


        return '<div class="kpi" style="min-width:120px" title="'+desc+'">'


          +'<div class="kpi-l" style="font-size:10px">'+label+'</div>'


          +'<div class="kpi-v" style="color:'+col+';font-size:18px">'+(val!==null?val+(unit||''):'—')+'</div>'


          +(benchmark?'<div class="kpi-s">Me\'yor: '+benchmark+'</div>':'')


          +'</div>';


      }


      return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">'


        +kpiCard('Joriy Likvidlik',''+kpis.current_ratio,'x', 2, 1, 'Joriy aktivlar / Joriy majburiyatlar. ≥2 ideal, ≥1 qabul qilinadi.','≥ 2.0')


        +kpiCard('Tezkor Likvidlik',''+kpis.quick_ratio,'x', 1, 0.7, 'Cash+AR / Joriy majburiyatlar. Inventarsiz tezlik.','≥ 1.0')


        +kpiCard('Qarz/Kapital',''+kpis.de_ratio,'x', null, null, 'Jami qarz / Kapital. Qanchalik past bo\'lsa shuncha yaxshi.','≤ 1.5')


        +kpiCard('DSCR',''+kpis.dscr,'x', 1.25, 1, 'EBITDA / Foiz to\'lovlari. Kreditni qoplay olamizmi?','≥ 1.25')


        +kpiCard('AR Kunlar',''+kpis.ar_days,' kun', null, null, 'Debitorlik inkasso davri. Qanchalik kichik shuncha yaxshi.','< 30 kun')


        +kpiCard('AP Kunlar',''+kpis.ap_days,' kun', null, null, 'Kreditorklikni to\'lash davri.','30–60 kun')


        +kpiCard('Inventar Aylanmasi',''+kpis.inv_days,' kun', null, null, 'Tovar zaxirasi necha kunda tugaydi.','< 45 kun')


        +kpiCard('Net Margin',''+kpis.net_margin,'%', 15, 5, 'Sof foyda / Revenue × 100.','≥ 15%')

function renderInventoryPage(focusDir){


  var dir=DIRS.find(function(d){return d.id===focusDir;})||{name:focusDir,e:'📦',c:'var(--acc)',id:focusDir};


  var el=document.getElementById('pg-l1');el.classList.add('on');


  setBc([{lbl:'🏦 Holding',fn:"goNav('l1')"},{lbl:dir.e+' '+dir.name,fn:"goNav('"+focusDir+"')"},{lbl:'📦 Inventar',fn:''}]);


  var txnsDir=TXNS.filter(function(t){return t.direction===focusDir&&t.status!=='Bekor';});


  var invIn=txnsDir.filter(function(t){return t.type==='inventory';}).reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  var invOut=txnsDir.filter(function(t){return t.type==='inventory_release';}).reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


  var obShare=focusDir==='cargo'?0.4:focusDir==='logistics'?0.3:0.3;


  var netInv=Math.max(0,Math.round((OB.inventory_ob||0)*obShare)+invIn-invOut);


  var byClient={};


  txnsDir.filter(function(t){return t.type==='inventory';}).forEach(function(t){


    var cl=t.counterparty||'Nomaʼum';


    if(!byClient[cl])byClient[cl]={in_:0,out_:0,ref:''};


    byClient[cl].in_+=Math.abs(+(t.amount)||0);


    if(t.note)byClient[cl].ref=(t.note.split('|')[0]||'').trim()||byClient[cl].ref;


  });


  txnsDir.filter(function(t){return t.type==='inventory_release';}).forEach(function(t){


    var cl=t.counterparty||'Nomaʼum';


    if(!byClient[cl])byClient[cl]={in_:0,out_:0,ref:''};


    byClient[cl].out_+=Math.abs(+(t.amount)||0);


  });


  var clients=Object.keys(byClient).map(function(cl){


    return{client:cl,balance:Math.max(0,byClient[cl].in_-byClient[cl].out_),in_:byClient[cl].in_,out_:byClient[cl].out_,ref:byClient[cl].ref};


  }).filter(function(x){return x.in_>0;}).sort(function(a,b){return b.balance-a.balance;});


  var h='';


  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">';


  h+='<div class="kpi"><div class="kpi-l">Jami Inventar Qoldig\'i</div><div class="kpi-v" style="color:'+dir.c+'">$'+fS(netInv)+'</div><div class="kpi-s">IAS 2 Balance Sheet CA</div></div>';


  h+='<div class="kpi"><div class="kpi-l">Kirgan (In)</div><div class="kpi-v" style="color:#17B374">$'+fS(invIn)+'</div><div class="kpi-s">'+txnsDir.filter(function(t){return t.type==='inventory';}).length+' ta yozuv</div></div>';


  h+='<div class="kpi"><div class="kpi-l">Chiqgan (COGS Release)</div><div class="kpi-v" style="color:#FF4D6A">$'+fS(invOut)+'</div><div class="kpi-s">'+txnsDir.filter(function(t){return t.type==='inventory_release';}).length+' ta</div></div>';


  h+='<div class="kpi"><div class="kpi-l">Aktiv Mijozlar</div><div class="kpi-v" style="color:#FFB830">'+clients.filter(function(c){return c.balance>0;}).length+'</div><div class="kpi-s">Omborda yuki bor</div></div>';


  h+='</div>';


  h+='<div class="twrap" style="margin-bottom:14px">';


  h+='<div class="thdr"><div class="tlbl">'+dir.e+' Mijozlar bo\'yicha Inventar (IAS 2)</div>'


    +'<button onclick="goNav(\''+focusDir+':entry\')" style="padding:5px 14px;border-radius:6px;border:1px solid '+dir.c+'44;background:'+dir.c+'11;color:'+dir.c+';cursor:pointer;font-size:11px">✏️ Yangi kirish</button></div>';


  if(clients.length===0){


    h+='<div style="padding:20px;text-align:center;color:var(--t3);font-size:12px">Inventar tranzaksiyalari yo\'q.<br>Yuk jo\'natilganda <b>📦 Inventar (IAS 2)</b> turini tanlang.</div>';


  } else {


    h+='<table><thead><tr><th>Mijoz</th><th style="text-align:right">Kirgan</th><th style="text-align:right">Chiqgan</th><th style="text-align:right">Qoldig\'</th><th>Holat</th><th>Ref</th></tr></thead><tbody>';


    clients.forEach(function(c){


      var statusLbl=c.balance>0?'⏳ Omborda':'✅ Yetkazildi';


      var statusCol=c.balance>0?'#FFB830':'#17B374';


      h+='<tr class="cr"><td style="font-weight:600">'+c.client+'</td>'


        +'<td style="text-align:right;font-family:var(--mono);color:#17B374">$'+fS(c.in_)+'</td>'


        +'<td style="text-align:right;font-family:var(--mono);color:#FF4D6A">$'+fS(c.out_)+'</td>'


        +'<td style="text-align:right;font-family:var(--mono);font-weight:700;color:'+dir.c+'">$'+fS(c.balance)+'</td>'


        +'<td><span style="padding:2px 8px;border-radius:4px;font-size:10px;background:'+statusCol+'22;color:'+statusCol+'">'+statusLbl+'</span></td>'


        +'<td style="font-size:10px;color:var(--t3)">'+c.ref+'</td></tr>';


    });


    h+='</tbody></table>';


  }


  h+='</div>';


  var recent=txnsDir.filter(function(t){return t.type==='inventory'||t.type==='inventory_release';}).sort(function(a,b){return b.date>a.date?1:-1;}).slice(0,12);


  h+='<div class="twrap"><div class="thdr"><div class="tlbl">Oxirgi Harakatlar</div></div>';


  if(recent.length===0){h+='<div style="padding:16px;color:var(--t3);font-size:12px">Tranzaksiyalar yo\'q</div>';}


  else{


    h+='<table><thead><tr><th>Sana</th><th>Tur</th><th>Mijoz</th><th>Subkat</th><th style="text-align:right">Summa</th><th>Maqsad</th></tr></thead><tbody>';


    recent.forEach(function(t){


      var isIn=t.type==='inventory';


      h+='<tr><td style="font-family:var(--mono);color:var(--t3)">'+(t.date||'').slice(5)+'</td>'


        +'<td><span style="padding:2px 7px;border-radius:4px;font-size:10px;background:'+(isIn?'#17B374':'#FF4D6A')+'22;color:'+(isIn?'#17B374':'#FF4D6A')+'">'+(isIn?'📦 Kirdi':'✅ Chiqdi')+'</span></td>'


        +'<td>'+(t.counterparty||'—')+'</td>'


        +'<td style="font-size:11px;color:var(--t3)">'+(t.subcat||'')+'</td>'


        +'<td style="text-align:right;font-family:var(--mono);color:'+(isIn?'#17B374':'#FF4D6A')+'">$'+fS(Math.abs(+(t.amount)||0))+'</td>'


        +'<td style="font-size:11px;color:var(--t2)">'+(t.purpose||'—').substring(0,40)+'</td></tr>';


    });


    h+='</tbody></table>';


  }


  h+='</div>';


  h+='<div style="margin-top:12px;padding:12px 16px;background:rgba(255,184,48,0.06);border:1px solid rgba(255,184,48,0.2);border-radius:8px;font-size:11px;color:var(--t2);line-height:1.8">'


    +'<b style="color:#FFB830">📚 IAS 2:</b> Yuk kirdi → <b>📦 Inventar</b> (Balance Sheet CA). '


    +'Yetkazildi → <b>✅ COGS Chiqimi</b> (P&L COGS). '


    +'Net = OB + Kirgan − Chiqgan. FIFO usuli tavsiya etiladi.</div>';


  el.innerHTML=h;


}

  // FX rate auto-update


  window.entUpdateFX=function(){


    var cur=document.getElementById('ef_cur');


    var fxRow=document.getElementById('ef_fx_row');


    var fxInp=document.getElementById('ef_fx');


    var usdEl=document.getElementById('ef_usd_equiv');


    var amtInp=document.getElementById('ef_amt');


    if(!cur) return;


    var c=cur.value;


    if(c==='USD'){ if(fxRow) fxRow.style.display='none'; return; }


    if(fxRow) fxRow.style.display='block';


    // Auto-fill default rate from OB


    if(fxInp && parseFloat(fxInp.value)<=1){


      if(c==='RMB') fxInp.value=OB.fx_rate_rmb||7.1;


      else if(c==='UZS') fxInp.value=OB.fx_rate_uzs||12700;


    }


    // Show USD equivalent


    var orig=parseFloat(amtInp&&amtInp.value)||0;


    var rate=parseFloat(fxInp&&fxInp.value)||1;


    var usd=Math.round(orig/rate*100)/100;


    if(usdEl) usdEl.textContent='= $'+fS(usd)+' USD';


  };

          var inn=r.inn?('<span style="color:var(--t3);font-size:10px;margin-left:6px">INN: '+r.inn+'</span>'):'';


          return '<div onclick="entPickAC(\''+nm.replace(/'/g,"\\'")+'\')" style="padding:8px 10px;cursor:pointer;border-bottom:1px solid var(--b1);font-size:12px" onmouseover="this.style.background=\'var(--s3)\'" onmouseout="this.style.background=\'\'">'+nm+inn+'</div>';


        }).join('');


        ac.style.display='block';


      });


    },300);


  };


  window.entPickAC=function(nm){


    var inp=document.getElementById('ef_cpty');


    var ac=document.getElementById('ef_cpty_ac');


    if(inp) inp.value=nm;


    if(ac) ac.style.display='none';


  };





  // ─── SAVE ────────────────────────────────────


  window.entSave=async function(){


    var gv=function(id){var e=document.getElementById(id);return e?e.value:'';};


    var date=gv('ef_d')||new Date().toISOString().split('T')[0];


    // ✅ ACCRUAL METHOD: P&L davri to'lov sanasidan farq qilishi mumkin


    // Misol: Yanvar ijarasi Fevralda to'lansa → accrual_period='2025-01', date='2025-02-...'


    var accrualPeriod=gv('ef_accrual')||dateToPeriod(date);


    // period = P&L uchun (hisoblanish davri = accrual)


    // date   = Cash Flow uchun (real kassadan o'tgan sana)


    var period = accrualPeriod;


    var payment_period = dateToPeriod(date); // CF uchun





    var amtOrig=parseFloat(gv('ef_amt'))||0;


    var currency=gv('ef_cur')||'USD';


    var fxRate=parseFloat(gv('ef_fx'))||1;


    // Canonical USD amount


    var amt = currency==='USD' ? amtOrig : Math.round(amtOrig / fxRate * 100)/100;


    var subcatRaw=gv('ef_subcat')||'13 — Boshqa';


    // Parse COA code from "21 — Asosiy vositalar xaridi" format


    var coaCodeMatch = subcatRaw.match(/^(\d+)\s*[—-]\s*(.+)$/);


    var coa_code = coaCodeMatch ? coaCodeMatch[1] : '13';


    var subcat    = coaCodeMatch ? coaCodeMatch[2].trim() : subcatRaw;


    var group    = coaGroup(entDir, entType); // Группа: auto from COA type


    var period_range = gv('ef_period_range')||''; // Период: e.g. "1-25"


    var status=gv('ef_status')||"To'langan";


    var counterparty=gv('ef_cpty')||'—';


    var purpose=gv('ef_rs')||'';


    var note=gv('ef_nt')||'';


    var toDir=gv('ef_to_dir')||'';


    var isInterco = document.getElementById('ef_interco')&&document.getElementById('ef_interco').checked;


    // CapEx (coa_code 21/22) → always interco=false, type stays 'capex'


    var isCapExTxn = entType==='capex' || coa_code==='21' || coa_code==='22';


    // Loan-in → type stays 'loan_in' (income for CF, not P&L revenue)


    var isLoanIn = entType==='loan_in';


    var tags=(gv('ef_tags')||'').split(',').map(function(t){return t.trim();}).filter(Boolean);


    if(isCapExTxn && tags.indexOf('capex')<0) tags.push('capex');


    var m=document.getElementById('ent_msg');





    if(!amtOrig){if(m){m.style.color='var(--red)';m.textContent='⚠ Summa kiritilmadi!';setTimeout(function(){m.textContent='';},3000);}return;}


    if(!purpose){if(m){m.style.color='var(--amb)';m.textContent='⚠ Sabab/Maqsad maydonini to\'ldiring!';setTimeout(function(){m.textContent='';},3000);}return;}





    // ── IFRS Validation System ────────────────────────────────────


    // Collect extra smart fields


    var extraFieldVals={};


    var rule=VAL_RULES[coa_code]||{};


    (rule.extra_fields||[]).forEach(function(ef){


      var el=document.getElementById(ef.id);


      if(el) extraFieldVals[ef.id]=el.value||'';


    });


    var draftTxn={amount:amt,purpose:purpose,note:note,counterparty:counterparty,


      coa_code:coa_code,type:entType,direction:entDir,


      accrual_period:accrualPeriod,period_range:period_range,date:date,id:'_new_'};


    var valResult=validateTxn(draftTxn, extraFieldVals);





    if(!valResult.ok){


      // Hard errors — block save


      var errMsg=valResult.errors.join('\n');


      if(m){m.style.color='var(--red)';m.innerHTML=valResult.errors.map(function(e){return '<div>'+e+'</div>';}).join('');}


      // Show modal for clarity


      drillOpen({title:'❌ Tranzaksiya xatosi — Saqlanmadi', wide:false, rows:valResult.errors.map(function(e){return {k:'',v:e};})});


      return;


    }


    if(valResult.warnings.length){


      // Soft warnings — show but continue after confirm


      var warnMsg=valResult.warnings.join('\n\n');


      var proceed=confirm('⚠️ Ogohlantirishlar:\n\n'+warnMsg+'\n\nBaribir saqlashni davom ettirasizmi?');


      if(!proceed) return;


    }


    // Attach extra smart field data to note


    var extraNotes=Object.keys(extraFieldVals).map(function(k){


      var ef=(rule.extra_fields||[]).find(function(f){return f.id===k;});


      return ef&&extraFieldVals[k]?ef.label+': '+extraFieldVals[k]:'';


    }).filter(Boolean);


    if(extraNotes.length) note=(note?note+' | ':'')+extraNotes.join(' | ');


    // ── End Validation ────────────────────────────────────────────





    // 1. Save to unified TXNS (v2 schema)


    var txn={


      id:'TXN-'+Date.now(),


      date:date,                     // To'lov sanasi → Cash Flow uchun


      period:period,                 // Hisoblanish davri (accrual) → P&L uchun ✅


      payment_period:payment_period, // To'lov oyi → CF tahlili uchun


      accrual_period:accrualPeriod,  // Explicit accrual field


      // ── Sheets bilan mos yangi maydonlar ──────────────


      group:group,                   // Группа: Метод начисления / Кредит / Основные_средства


      coa_code:coa_code,             // Статья kodi: 11, 12, 13, 21, 22, 31, 41


      period_range:period_range,     // Период: "1-25" (oy ichidagi kunlar)


      // ─────────────────────────────────────────────────


      direction:entDir, dept:entDept,


      type:entType, subcat:subcat,


      amount:amt,                    // Canonical USD


      currency:currency,


      amount_orig:amtOrig,


      fx_rate:fxRate,


      counterparty:counterparty, purpose:purpose,


      status:status, note:note, to_dir:toDir,


      is_interco: isInterco||false,


      is_capex: isCapExTxn,          // CapEx flag → BS NCA ga, P&L ga emas


      is_loan_in: isLoanIn,          // Qarz olish → CF Moliyaviy faoliyat


      tags:tags


    };


    TXNS.push(txn);


    txnsSave();





    // 2. Backward compat: push to old DATA arrays so existing renders still work


    if(!DATA[entDir]) DATA[entDir]=[];


    var noteStr=purpose+(counterparty!=='—'?' — '+counterparty:'')+(note?' | '+note:'');


    if(entDir==='cargo'||entDir==='logistics'){


      var rv2=entType==='income'?amt:0,cg2=entType==='cogs'?amt:0,ex2=(entType==='opex'||entType==='finance')?amt:0;


      DATA[entDir].push({date:date,client:counterparty,sku:subcat,revenue:rv2,cogs:cg2,expense:ex2,margin:rv2-cg2-ex2,bank_usd:0,bank_cny:0,note:noteStr});


    } else if(entDir==='exchange'){


      DATA[entDir].push({date:date,spread:entType==='income'?amt:0,expense:entType!=='income'?amt:0,net:entType==='income'?amt:-amt,cash_usd:0,cash_cny:0,note:noteStr});


    } else if(entDir==='procurement'){


      DATA[entDir].push({date:date,client:counterparty,sku:subcat,order_value:0,commission_rate:0,commission:entType==='income'?amt:0,expense:entType!=='income'?amt:0,net:entType==='income'?amt:-amt,bank_usd:0,note:noteStr});


    } else {


      DATA[entDir].push({date:date,div_in:entType==='income'?amt:0,loan_in:0,exp_out:entType==='opex'?amt:0,tr_out:entType==='transfer'?amt:0,tr_to:toDir,cash_usd:0,note:noteStr});


    }





    // 3. Supabase — unified transactions table


    if(m){m.style.color='var(--t3)';m.textContent='Saqlanmoqda...';}


    var sbRow={entry_date:date,direction:entDir,department:entDept,txn_type:entType,subcategory:subcat,amount_usd:amt,counterparty:counterparty,purpose:purpose,status:status,note:note,to_direction:toDir||null};


    if(SB){


      try{


        var r2=await SB.from('transactions').insert(sbRow);


        if(r2.error) throw r2.error;


        if(m){m.style.color='var(--grn)';m.textContent='✓ Supabase ga saqlandi!';setTimeout(function(){m.textContent='';},3000);}


      }catch(e2){


        console.warn('Supabase transactions:',e2.message);


        if(m){m.style.color='var(--grn)';m.textContent='✓ Lokal saqlandi! ('+entDir+'/'+entDept+')';setTimeout(function(){m.textContent='';},3000);}


      }


    } else {


      if(m){m.style.color='var(--grn)';m.textContent='✓ Saqlandi! '+entDir.toUpperCase()+' / '+entDept+' — $'+fS(amt);setTimeout(function(){m.textContent='';},3000);}


    }





    // 4. Refresh side panels


    var rt=document.getElementById('entRecentTxns');


    if(rt) rt.innerHTML=recentTxnsHTML();


    var sp=document.getElementById('entSummaryPanel');


    if(sp) sp.innerHTML=summaryPanelHTML();





    // 5. Clear amount + counterparty for next entry


    var amtEl=document.getElementById('ef_amt');


    var cptyEl=document.getElementById('ef_cpty');


    if(amtEl) amtEl.value='';


    if(cptyEl) cptyEl.value='';


  };





  // Also keep old saveEnt for backward compat


  window.saveEnt=window.entSave;





  // ─── RENDER ──────────────────────────────────


  var summaryH=summaryPanelHTML();


  var recentH=recentTxnsHTML();


  el.innerHTML=''


    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'


    +'<div style="font-size:15px;font-weight:600">📥 Ma\'lumot Kiritish</div>'


    +'<div style="font-size:11px;color:var(--t3);font-family:var(--mono)">Yagona baza • <span id="txnCount">'+TXNS.length+'</span> ta transaksiya</div>'


    +'</div>'


    +'<div style="display:grid;grid-template-columns:1fr 360px;gap:14px;align-items:start">'


    // Left: form


    +'<div id="entryArea">'+entryFormHTML()+'</div>'


    // Right: panels


    +'<div>'


    // Summary panel


    +'<div class="card" style="margin-bottom:10px" id="entSummaryPanel">'+summaryH+'</div>'


    // Recent txns


    +'<div style="font-size:10px;color:var(--t3);font-family:var(--mono);letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px">🕐 So\'nggi transaksiyalar</div>'


    +'<div class="twrap" id="entRecentTxns">'+recentH+'</div>'


    // Legend


    +'<div style="margin-top:10px;padding:10px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);font-size:10px;color:var(--t3);line-height:1.8">'


    +'<div style="font-weight:600;color:var(--t2);margin-bottom:4px">📖 COA — Hisoblar Rejasi</div>'


    +'<div><span style="color:#17B374">💰 Daromad</span> → P&L Revenue</div>'


    +'<div><span style="color:#E8652A">📦 COGS</span> → P&L Gross Profit</div>'


    +'<div><span style="color:#FF4D6A">⚙️ OpEx</span> → P&L EBIT</div>'


    +'<div><span style="color:#A78BFF">🏦 Moliyaviy</span> → P&L Net Income</div>'


    +'<div><span style="color:#00D4FF">🔄 O\'tkazma</span> → Balance Sheet / CF</div>'


    +'</div>'


    +'</div>'


    +'</div>';


  // Initialize smart fields for default Статья selection


  setTimeout(function(){ if(typeof entUpdateSmartFields==='function') entUpdateSmartFields(); }, 50);


}

}

// ── Balance calculator ────────────────────────────────────────────────
// Returns {bank_usd, bank_cny, client_usd, client_cny, co_usd, co_cny,
//          comm_total_usd, comm_total_cny, vol_usd}
function exCalcBalance(txns){
  txns = txns || EX_TXNS;
  var b = {bank_usd:0,bank_cny:0,client_usd:0,client_cny:0,co_usd:0,co_cny:0,comm_total_usd:0,comm_total_cny:0,vol_usd:0};
  txns.forEach(function(t){
    var u=+(t.usd||0), c=+(t.cny||0), fx=+(t.fx_rate||EX_FX_RATE);
    var tp=t.type;
    if(tp==='deposit'){
      // Mijoz USD/CNY soladi — bank va mijoz balansi oshadi
      b.bank_usd+=u; b.bank_cny+=c;
      b.client_usd+=u; b.client_cny+=c;
    } else if(tp==='break'){
      // Pul maydalash: USD → CNY (Mijoz 1)
      var cny_gross = u * fx;
      var comm_cny  = u * +(t.comm_rate||0.02);
      b.bank_usd -= u; b.bank_cny += cny_gross;
      b.client_usd -= u; b.client_cny += (cny_gross - comm_cny);
      b.co_cny += comm_cny;
      b.comm_total_cny += comm_cny;
      b.vol_usd += u;
    } else if(tp==='send_cny'){
      // Ta'minotchiga CNY o'tkazma
      b.bank_cny -= c; b.client_cny -= c;
    } else if(tp==='send_usd'){
      // Ta'minotchiga USD o'tkazma + 0.02/USD komissiya
      var comm_u = u * +(t.comm_rate||0.0002);
      b.bank_usd -= u; b.client_usd -= (u + comm_u);
      b.co_usd += comm_u; b.comm_total_usd += comm_u;
      b.vol_usd += u;
    } else if(tp==='cashout'){
      // Mijoz 2: Xitoyda kirim → O'zbekistonda naqd chiqim
      var comm_co2 = u * +(t.comm_rate||0.0006);
      b.bank_usd += u;       // Xitoy hisobga tushdi
      b.client_usd -= u;     // Mijoz da'vosi kamaydi
      b.co_usd += comm_co2;  // Tangachi komisssiya
      b.comm_total_usd += comm_co2;
      b.vol_usd += u;
    } else if(tp==='cashin'){
      // Mijoz 3: O'zbekistonda naqd kirim → Xitoyda chiqim
      var comm_co3 = u * +(t.comm_rate||0.0006);
      b.bank_usd -= u;       // Xitoydan chiqdi
      b.client_usd += u;     // Mijoz balansi oshdi
      b.co_usd += comm_co3;
      b.comm_total_usd += comm_co3;
      b.vol_usd += u;
    } else if(tp==='withdraw'){
      // Mijoz pul qaytaradi / chiqaradi
      b.bank_usd-=u; b.bank_cny-=c;
      b.client_usd-=u; b.client_cny-=c;
    }
  });
  return b;
}

// ── Exchange KPI Drill-down ────────────────────────────────────────────
function showExDrill(type){
  var mid = EX_BOC_RATE||EX_FX_RATE;
  var todayStr = (new Date()).toISOString().slice(0,10);
  var txns = EX_TXNS.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  var title='', rows=[], html='';

  if(type==='bank_usd'||type==='bank_cny'){
    var isCny = type==='bank_cny';
    title = isCny ? '🏦 Bank CNY — Harakatlar tarixi' : '🏦 Bank USD — Harakatlar tarixi';
    // compute running balance
    var sorted = EX_TXNS.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    var running=0, runRows=[];
    sorted.forEach(function(t){
      var meta=EX_TYPE_META[t.type]||{lbl:t.type,color:'#6b7280'};
      var delta=0;
      if(!isCny){
        if(t.type==='deposit') delta=+(t.usd||0);
        else if(t.type==='break') delta=-(+(t.usd||0));
        else if(t.type==='cashout') delta=-(+(t.usd||0));
        else if(t.type==='cashin') delta=+(t.usd||0);
        else if(t.type==='send_usd') delta=-(+(t.usd||0));
      } else {
        if(t.type==='break') delta=+(t.usd||0)*(+(t.fx_rate||mid));
        else if(t.type==='send_cny') delta=-(+(t.cny||0));
        else if(t.type==='cashout') delta=+(t.cny||0);
        else if(t.type==='cashin') delta=-(+(t.cny||0));
      }
      if(delta!==0){ running+=delta; runRows.push({t:t,meta:meta,delta:delta,bal:running}); }
    });
    runRows.reverse();
    html='<table style="width:100%;border-collapse:collapse;font-size:12px;">'
      +'<thead><tr style="background:var(--s3)"><th style="padding:8px 10px;text-align:left;color:var(--t3);font-size:10px;">Sana</th>'

      +'<th style="padding:8px 10px;text-align:right;color:var(--t3);font-size:10px;">Balans</th>'
      +'</tr></thead><tbody>';
    runRows.forEach(function(r){
      var sym=isCny?'¥':'$';

        +'<td style="padding:7px 10px;color:var(--t3)">'+r.t.date+'</td>'
        +'<td style="padding:7px 10px"><span style="background:'+r.meta.color+'22;color:'+r.meta.color+';padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700">'+r.meta.lbl+'</span></td>'
        +'<td style="padding:7px 10px;font-weight:500">'+(r.t.client||'—')+'</td>'
        +'<td style="padding:7px 10px;text-align:right;font-weight:700;color:'+(r.delta>=0?'#22c55e':'#ef4444')+'">'+(r.delta>=0?'+':'')+sym+Math.abs(r.delta).toLocaleString()+'</td>'
        +'<td style="padding:7px 10px;text-align:right;font-family:var(--mono);font-weight:700;color:var(--acc)">'+sym+r.bal.toLocaleString()+'</td>'
        +'</tr>';
    });
    html+='</tbody></table>';

  } else if(type==='client_usd'){
    title='👤 Mijozlar USD — Balans holati';
    var byClient={};
    EX_TXNS.forEach(function(t){
      var cl=t.client||'Noma\'lum';
      if(!byClient[cl]) byClient[cl]={dep:0,breaks:0,sent_cny:0,comm:0,cnt:0};
      var bc=byClient[cl];
      bc.cnt++;
      if(t.type==='deposit') bc.dep+=+(t.usd||0);
      else if(t.type==='break') { bc.breaks+=+(t.usd||0); bc.comm+=+(t.commission||0); }
      else if(t.type==='send_cny') bc.sent_cny+=+(t.cny||0);
    });
    html='<table style="width:100%;border-collapse:collapse;font-size:12px;">'
      +'<thead><tr style="background:var(--s3)">'
      +'<th style="padding:8px 10px;text-align:left;color:var(--t3);font-size:10px;">Mijoz</th>'
      +'<th style="padding:8px 10px;text-align:right;color:var(--t3);font-size:10px;">Depozit (USD)</th>'
      +'<th style="padding:8px 10px;text-align:right;color:var(--t3);font-size:10px;">Maydalandi (USD)</th>'
      +'<th style="padding:8px 10px;text-align:right;color:var(--t3);font-size:10px;">CNY O\'tkazma</th>'
      +'<th style="padding:8px 10px;text-align:right;color:var(--t3);font-size:10px;">Komissiya</th>'
      +'<th style="padding:8px 10px;text-align:right;color:var(--t3);font-size:10px;">Tranzaksiya</th>'
      +'</tr></thead><tbody>';
    Object.keys(byClient).sort().forEach(function(cl){
      var c=byClient[cl];
      html+='<tr style="border-bottom:1px solid var(--b2)">'

function exSaveTxn(type){
  var g = function(id){ var el=document.getElementById(id); return el?el.value:''; };
  var date=g('exF_date')||new Date().toISOString().slice(0,10);
  var client=g('exF_client')||'';
  var note=g('exF_note')||'';

  var txn = {
    id: 'EX-'+Date.now(),
    date: date,
    type: type,
    client: client,
    note: note,
    usd: 0, cny: 0, fx_rate: EX_FX_RATE, commission: 0
  };

  if(type==='break'){
    var u=parseFloat(g('exF_usd'))||0;
    var dir=(document.getElementById('exF_break_dir')||{}).value||'buy';
    var mid=EX_BOC_RATE||EX_FX_RATE;
    var rate = dir==='buy' ? exBuyRate(mid) : exSellRate(mid);
    var comm_cny = u * Math.abs(mid - rate);
    txn.usd=u; txn.fx_rate=rate; txn.commission=comm_cny/mid;
    txn.note=note||(dir==='buy'
      ? 'USD '+u+' → CNY '+(u*rate).toFixed(0)+' (sotib olish kursi: ¥'+rate+', foyda: ¥'+comm_cny.toFixed(2)+')'
      : 'CNY '+(u*rate).toFixed(0)+' → USD '+u+' (sotish kursi: ¥'+rate+', foyda: ¥'+comm_cny.toFixed(2)+')');
  } else if(type==='send_cny'){
    txn.cny=parseFloat(g('exF_cny'))||0;
    txn.note=note||(g('exF_supplier')+"ga CNY o'tkazma");
  } else if(type==='send_usd'){
    var u2=parseFloat(g('exF_usd'))||0;
    txn.usd=u2; txn.commission=u2*0.0002;
    txn.note=note||(g('exF_supplier')+"ga USD o'tkazma");
  } else if(type==='deposit'){
    txn.usd=parseFloat(g('exF_usd'))||0;
    txn.cny=parseFloat(g('exF_cny'))||0;
  } else if(type==='cashout'){
    var u3=parseFloat(g('exF_usd'))||0;
    var r3=(parseFloat(g('exF_comm_rate'))||0.06)/100;
    txn.usd=u3; txn.comm_rate=r3; txn.commission=u3*r3;
    txn.note=note||('Naqd chiqarish: $'+u3+', komissiya: $'+(u3*r3).toFixed(2));
  } else if(type==='cashin'){
    var u4=parseFloat(g('exF_usd'))||0;
    var r4=(parseFloat(g('exF_comm_rate'))||0.06)/100;
    txn.usd=u4; txn.comm_rate=r4; txn.commission=u4*r4;
    txn.note=note||('Naqd kirim: $'+u4+', komissiya: $'+(u4*r4).toFixed(2));
  } else if(type==='withdraw'){
    txn.usd=parseFloat(g('exF_usd'))||0;
    txn.cny=parseFloat(g('exF_cny'))||0;
  }

  EX_TXNS.push(txn);
  exSave();
  // Close any open overlays
  document.querySelectorAll('[id^="exOv"], .ex-overlay').forEach(function(el){el.remove();});
  toast('✅ Operatsiya saqlandi: '+( EX_TYPE_META[type]||{}).lbl);
  goNav('exchange:dashboard');
}

// ── Bank of China Rate fetcher ─────────────────────────────────────────
// BOC middle rate + 0.06% spread (buy/sell)
var EX_SPREAD_PCT = 0.0006; // 0.06% default spread
var EX_BOC_RATE   = null;   // last fetched BOC middle rate
var EX_BOC_FETCHED_DATE = null;

function exFetchBOCRate(cb){
  // Use open.er-api.com (free, CORS-friendly, updated hourly)
  fetch('https://open.er-api.com/v6/latest/USD')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(data && data.rates && data.rates.CNY){
        EX_BOC_RATE = Math.round(data.rates.CNY * 10000) / 10000;
        EX_BOC_FETCHED_DATE = new Date().toISOString().slice(0,10);
        lsSave('ex_boc_rate',   EX_BOC_RATE);
        lsSave('ex_boc_date',   EX_BOC_FETCHED_DATE);
        lsSave('ex_spread_pct', EX_SPREAD_PCT);
        if(cb) cb(EX_BOC_RATE);
      }
    })
    .catch(function(){ if(cb) cb(null); });
}

// On load — restore last saved BOC rate
(function(){
  var r=lsLoad('ex_boc_rate');   if(r) EX_BOC_RATE=r;
  var d=lsLoad('ex_boc_date');   if(d) EX_BOC_FETCHED_DATE=d;
  var s=lsLoad('ex_spread_pct'); if(s) EX_SPREAD_PCT=s;
})();

function exBuyRate(mid){
  // We BUY USD from client → client gets CNY at (middle - spread)
  return Math.round((mid||EX_BOC_RATE||EX_FX_RATE) * (1 - EX_SPREAD_PCT) * 10000) / 10000;
}
function exSellRate(mid){
  // We SELL USD to client → client pays CNY at (middle + spread)
  return Math.round((mid||EX_BOC_RATE||EX_FX_RATE) * (1 + EX_SPREAD_PCT) * 10000) / 10000;
}

// Extended FX modal with BOC rate + spread settings
function exFxModal(){
  var mid = EX_BOC_RATE || EX_FX_RATE;
  var buy = exBuyRate(mid), sell = exSellRate(mid);
  var lastFetch = EX_BOC_FETCHED_DATE ? EX_BOC_FETCHED_DATE : 'yuklanmagan';
  var ov = document.createElement('div');
  ov.id = 'exOvFx';
  ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.72);z-index:9000;display:flex;align-items:center;justify-content:center;';
  ov.innerHTML=
    '<div style="background:var(--s1);border-radius:16px;padding:28px 28px 24px;width:400px;border:1px solid var(--b2);">'
    +'<div style="font-size:16px;font-weight:800;margin-bottom:4px;">⚙️ Valyuta Kursi Sozlamalari</div>'
    +'<div style="font-size:11px;color:var(--t3);margin-bottom:20px;">Oxirgi kurs: '+lastFetch+'</div>'

    +'<div style="background:var(--s2);border-radius:10px;padding:14px;margin-bottom:16px;">'
    +'<div style="font-size:11px;color:var(--t3);margin-bottom:10px;font-weight:600;text-transform:uppercase;">📊 Joriy Kurslar (1 USD)</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;">'
    +'<div style="background:var(--s1);border-radius:8px;padding:8px;"><div style="font-size:10px;color:var(--t3);">BOC O\'rta</div><div style="font-size:16px;font-weight:800;color:#6C8EFF;" id="exMidDisp">¥'+mid+'</div></div>'
    +'<div style="background:#f0fdf4;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#16a34a;">Sotib olish</div><div style="font-size:16px;font-weight:800;color:#16a34a;" id="exBuyDisp">¥'+buy+'</div></div>'
    +'<div style="background:#fef2f2;border-radius:8px;padding:8px;"><div style="font-size:10px;color:#ef4444;">Sotish</div><div style="font-size:16px;font-weight:800;color:#ef4444;" id="exSellDisp">¥'+sell+'</div></div>'
    +'</div></div>'

    +'<div style="margin-bottom:12px;">'
    +'<label style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;display:block;margin-bottom:4px;">BOC O\'rta kurs (CNY per USD)</label>'
    +'<div style="display:flex;gap:8px;">'
    +'<input id="exMidInput" type="number" step="0.0001" value="'+mid+'" '
    +'style="flex:1;padding:9px 10px;border-radius:8px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);font-size:14px;">'
    +'<button id="exFetchBtn" onclick="exFetchBOCLive()" '
    +'style="padding:9px 14px;border-radius:8px;border:none;background:#6C8EFF;color:#fff;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;">🔄 BOC dan tortish</button>'
    +'</div></div>'

    +'<div style="margin-bottom:16px;">'
    +'<label style="font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;display:block;margin-bottom:4px;">Spread (%) — Sotib olish/Sotish farqi</label>'
    +'<input id="exSpreadInput" type="number" step="0.01" value="'+(EX_SPREAD_PCT*100).toFixed(2)+'" '
    +'style="width:100%;padding:9px 10px;border-radius:8px;border:1px solid var(--b2);background:var(--s1);color:var(--t1);font-size:14px;">'
    +'<div style="font-size:10px;color:var(--t3);margin-top:4px;">Masalan: 0.06 → Sotib olish: O\'rta × 0.9994 | Sotish: O\'rta × 1.0006</div>'
    +'</div>'

    +'<div style="display:flex;gap:8px;">'
    +'<button onclick="exFxSaveAll()" '
    +'style="flex:1;padding:10px;border-radius:8px;border:none;background:#D48C0A;color:#fff;cursor:pointer;font-weight:700;">💾 Saqlash</button>'
    +'<button onclick="document.getElementById(\'exOvFx\').remove()" '
    +'style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);cursor:pointer;">Bekor</button>'
    +'</div></div>';
  document.body.appendChild(ov);

  // Live preview on input change
  document.getElementById('exMidInput').addEventListener('input', function(){
    var m=parseFloat(this.value)||mid;
    var sp=(parseFloat(document.getElementById('exSpreadInput').value)||0.06)/100;
    document.getElementById('exMidDisp').textContent='¥'+m;
    document.getElementById('exBuyDisp').textContent='¥'+Math.round(m*(1-sp)*10000)/10000;
    document.getElementById('exSellDisp').textContent='¥'+Math.round(m*(1+sp)*10000)/10000;
  });
  document.getElementById('exSpreadInput').addEventListener('input', function(){
    var m=parseFloat(document.getElementById('exMidInput').value)||mid;
    var sp=(parseFloat(this.value)||0.06)/100;
    document.getElementById('exBuyDisp').textContent='¥'+Math.round(m*(1-sp)*10000)/10000;
    document.getElementById('exSellDisp').textContent='¥'+Math.round(m*(1+sp)*10000)/10000;
  });
}

function exFetchLiveAndRefresh(){
  toast('⏳ BOC kurs yuklanmoqda...');
  exFetchBOCRate(function(rate){
    if(rate){
      EX_FX_RATE = rate;
      exFxSave();
      renderExchangeDash();
      toast('✅ BOC kurs yangilandi: 1 USD = ¥'+rate);
    } else {
      toast('⚠️ Kurs yuklanmadi — tarmoqni tekshiring');
    }
  });
}

function exFetchBOCLive(){
  var btn=document.getElementById('exFetchBtn');
  if(btn){ btn.textContent='⏳ Yuklanmoqda...'; btn.disabled=true; }
  exFetchBOCRate(function(rate){
    if(btn){ btn.textContent='✅ Yuklandi'; btn.disabled=false; }
    if(rate){
      var inp=document.getElementById('exMidInput');
      if(inp){ inp.value=rate; inp.dispatchEvent(new Event('input')); }
      toast('✅ BOC kurs yuklandi: 1 USD = ¥'+rate);
    } else {
      if(btn) btn.textContent='❌ Xato';
      toast('⚠️ Kurs yuklanmadi — manual kiriting');
    }
  });
}

function exFxSaveAll(){
  var mid = parseFloat(document.getElementById('exMidInput').value)||EX_FX_RATE;
  var sp  = (parseFloat(document.getElementById('exSpreadInput').value)||0.06)/100;
  EX_FX_RATE   = mid;
  EX_BOC_RATE  = mid;
  EX_SPREAD_PCT= sp;
  exFxSave();
  lsSave('ex_boc_rate',   mid);
  lsSave('ex_spread_pct', sp);
  document.getElementById('exOvFx').remove();
  renderExchangeDash();
  toast('✅ Kurs saqlandi: O\'rta ¥'+mid+' | Sotib olish ¥'+exBuyRate(mid)+' | Sotish ¥'+exSellRate(mid));
}

</script>
