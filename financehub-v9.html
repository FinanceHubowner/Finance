<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap');
:root{
  --bg:#0A0E1A;--s1:#0F1424;--s2:#141929;--s3:#1A2035;
  --b1:#1E2840;--b2:#263352;--b3:#2E3D63;
  --t1:#F0EFFF;--t2:#94A3C4;--t3:#506080;
  --acc:#6C8EFF;--grn:#00E5A0;--red:#FF4D6A;
  --amb:#FFB830;--pur:#A78BFF;--tel:#00D4FF;
  --cargo:#6C8EFF;--log:#00E5A0;--exc:#FFB830;--proc:#A78BFF;--hold:#FF7A50;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
  --r:10px;--r2:14px;
  --glow-blue:0 0 20px rgba(108,142,255,0.15);
  --glow-green:0 0 20px rgba(0,229,160,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg) !important;color:var(--t1);font-family:var(--sans);font-size:13px}
/* --- TOPBAR --- */
.topbar{height:52px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid rgba(108,142,255,0.15);background:var(--s1);position:sticky;top:0;z-index:100;gap:10px;position:relative}
.logo{font-family:var(--mono);font-size:13px;font-weight:600}
.logo em{color:var(--acc);font-style:normal;text-shadow:0 0 20px rgba(108,142,255,0.6)}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3)}
.bc-sep{color:var(--b3)}
.bc-item{cursor:pointer;padding:3px 7px;border-radius:4px;transition:.15s}
.bc-item:hover,.bc-item.cur{color:var(--t1)}
.bc-item:hover{background:var(--s3)}
.tr{margin-left:auto;display:flex;gap:6px;align-items:center}
.pb{padding:4px 9px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;font-size:11px;font-family:var(--sans)}
.pb.on{background:rgba(108,142,255,.15);border-color:rgba(108,142,255,.5);color:var(--acc);box-shadow:0 0 12px rgba(108,142,255,0.2)}
/* --- NAV --- */
.nav{display:flex;border-bottom:1px solid rgba(108,142,255,0.12);background:var(--s1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:0 24px;overflow-x:auto}
.navbtn{padding:10px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--t3);cursor:pointer;font-size:12px;font-family:var(--sans);white-space:nowrap;transition:.15s}
.navbtn.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:500;text-shadow:0 0 12px rgba(108,142,255,0.5)}
/* --- PAGES --- */
.page{display:none;padding:20px 24px;animation:fi .25s ease}
.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
/* --- CARDS --- */
.card{background:var(--s2);border:1px solid rgba(108,142,255,0.12);border-radius:var(--r2);padding:14px;backdrop-filter:blur(8px)}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:14px}
.kpi{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;cursor:pointer;position:relative;transition:all .2s}
.kpi:hover{border-color:var(--acc);transform:translateY(-3px);background:var(--s3)}
.kpi:hover::after{content:'→';position:absolute;bottom:7px;right:10px;font-size:10px;color:var(--acc);font-family:var(--mono)}
.kpi-l{font-size:11px;color:var(--t3);margin-bottom:5px}
.kpi-v{font-size:20px;font-weight:600;font-family:var(--mono)}
.kpi-s{font-size:11px;color:var(--t3);margin-top:3px}
/* --- CHART GRID --- */
.cgrid{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px}
.cc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;cursor:pointer;transition:.2s}
.cc:hover{border-color:var(--b2)}
.cc-lbl{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:9px}
/* --- TABLE --- */
.twrap{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:10px}
.thdr{padding:9px 13px;border-bottom:1px solid var(--b1);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.tlbl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.7px;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 11px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--b1);font-size:10px}
td{padding:7px 11px;border-bottom:1px solid rgba(26,32,53,.4)}
tr.cr{cursor:pointer}
tr.cr:hover td{background:rgba(255,255,255,.015)}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--mono)}
/* --- DIR CARDS --- */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:16px}
.dc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;cursor:pointer;position:relative;overflow:hidden;transition:all .25s}
.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dc:hover{transform:translateY(-4px);border-color:var(--acc)}
/* --- KASSA --- */
.kassgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.kcard{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;transition:.2s}.kcard:hover{border-color:var(--acc);transform:translateY(-1px)}
.kcard.neg{border-color:rgba(232,53,53,.3)}
/* --- DETAIL --- */
.dhdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.dbtn{padding:6px 13px;border-radius:6px;border:1px solid rgba(108,142,255,0.2);background:rgba(108,142,255,0.06);color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:.15s}
.dbtn:hover{border-color:rgba(108,142,255,0.6);color:var(--acc);background:rgba(108,142,255,0.1)}
.srow{display:flex;gap:14px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--b1);margin-bottom:14px}
.st{display:flex;flex-direction:column;gap:2px}
.stl{font-size:10px;color:var(--t3)}
.stv{font-size:17px;font-weight:600;font-family:var(--mono)}
/* --- CHECK --- */
.cpanel{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.crows{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.crow{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--bg);border-radius:6px;border:1px solid var(--b1)}
.cstat{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:600}
.cstat.ok{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.3);color:var(--grn);box-shadow:0 0 12px rgba(0,229,160,0.1)}
.cstat.err{background:rgba(232,53,53,.1);border:1px solid rgba(232,53,53,.3);color:var(--red)}
/* --- TRANSFER --- */
.flow{display:grid;grid-template-columns:90px 1fr 18px 1fr 100px 70px;gap:7px;align-items:center;padding:8px 11px;border-bottom:1px solid rgba(26,32,53,.4);cursor:pointer;transition:.15s}
.flow:hover{background:rgba(255,255,255,.015)}
.fpill{padding:3px 7px;border-radius:4px;font-size:10px;font-family:var(--mono);white-space:nowrap}
/* --- MISC --- */
/* Light tema uchun override */
body[style*="--is-light: 1"] .topbar,
.light-mode .topbar { border-bottom-color: rgba(100,116,139,0.25) !important; }
.kpi{box-shadow:none;transition:all .2s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(108,142,255,0.2);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:rgba(108,142,255,0.4)}
#toast{position:fixed;bottom:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:11px;font-family:var(--mono);background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--grn);box-shadow:0 8px 32px rgba(0,229,160,0.15);transform:translateY(50px);opacity:0;transition:.25s;z-index:999}
#toast.on{transform:none;opacity:1}
.slbl{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}
.sep{color:var(--b3)}
</style>
</head>

async function LGO() {
  var email = (document.getElementById("LE").value || "").trim();
  var pass = document.getElementById("LP").value;
  var err = document.getElementById("LE2");
  var btn = document.getElementById("LB");
  
  if (!email || !pass) { err.textContent = "Email va parol kiriting!"; return; }
  
  err.textContent = "";
  btn.textContent = "Tekshirilmoqda...";
  btn.disabled = true;

  try {
    var res = await SB.auth.signInWithPassword({email: email, password: pass});
    if (res.error) throw res.error;
    
    var uid = res.data.user.id;
    var prof = await SB.from("profiles").select("*").eq("id", uid).single();
    
    var profile = prof.data || {role:"owner", direction:null, full_name: email};
    profile.email = email;
    
    showDash(profile);
  } catch(e) {
    err.textContent = "Email yoki parol xato!";
    btn.textContent = "Kirish";
    btn.disabled = false;
  }
}

async function LGOUT() {
  await SB.auth.signOut();
  CUR_USER = null;
  document.getElementById("LE").value = "";
  document.getElementById("LP").value = "";
  document.getElementById("LE2").textContent = "";
  document.getElementById("LB").textContent = "Kirish";
  document.getElementById("LB").disabled = false;
  document.getElementById("LGN").style.display = "flex";
}

// Check existing session
window.addEventListener("load", async function() {
  if (!SB) return;
  try {
    var s = await SB.auth.getSession();
    if (s.data && s.data.session) {
      var uid = s.data.session.user.id;
      var prof = await SB.from("profiles").select("*").eq("id", uid).single();
      var profile = prof.data || {role:"owner", direction:null, full_name: s.data.session.user.email};
      profile.email = s.data.session.user.email;
      showDash(profile);
    }
  } catch(e) {}
});
</script>

const CURS=['USD','RMB','UZS'];
const KTYPES=['Naqd','Karta','Bank'];
const CLIENTS=['Alibaba Co.','Huawei Ltd.','BYD Group','Midea Corp.','Haier Inc.','SAIC Motor'];
const CSKUS=['Air Freight','Sea Freight','Express','Bulk'];
const LSKUS=['Full Truck','LTL','Warehouse','Last Mile'];
const PSKUS=['Electronics','Textiles','Machinery','Auto Parts','Chemicals'];

// HELPERS
// ════════════════════════════════════════════
const rnd=(a,b)=>Math.round(Math.random()*(b-a)+a);
const dys=(n)=>{const d=[];for(let i=n-1;i>=0;i--){const dt=new Date();dt.setDate(dt.getDate()-i);d.push(dt.toISOString().split('T')[0]);}return d;}
const sym=c=>({USD:'$',RMB:'¥',UZS:"so'm"}[c]||c);
const fmt=(n,d=0)=>isNaN(+n)?'—':(+n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fS=(n)=>{const a=Math.abs(n);return a>=1e6?(n/1e6).toFixed(1)+'M':a>=1e3?(n/1e3).toFixed(0)+'K':fmt(n);}
const $$=(n)=>`$${fS(n)}`;
const sk=(a,k)=>a.reduce((s,r)=>s+(+r[k]||0),0);
const pct=(a,b)=>b?Math.round(a/b*100):0;
const TIP={backgroundColor:'rgba(12,15,22,.96)',titleColor:'#4A5570',bodyColor:'#E8E4DC',cornerRadius:4,padding:8};
const GR={color:'rgba(255,255,255,.04)'};
const TX={color:'#4A5570',font:{size:10,family:'Geist Mono'}};
const LG={labels:{color:'#4A5570',font:{size:10},boxWidth:10}};

let PER=14, ACTV='l1', DRILL={dir:null,kpi:null,row:null};
let DATA={}, CHARTS={};

// ════════════════════════════════════════════
const CARGO_REASONS=[
  'Xitoydan elektronika importi','BYD Group yuk jo\'natmasi','Ombor to\'ldirish uchun tovar',
  'Mijoz buyurtmasi — urgent delivery','Shanxaydan konteyner yetkazish','Maxsus buyurtma — havo yo\'li',
  'Dengiz yo\'li orqali ommaviy yuk','Toshkentga ekspress yetkazish'];
const LOGI_REASONS=[
  'Samarqand shahriga yetkazish','To\'liq yuk — Namangan marshrutı','Oxirgi mil — shahar ichida',
  'Ombor xizmati — 30 kunlik saqlash','Farg\'ona viloyatiga LTL yuk','Tranzit — Qozog\'iston orqali',
  'Sovutgichli yuk tashish','Ko\'p marshrut — viloyatlararo'];
const EXCH_REASONS=[
  'Yetkazib beruvchiga to\'lov uchun RMB','Import to\'lovi — USD dan RMB ga',
  'Daromadni USD ga aylantirish','Dividend chiqarish uchun konversiya',
  'Operatsion xarajat uchun valyuta','Joriy kurs bo\'yicha almashtirish'];
const PROC_REASONS=[
  'Elektronika komponentlari xaridi','Tekstil materiallari buyurtmasi',
  'Mashina ehtiyot qismlari zakazi','Kimyoviy xom ashyo importi',
  'Avtomobil qismlari — Geely uchun','Fabrika jihozlari xaridi'];
const HOLD_EXP_REASONS=[
  'Oylik ish haqi xarajati','Ofis ijarasi to\'lovi','Kommunal xizmatlar to\'lovi',
  'Marketing va reklama xarajati','Yuridik xizmatlar to\'lovi','Soliq to\'lovi'];
const HOLD_TR_REASONS=[
  'Yo\'nalish likvidligini ta\'minlash','Kvartal moliyaviy yordam','Operatsion mablag\' uzatish',
  'Yangi loyiha uchun boshlang\'ich kapital'];

function genData(){
  DATA={};
  const ad=dys(30);
  DIRS.forEach(d=>{
    const rows=[];
    ad.forEach((date,i)=>{
      if(d.id==='cargo'||d.id==='logistics'){
        const sk2=d.id==='cargo'?CSKUS:LSKUS;
        const rArr=d.id==='cargo'?CARGO_REASONS:LOGI_REASONS;
        CLIENTS.slice(0,rnd(3,5)).forEach(cl=>{
          const rv=rnd(2000,15000),cg=Math.round(rv*rnd(40,62)/100),ex=rnd(200,1200);
          rows.push({date,client:cl,sku:sk2[rnd(0,sk2.length-1)],revenue:rv,cogs:cg,expense:ex,margin:rv-cg-ex,
            bank_usd:rnd(40000,120000),bank_cny:rnd(100000,600000),
            note:rArr[rnd(0,rArr.length-1)]});
        });
      } else if(d.id==='exchange'){
        const sp=rnd(400,2500),ex=rnd(80,500);
        rows.push({date,rmb_to_usd:rnd(30000,200000),rmb_rate:(rnd(688,722)/100),
          usd_to_rmb:rnd(20000,150000),usd_rate:(rnd(688,722)/100),
          spread:sp,expense:ex,net:sp-ex,cash_usd:rnd(80000,400000),cash_cny:rnd(300000,2000000),
          note:EXCH_REASONS[rnd(0,EXCH_REASONS.length-1)]});
      } else if(d.id==='procurement'){
        CLIENTS.slice(0,rnd(2,4)).forEach(cl=>{
          const ov=rnd(3000,40000),cr=rnd(3,9)/100,cm=Math.round(ov*cr),ex=rnd(100,800);
          rows.push({date,client:cl,sku:PSKUS[rnd(0,PSKUS.length-1)],order_value:ov,commission_rate:cr,commission:cm,
            expense:ex,net:cm-ex,bank_usd:rnd(20000,80000),
            note:PROC_REASONS[rnd(0,PROC_REASONS.length-1)]});
        });
      } else {
        const dv=i%7===0?rnd(4000,25000):0;
        const ln=i%11===0?rnd(8000,60000):0;
        const eo=rnd(300,4000),to=i%8===0?rnd(3000,30000):0;
        rows.push({date,div_in:dv,div_from:dv>0?['Cargo','Logistics'][rnd(0,1)]:'',
          loan_in:ln,exp_out:eo,tr_out:to,tr_to:to>0?DIRS.filter(x=>x.id!=='holding')[rnd(0,3)].name:'',
          cash_usd:rnd(60000,220000),
          note:to>0?HOLD_TR_REASONS[rnd(0,HOLD_TR_REASONS.length-1)]:HOLD_EXP_REASONS[rnd(0,HOLD_EXP_REASONS.length-1)]});
      }
    });
    DATA[d.id]=rows;
  });
  DATA.kassas={};
  DIRS.forEach(d=>{
    DATA.kassas[d.id]={};
    CURS.forEach(cur=>KTYPES.forEach(tp=>{
      const base={USD:rnd(5000,90000),RMB:rnd(50000,600000),UZS:rnd(5e6,200e6)}[cur];
      DATA.kassas[d.id][`${cur}_${tp}`]={balance:base,prev:base-rnd(-8000,12000),in:rnd(0,20000),out:rnd(0,15000)};
    }));
  });
}
genData();

const fil=(k)=>{
  if(DATE_FROM&&DATE_TO){
    return(DATA[k]||[]).filter(r=>r.date>=DATE_FROM&&r.date<=DATE_TO);
  }
  const d=new Set(dys(PER));
  return(DATA[k]||[]).filter(r=>d.has(r.date));
}

function goNav(id){
  ACTV=id;
  DRILL={dir:null,kpi:null,row:null};

function setBc(items){
  document.getElementById('bc').innerHTML=items.map((it,i)=>
    `<span class="bc-item${i===items.length-1?' cur':''}" onclick="${it.fn||''}">${it.lbl}</span>${i<items.length-1?'<span class="bc-sep">/</span>':''}`

}

function mkC(id,cfg){
  if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];}
  const ctx=document.getElementById(id);if(!ctx)return;
  CHARTS[id]=new Chart(ctx,cfg);
}

// ── DATE RANGE ──────────────────────────────────────────────
let DATE_FROM=null, DATE_TO=null, CUSTOM_MODE=false;

function setQuick(mode, btn){
  CUSTOM_MODE=false;
  document.getElementById('customPicker').style.display='none';
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const today=new Date();
  const fmt=d=>d.toISOString().split('T')[0];
  if(mode==='today'){
    DATE_FROM=fmt(today); DATE_TO=fmt(today); PER=1;
  } else if(mode==='week'){
    const f=new Date(today); f.setDate(f.getDate()-6);
    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=7;
  } else if(mode==='month'){
    const f=new Date(today); f.setDate(f.getDate()-29);
    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=30;
  } else if(mode==='quarter'){
    const f=new Date(today); f.setDate(f.getDate()-89);
    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=90;
  } else if(mode==='all'){
    DATE_FROM=null; DATE_TO=null; PER=365;
  }
  updateDateLabel();
  genData();
  goNav(ACTV);
}

function toggleCustom(){
  const p=document.getElementById('customPicker');
  const showing=p.style.display==='flex';
  p.style.display=showing?'none':'flex';
  if(!showing){
    const today=new Date();
    const fmt=d=>d.toISOString().split('T')[0];
    const f=new Date(today); f.setDate(f.getDate()-29);
    document.getElementById('dateFrom').value=DATE_FROM||fmt(f);
    document.getElementById('dateTo').value=DATE_TO||fmt(today);
  }
}

function applyCustom(){
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  if(!from||!to){toast('Sanalarni tanlang!');return;}
  if(from>to){toast('Boshlanish sanasi kattaroq!');return;}
  DATE_FROM=from; DATE_TO=to;
  CUSTOM_MODE=true;
  const diff=Math.ceil((new Date(to)-new Date(from))/(1000*60*60*24))+1;
  PER=diff;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  document.getElementById('customBtn').classList.add('on');
  document.getElementById('customPicker').style.display='none';
  updateDateLabel();
  genData();
  goNav(ACTV);
}

function updateDateLabel(){
  const el=document.getElementById('dateLabel');
  if(!el)return;
  if(DATE_FROM&&DATE_TO&&DATE_FROM===DATE_TO){
    el.textContent='Bugun: '+DATE_FROM.slice(5);
  } else if(DATE_FROM&&DATE_TO){
    el.textContent=DATE_FROM.slice(5)+' → '+DATE_TO.slice(5);
  } else {
    el.textContent='Barcha davr';
  }
}

function setPer(n,btn){
  PER=n;genData();
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  goNav(ACTV);
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

      const ag={};rows2.forEach(r=>{if(!ag[r.date])ag[r.date]={rv:0,cg:0,mg:0};ag[r.date].rv+=r.revenue;ag[r.date].cg+=r.cogs;ag[r.date].mg+=r.margin;});

      mkC('l2m',{type:'bar',data:{labels:ad.map(d=>d.slice(5)),datasets:[

      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});

// ════════════════════════════════════════════
// L3 — KPI DETAIL
// ════════════════════════════════════════════
function showKD(kpi){
  DRILL.kpi=kpi;
  const dirId=kpi.dirId||DRILL.dir;
  const dir=DIRS.find(d=>d.id===dirId)||{name:'Holding',c:'#4A7FF5',e:'🏦'};
  const rows=dirId?fil(dirId):[];
  const ad=dys(PER);
  let dv=[];

  if(kpi.metric&&dirId){
    const ag={};rows.forEach(r=>{if(!ag[r.date])ag[r.date]=0;ag[r.date]+=(+r[kpi.metric]||0);});
    dv=ad.map(d=>ag[d]||0);
  } else if(kpi.type==='holding'){
    dv=ad.map(date=>{let v=0;DIRS.forEach(d=>{const rw=(DATA[d.id]||[]).filter(r=>r.date===date);
      if(kpi.metric==='revenue'){if(d.id==='cargo'||d.id==='logistics')v+=sk(rw,'revenue');else if(d.id==='exchange')v+=sk(rw,'spread');else if(d.id==='procurement')v+=sk(rw,'commission');else v+=sk(rw,'div_in');}
      else if(kpi.metric==='profit'){if(d.id==='cargo'||d.id==='logistics')v+=sk(rw,'margin');else if(d.id==='exchange')v+=sk(rw,'net');else if(d.id==='procurement')v+=sk(rw,'net');else v+=sk(rw,'div_in')-sk(rw,'exp_out');}
    });return v;});
  } else {dv=ad.map(()=>rnd(1000,10000));}

  const avg=dv.length?Math.round(dv.reduce((a,b)=>a+b,0)/dv.length):0;
  const total=dv.reduce((a,b)=>a+b,0);
  const maxV=Math.max(...dv,1),minV=Math.min(...dv);
  const prevRows=(DATA[dirId]||[]).filter(r=>dys(PER*2).slice(0,PER).includes(r.date));
  const prevAg={};prevRows.forEach(r=>{if(!prevAg[r.date])prevAg[r.date]=0;prevAg[r.date]+=(+r[kpi.metric||'revenue']||0);});
  const pv=dys(PER*2).slice(0,PER).map(d=>prevAg[d]||0);
  const pTotal=pv.reduce((a,b)=>a+b,0);
  const chg=pTotal>0?Math.round((total-pTotal)/pTotal*100):0;

  ['l1','l2','l3','l4'].forEach(l=>{const p=document.getElementById('pg-'+l);p.classList.remove('on');p.style.display='';});
  const el=document.getElementById('pg-l3');
  el.classList.add('on');
  const backFn = dirId ? `renderL2('${dirId}')` : `goNav('l1')`;
  setBc([{lbl:'Holding',fn:"goNav('l1')"},{lbl:dir.name,fn:dirId?`renderL2('${dirId}')`:''},{lbl:kpi.title,fn:''}]);

  el.innerHTML=`
  <div class="dhdr">
    <button class="dbtn" onclick="${backFn}">← Orqaga</button>
    <div style="width:38px;height:38px;border-radius:8px;background:${kpi.color}18;border:1px solid ${kpi.color}33;display:flex;align-items:center;justify-content:center;font-size:18px">${dir.e}</div>
    <div><div style="font-size:15px;font-weight:600">${kpi.title}</div>
    <div style="font-size:11px;color:var(--t3)">${dir.name} · ${PER} kunlik chuqur tahlil</div></div>
  </div>
  <div class="srow">
    <div class="st"><div class="stl">Jami (${PER} kun)</div><div class="stv" style="color:${kpi.color}">${$$(total)}</div></div>
    <div class="st"><div class="stl">Kunlik o'rtacha</div><div class="stv">${$$(avg)}</div></div>
    <div class="st"><div class="stl">Maksimum</div><div class="stv" style="color:#17B374">${$$(maxV)}</div></div>
    <div class="st"><div class="stl">Minimum</div><div class="stv" style="color:${minV<0?'#E83535':'var(--t2)'}">${$$(minV)}</div></div>
    <div class="st"><div class="stl">Oldingi davr</div><div class="stv" style="color:${chg>=0?'#17B374':'#E83535'}">${chg>=0?'▲':'▼'} ${Math.abs(chg)}%</div></div>
  </div>
  <div class="cgrid" style="margin-bottom:10px">
    <div class="cc"><div class="cc-lbl">Kunlik dinamika + o'rtacha</div><div style="height:210px"><canvas id="l3m"></canvas></div></div>
    <div class="cc"><div class="cc-lbl">Bu davr vs oldingi davr</div><div style="height:210px"><canvas id="l3c"></canvas></div></div>
  </div>
  <div class="card" style="margin-bottom:10px"><div class="cc-lbl" style="margin-bottom:9px">Haftalik yig'indi</div><div style="height:140px"><canvas id="l3w"></canvas></div></div>
  <div class="twrap" style="margin-bottom:10px">
    <div class="thdr">
      <div class="tlbl">Kunlik yig'indi</div>
    </div>
    <table><thead><tr>
      <th>Sana</th>
      <th style="text-align:right">Qiymat</th>
      <th style="text-align:right">O'rtachaga nisbat</th>
      <th>Trend</th>
    </tr></thead><tbody>
    ${ad.slice().reverse().map((date,i)=>{const val=dv[ad.length-1-i]||0;const df=val-avg;const bw=maxV>0?Math.round(Math.abs(val)/maxV*80):0;
    return`<tr class="cr" onclick="showDayD('${date}','${dirId||'holding'}')">
      <td style="font-family:var(--mono);color:var(--t3)">${date}</td>

  // Rahbariyat xulosasi uchun hisoblar

    kimga=row.client||'—';
    nima=row.note||((row.sku||'')+' xizmati');
    xarajat=(row.cogs||0)+(row.expense||0);

    natija=row.margin||0;

    var disp=isA?$$(+v):isR?((+v)*100).toFixed(2)+'%':v;
    return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b1)">'
      +'<div style="color:var(--t3);font-size:12px">'+lbl+'</div>'
      +'<div style="font-family:var(--mono);font-weight:500;color:'+col+'">'+disp+'</div></div>';

  // Boshqa yozuvlar HTML
  var sdHTML = sdRows.length ? sdRows.map(function(r){
    var safeR=JSON.stringify(Object.assign({},r,{_dir:dirId})).replace(/"/g,'&quot;');
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b1);cursor:pointer" onclick="showRow('+safeR+')">'

function renderPL(){
  const el=document.getElementById('pg-l1');el.classList.add('on');
  setBc([{lbl:'Holding',fn:'goNav("l1")'},{lbl:'P&L Hisobot',fn:''}]);

  // Get direction filter
  const dir = CUR_USER && CUR_USER.role !== 'owner' ? CUR_USER.direction : null;

  // Generate P&L data from existing DATA
  const dirs = dir ? [DIRS.find(d=>d.id===dir)] : DIRS;

  const plData = dirs.map(d=>{
    const rows = fil(d.id);
    let rev=0, cogs=0, opex=0, da=0, interest=0, tax=0;

    if(d.id==='cargo'||d.id==='logistics'){
      rev = sk(rows,'revenue');
      cogs = sk(rows,'cogs');
      opex = sk(rows,'expense');
      da = rev * 0.02; // 2% depreciation estimate
      interest = 0;
      tax = Math.max(0, (rev-cogs-opex-da)*0.12); // 12% tax
    } else if(d.id==='exchange'){
      rev = sk(rows,'spread');
      cogs = 0;
      opex = sk(rows,'expense');
      da = 0;
      tax = Math.max(0, (rev-opex)*0.12);
    } else if(d.id==='procurement'){
      rev = sk(rows,'commission');
      cogs = 0;
      opex = sk(rows,'expense');
      da = 0;
      tax = Math.max(0, (rev-opex)*0.12);
    } else {
      rev = sk(rows,'div_in') + sk(rows,'loan_in');
      cogs = 0;
      opex = sk(rows,'exp_out');
      da = 0;
      tax = 0;
    }

    const gp = rev - cogs;
    const gpPct = rev > 0 ? (gp/rev*100).toFixed(1) : 0;
    const ebitda = gp - opex;
    const ebitdaPct = rev > 0 ? (ebitda/rev*100).toFixed(1) : 0;
    const ebit = ebitda - da;
    const ebt = ebit - interest;
    const netIncome = ebt - tax;
    const netPct = rev > 0 ? (netIncome/rev*100).toFixed(1) : 0;

    return {dir:d, rev, cogs, gp, gpPct, opex, ebitda, ebitdaPct, da, ebit, interest, tax, ebt, netIncome, netPct};
  });

  const totalRev = plData.reduce((s,d)=>s+d.rev,0);
  const totalNet = plData.reduce((s,d)=>s+d.netIncome,0);
  const totalGP = plData.reduce((s,d)=>s+d.gp,0);
  const totalEBITDA = plData.reduce((s,d)=>s+d.ebitda,0);

  // Waterfall chart data
  const wfData = [
    {lbl:'Daromad', val:totalRev, c:'#00E5A0'},
    {lbl:'COGS', val:-plData.reduce((s,d)=>s+d.cogs,0), c:'#FF4D6A'},
    {lbl:'Gross Profit', val:totalGP, c:'#6C8EFF', isTotal:true},
    {lbl:'OpEx', val:-plData.reduce((s,d)=>s+d.opex,0), c:'#FF4D6A'},
    {lbl:'EBITDA', val:totalEBITDA, c:'#FFB830', isTotal:true},
    {lbl:'D&A', val:-plData.reduce((s,d)=>s+d.da,0), c:'#FF7A50'},
    {lbl:'EBIT', val:plData.reduce((s,d)=>s+d.ebit,0), c:'#A78BFF', isTotal:true},
    {lbl:'Soliq', val:-plData.reduce((s,d)=>s+d.tax,0), c:'#FF4D6A'},
    {lbl:'Net Income', val:totalNet, c: totalNet>=0?'#00E5A0':'#FF4D6A', isTotal:true},
  ];

  el.innerHTML = `
  <!-- SUMMARY KPIs -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px">
    ${[
      {l:'Revenue',v:$$(totalRev),c:'#00E5A0'},
      {l:'Gross Profit',v:$$(totalGP),c:'#6C8EFF',s:`${totalRev>0?(totalGP/totalRev*100).toFixed(1):0}% marjin`},
      {l:'EBITDA',v:$$(totalEBITDA),c:'#FFB830',s:`${totalRev>0?(totalEBITDA/totalRev*100).toFixed(1):0}% marjin`},
      {l:'Net Income',v:$$(totalNet),c:totalNet>=0?'#00E5A0':'#FF4D6A',s:`${totalRev>0?(totalNet/totalRev*100).toFixed(1):0}% marjin`},
    ].map(k=>`
    <div class="kpi">
      <div class="kpi-l">${k.l}</div>
      <div class="kpi-v" style="color:${k.c}">${k.v}</div>
      ${k.s?`<div class="kpi-s">${k.s}</div>`:''}
    </div>`).join('')}
  </div>

  <!-- P&L WATERFALL + PIE -->
  <div class="cgrid" style="margin-bottom:14px">
    <div class="cc">
      <div class="cc-lbl">P&L Waterfall — daromaddan sof foydagacha</div>
      <div style="height:240px"><canvas id="pl_wf"></canvas></div>
    </div>
    <div class="cc">

      <div style="height:240px"><canvas id="pl_pie"></canvas></div>

  </div>

  <!-- DETAILED P&L TABLE -->
  <div class="twrap" style="margin-bottom:14px">
    <div class="thdr"><div class="tlbl">To'liq P&L Hisobot — yo'nalishlar kesimida</div></div>
    <div style="overflow-x:auto">

              ${row.neg && total>0 ? '-' : ''}${$$(Math.abs(total))}
            </td>`:''}
          </tr>`;
        }).join('')}

    </div>
  </div>

  <!-- MARGIN TRENDS -->
  <div class="cgrid">
    <div class="cc">
      <div class="cc-lbl">Kunlik daromad va sof foyda trendi</div>
      <div style="height:200px"><canvas id="pl_trend"></canvas></div>
    </div>
    <div class="cc">
      <div class="cc-lbl">Marjinallik ko'rsatkichlari</div>
      <div style="height:200px"><canvas id="pl_margin"></canvas></div>
    </div>
  </div>`;

  setTimeout(()=>{
    const ad = dys(PER);
    // Waterfall chart
    mkC('pl_wf',{
      type:'bar',
      data:{
        labels: wfData.map(d=>d.lbl),
        datasets:[{
          label:'P&L',
          data: wfData.map(d=>d.val),
          backgroundColor: wfData.map(d=>d.c+'cc'),
          borderColor: wfData.map(d=>d.c),
          borderWidth:1,
          borderRadius:4,
        }]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TIP,callbacks:{label:c=>`${c.label}: ${$$(c.raw)}`}}},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}
    });

    // Expense pie
    const expData = [
      {l:'COGS', v:plData.reduce((s,d)=>s+d.cogs,0), c:'#FF4D6A'},
      {l:'OpEx', v:plData.reduce((s,d)=>s+d.opex,0), c:'#FFB830'},
      {l:'D&A', v:plData.reduce((s,d)=>s+d.da,0), c:'#FF7A50'},
      {l:'Soliq', v:plData.reduce((s,d)=>s+d.tax,0), c:'#A78BFF'},
    ].filter(d=>d.v>0);
    mkC('pl_pie',{type:'doughnut',data:{labels:expData.map(d=>d.l),datasets:[{data:expData.map(d=>d.v),backgroundColor:expData.map(d=>d.c+'99'),borderColor:expData.map(d=>d.c),borderWidth:1,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:{...TIP,callbacks:{label:c=>`${c.label}: ${$$(c.raw)}`}}},cutout:'60%'}});

    // Trend chart
    const trendRev = ad.map(date=>{
      let v=0;
      (dir?[dir]:DIRS.map(d=>d.id)).forEach(id=>{
        const rw=(DATA[id]||[]).filter(r=>r.date===date);
        if(id==='cargo'||id==='logistics') v+=sk(rw,'revenue');
        else if(id==='exchange') v+=sk(rw,'spread');
        else if(id==='procurement') v+=sk(rw,'commission');
        else if(id==='holding') v+=sk(rw,'div_in')+sk(rw,'loan_in');
      });
      return v;
    });
    const trendNet = trendRev.map(r=>r*0.15); // simplified net
    mkC('pl_trend',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[
      {label:'Revenue',data:trendRev,borderColor:'#00E5A0',backgroundColor:'#00E5A015',fill:true,tension:.4,pointRadius:0,borderWidth:2},
      {label:'Net Income',data:trendNet,borderColor:'#6C8EFF',tension:.4,pointRadius:0,borderWidth:2},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});

    // Margin chart
    const gpPcts = ad.map(date=>{
      let r=0,c=0;
      (dir?[dir]:DIRS.map(d=>d.id)).forEach(id=>{
        const rw=(DATA[id]||[]).filter(r=>r.date===date);
        if(id==='cargo'||id==='logistics'){r+=sk(rw,'revenue');c+=sk(rw,'cogs');}
        else if(id==='exchange') r+=sk(rw,'spread');
        else if(id==='procurement') r+=sk(rw,'commission');
        else if(id==='holding') r+=sk(rw,'div_in')+sk(rw,'loan_in');
      });
      return r>0?Math.round((r-c)/r*100):0;
    });
    mkC('pl_margin',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[
      {label:'GP Margin %',data:gpPcts,borderColor:'#6C8EFF',tension:.4,pointRadius:0,borderWidth:2},
      {label:'Net Margin %',data:gpPcts.map(v=>Math.round(v*0.35)),borderColor:'#00E5A0',tension:.4,pointRadius:0,borderWidth:1.5,borderDash:[4,2]},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>v+'%'},grid:GR}}}});
  },50);
}

// KASSALAR

function renderKassa(){
  const el=document.getElementById('pg-l1');el.classList.add('on');
  setBc([{lbl:'Holding',fn:'goNav("l1")'},{lbl:'Kassalar',fn:''}]);

  const totalByDir=DIRS.map(d=>{
    const kas=DATA.kassas[d.id]||{};
    const usd=KTYPES.reduce((s,t)=>s+(kas[`USD_${t}`]?.balance||0),0);
    const rmb=KTYPES.reduce((s,t)=>s+(kas[`RMB_${t}`]?.balance||0),0);
    const uzs=KTYPES.reduce((s,t)=>s+(kas[`UZS_${t}`]?.balance||0),0);
    return{...d,usd,rmb,uzs,ekv:usd+rmb/7.1+uzs/12700};
  });

  const grandUSD=totalByDir.reduce((s,d)=>s+d.usd,0);
  const grandRMB=totalByDir.reduce((s,d)=>s+d.rmb,0);
  const grandUZS=totalByDir.reduce((s,d)=>s+d.uzs,0);

  el.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div style="font-size:15px;font-weight:600">Multi-Kassa Tizimi</div>
    <div style="font-size:11px;color:var(--t3);font-family:var(--mono)">5 yo'nalish × 9 kassa = 45 ta kassa</div>
  </div>

  <div class="cpanel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:11px;font-family:var(--mono);letter-spacing:.7px;text-transform:uppercase">Umumiy balans holati</div>
      <div class="cstat ok">✓ BARCHA KASSALAR FAOL</div>
    </div>
    <div class="crows">
      <div class="crow"><div style="font-size:12px;color:var(--t3)">Jami USD</div><div style="font-family:var(--mono);font-weight:600;color:#17B374">$${fmt(grandUSD)}</div></div>
      <div class="crow"><div style="font-size:12px;color:var(--t3)">Jami RMB</div><div style="font-family:var(--mono);font-weight:600;color:#D48C0A">¥${fmt(grandRMB)}</div></div>
      <div class="crow"><div style="font-size:12px;color:var(--t3)">Jami UZS</div><div style="font-family:var(--mono);font-weight:600;color:#1D9E75">${fmt(Math.round(grandUZS/1e6))}M</div></div>
      <div class="crow"><div style="font-size:12px;color:var(--t3)">USD ekvivalent</div><div style="font-family:var(--mono);font-weight:600;color:#0DB5A0">$${fmt(Math.round(totalByDir.reduce((s,d)=>s+d.ekv,0)))}</div></div>
    </div>
  </div>

  ${DIRS.map(d=>{
    const kas=DATA.kassas[d.id]||{};
    const checks=CURS.map(cur=>{
      const inT=KTYPES.reduce((s,t)=>s+(kas[`${cur}_${t}`]?.in||0),0);
      const outT=KTYPES.reduce((s,t)=>s+(kas[`${cur}_${t}`]?.out||0),0);
      const chk=inT-outT;
      return{cur,inT,outT,chk};
    });
    const allOk=checks.every(c=>Math.abs(c.chk)<1);

    return`<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600">
          <span>${d.e}</span><span style="color:${d.c}">${d.name}</span>
        </div>
        <div class="cstat ${allOk?'ok':'err'}">${allOk?'✓ CHECK=0':'⚠ FARQ'}</div>
      </div>
      <div class="kassgrid">
        ${CURS.flatMap(cur=>KTYPES.map(tp=>{
          const b=kas[`${cur}_${tp}`]||{balance:0,prev:0};
          const ch=b.balance-b.prev;
          const tc={Naqd:'#17B374',Karta:'#4A7FF5',Bank:'#7B55F5'}[tp];
          return`<div class="kcard${b.balance<0?' neg':''}">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <div style="font-family:var(--mono);font-size:10px;color:var(--t3)">${cur} ${tp.toUpperCase()}</div>
              <span style="background:${tc}18;color:${tc};border:1px solid ${tc}33;font-size:10px;padding:1px 5px;border-radius:3px">${tp}</span>
            </div>
            <div style="font-family:var(--mono);font-size:18px;font-weight:600;color:${b.balance<0?'#E83535':'var(--t1)'}">${sym(cur)}${fmt(b.balance)}</div>
            <div style="font-size:10px;color:${ch>=0?'#17B374':'#E83535'};margin-top:3px">${ch>=0?'▲':'▼'} ${sym(cur)}${fmt(Math.abs(ch))}</div>
          </div>`;
        })).join('')}
      </div>
    </div>`;
  }).join('')}`;
}

function renderCashflow(){
  const el=document.getElementById('pg-l1');el.classList.add('on');
  setBc([{lbl:'Holding',fn:'goNav("l1")'},{lbl:'Cash Flow',fn:''}]);
  const c=fil('cargo'),l=fil('logistics'),e=fil('exchange'),p=fil('procurement'),h=fil('holding');
  const inflow=sk(c,'revenue')+sk(l,'revenue')+sk(e,'spread')+sk(p,'commission')+sk(h,'div_in')+sk(h,'loan_in');
  const outflow=sk(c,'cogs')+sk(c,'expense')+sk(l,'cogs')+sk(l,'expense')+sk(e,'expense')+sk(p,'expense')+sk(h,'exp_out')+sk(h,'tr_out');
  const net=inflow-outflow;
  const ad=dys(PER);
  const iArr=ad.map(d=>{const fd=r=>r.date===d;return sk(c.filter(fd),'revenue')+sk(l.filter(fd),'revenue')+sk(e.filter(fd),'spread')+sk(p.filter(fd),'commission')+sk(h.filter(fd),'div_in');});
  const oArr=ad.map(d=>{const fd=r=>r.date===d;return-(sk(c.filter(fd),'cogs')+sk(c.filter(fd),'expense')+sk(l.filter(fd),'cogs')+sk(l.filter(fd),'expense')+sk(e.filter(fd),'expense')+sk(p.filter(fd),'expense')+sk(h.filter(fd),'exp_out'));});
  let cum=0;const cumArr=iArr.map((v,i)=>{cum+=v+oArr[i];return cum;});

  el.innerHTML=`
  <div class="kgrid">
    <div class="kpi" onclick="showKD({id:'cf_in',title:'Jami Inflow',color:'#17B374',type:'cf'})"><div class="kpi-l">Jami kirish (inflow)</div><div class="kpi-v" style="color:#17B374">${$$(inflow)}</div></div>
    <div class="kpi" onclick="showKD({id:'cf_out',title:'Jami Outflow',color:'#E83535',type:'cf'})"><div class="kpi-l">Jami chiqish (outflow)</div><div class="kpi-v" style="color:#E83535">${$$(outflow)}</div></div>
    <div class="kpi" onclick="showKD({id:'cf_net',title:'Sof Pul Oqimi',color:net>0?'#17B374':'#E83535',type:'cf'})"><div class="kpi-l">Sof pul oqimi</div><div class="kpi-v" style="color:${net>0?'#17B374':'#E83535'}">${$$(net)}</div></div>
  </div>
  <div class="card" style="margin-bottom:10px"><div class="cc-lbl">Kunlik kirish / chiqish</div><div style="height:220px"><canvas id="cf_bar"></canvas></div></div>
  <div class="card" style="margin-bottom:10px"><div class="cc-lbl">Kümülatif naqd pozitsiya</div><div style="height:180px"><canvas id="cf_area"></canvas></div></div>
  <div class="twrap"><div class="thdr"><div class="tlbl">Perebroska jadvali</div></div>
  <table><thead><tr><th>Sana</th><th>Kimdan</th><th>Kimga</th><th style="text-align:right">Miqdor</th></tr></thead><tbody>
  ${h.filter(r=>r.tr_out>0).map(r=>`<tr class="cr" onclick="showRow(${JSON.stringify({...r,_dir:'holding'}).replace(/"/g,'&quot;')})">
    <td style="font-family:var(--mono);color:var(--t3)">${r.date?.slice(5)}</td>
    <td><span class="bdg" style="background:rgba(232,101,42,.12);color:#E8652A">Holding</span></td>
    <td><span class="bdg" style="background:rgba(74,127,245,.12);color:#4A7FF5">${r.tr_to||'—'}</span></td>
    <td style="text-align:right;font-family:var(--mono);font-weight:500;color:#D48C0A">${$$(r.tr_out)}</td>
  </tr>`).join('')}
  </tbody></table></div>`;

  setTimeout(()=>{
    mkC('cf_bar',{type:'bar',data:{labels:ad.map(d=>d.slice(5)),datasets:[{label:'Kirish',data:iArr,backgroundColor:'#17B37488',borderRadius:3},{label:'Chiqish',data:oArr,backgroundColor:'#E8353588',borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(Math.abs(v))}`},grid:GR}}}});
    mkC('cf_area',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[{label:'Saldo',data:cumArr,borderColor:'#0DB5A0',backgroundColor:'rgba(13,181,160,.1)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});
  },40);
}

      <div style="font-size:10px;color:var(--t3)">Klient</div><input type="text" id="ef_cl" placeholder="Alibaba Co.">
      <div style="font-size:10px;color:var(--t3)">SKU</div><input type="text" id="ef_sk" placeholder="Air Freight">
      <div style="font-size:10px;color:var(--t3)">Daromad ($)</div><input type="number" id="ef_rv" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">COGS ($)</div><input type="number" id="ef_cg" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Xarajat ($)</div><input type="number" id="ef_ex" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Bank USD</div><input type="number" id="ef_bu" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Bank CNY</div><input type="number" id="ef_bc" placeholder="0">`;
    } else if(biz==='exchange'){
      fields=`<div style="font-size:10px;color:var(--t3)">Sana</div><input type="date" id="ef_d" value="${new Date().toISOString().split('T')[0]}">
      <div style="font-size:10px;color:var(--t3)">RMB→USD (¥)</div><input type="number" id="ef_ra" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">RMB kurs</div><input type="number" id="ef_rr" placeholder="7.10">
      <div style="font-size:10px;color:var(--t3)">USD→RMB ($)</div><input type="number" id="ef_ua" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">USD kurs</div><input type="number" id="ef_ur" placeholder="7.12">
      <div style="font-size:10px;color:var(--t3)">Spread ($)</div><input type="number" id="ef_sp" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Xarajat ($)</div><input type="number" id="ef_ex" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Kassa USD</div><input type="number" id="ef_cu" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Kassa CNY</div><input type="number" id="ef_cc" placeholder="0">`;
    } else if(biz==='procurement'){
      fields=`<div style="font-size:10px;color:var(--t3)">Sana</div><input type="date" id="ef_d" value="${new Date().toISOString().split('T')[0]}">
      <div style="font-size:10px;color:var(--t3)">Klient</div><input type="text" id="ef_cl" placeholder="BYD Group">
      <div style="font-size:10px;color:var(--t3)">Kategoriya</div><input type="text" id="ef_cat" placeholder="Electronics">
      <div style="font-size:10px;color:var(--t3)">Buyurtma ($)</div><input type="number" id="ef_ov" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Komissiya stavka</div><input type="number" id="ef_cr" placeholder="0.05" step="0.001">
      <div style="font-size:10px;color:var(--t3)">Komissiya ($)</div><input type="number" id="ef_cm" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Xarajat ($)</div><input type="number" id="ef_ex" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Bank USD</div><input type="number" id="ef_bu" placeholder="0">`;
    } else {
      fields=`<div style="font-size:10px;color:var(--t3)">Sana</div><input type="date" id="ef_d" value="${new Date().toISOString().split('T')[0]}">
      <div style="font-size:10px;color:var(--t3)">Dividend kirdi ($)</div><input type="number" id="ef_dv" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Qaysi yo'nalishdan</div><input type="text" id="ef_df" placeholder="Cargo">
      <div style="font-size:10px;color:var(--t3)">Qarz kirdi ($)</div><input type="number" id="ef_ln" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Xarajat chiqdi ($)</div><input type="number" id="ef_eo" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Perebroska ($)</div><input type="number" id="ef_to" placeholder="0">
      <div style="font-size:10px;color:var(--t3)">Kimga</div><input type="text" id="ef_tt" placeholder="Cargo">
      <div style="font-size:10px;color:var(--t3)">Kassa USD</div><input type="number" id="ef_cu" placeholder="0">`;
    }
    return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">${pills}</div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">${fields}
        <div style="font-size:10px;color:var(--t3)">📝 Sabab / Maqsad <span style="color:#FF4D6A">*</span></div>
        <div><input type="text" id="ef_rs" placeholder="Nima uchun? (masalan: Mijoz buyurtmasi, Ombor to'ldirish...)" style="width:100%;border-color:rgba(108,142,255,0.4)"></div>
        <div style="font-size:10px;color:var(--t3)">👤 Kimga / Kimdan?</div>
        <div><input type="text" id="ef_to2" placeholder="Qabul qiluvchi yoki manba..."></div>
        <div style="grid-column:span 2;font-size:10px;color:var(--t3)">💬 Qo'shimcha izoh</div>
        <div style="grid-column:span 2"><input type="text" id="ef_nt" placeholder="Batafsil izoh (ixtiyoriy)..." style="width:100%"></div>
      </div>
      <button onclick="saveEnt('${biz}')" style="width:100%;padding:11px;border-radius:var(--r);border:none;background:var(--acc);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--sans)">✓ Saqlash</button>
      <div id="ent_msg" style="margin-top:8px;font-size:12px;color:#17B374;min-height:18px"></div>
    </div>`;
  }

  window.setEB=function(id){
    entBiz=id;
    document.getElementById('entryArea').innerHTML=entryHTML(id);
  };
  window.saveEnt=async function(biz){
    const gv=id=>{const e=document.getElementById(id);return e?e.value:'';};
    const date=gv('ef_d')||new Date().toISOString().split('T')[0];
    const reason=gv('ef_rs')||'';
    const toFrom=gv('ef_to2')||'';
    const note=(reason?(reason+(toFrom?' — Kimga: '+toFrom:'')):'')+(gv('ef_nt')?(' | '+gv('ef_nt')):'');
    const m=document.getElementById('ent_msg');
    let row={date};
    let sbTable=null,sbRow=null;

    if(biz==='cargo'||biz==='logistics'){
      const rv=+gv('ef_rv')||0,cg=+gv('ef_cg')||0,ex=+gv('ef_ex')||0;
      row={...row,client:gv('ef_cl')||'—',sku:gv('ef_sk')||'—',revenue:rv,cogs:cg,expense:ex,margin:rv-cg-ex,bank_usd:+gv('ef_bu')||0,bank_cny:+gv('ef_bc')||0};
      DATA[biz].push(row);
      sbTable=biz+'_entries';
      sbRow={entry_date:date,client_name:row.client,sku:row.sku,revenue_usd:rv,cogs_usd:cg,expense_usd:ex,bank_balance_usd:+gv('ef_bu')||0,bank_balance_cny:+gv('ef_bc')||0,note};
    } else if(biz==='exchange'){
      const sp=+gv('ef_sp')||0,ex=+gv('ef_ex')||0;
      row={...row,rmb_to_usd:+gv('ef_ra')||0,rmb_rate:+gv('ef_rr')||0,usd_to_rmb:+gv('ef_ua')||0,usd_rate:+gv('ef_ur')||0,spread:sp,expense:ex,net:sp-ex,cash_usd:+gv('ef_cu')||0,cash_cny:+gv('ef_cc')||0};
      DATA.exchange.push(row);
      sbTable='exchange_entries';
      sbRow={entry_date:date,rmb_to_usd_amount:+gv('ef_ra')||0,rmb_to_usd_rate:+gv('ef_rr')||0,usd_to_rmb_amount:+gv('ef_ua')||0,usd_to_rmb_rate:+gv('ef_ur')||0,spread_usd:sp,expense_usd:ex,cash_balance_usd:+gv('ef_cu')||0,cash_balance_cny:+gv('ef_cc')||0,note};
    } else if(biz==='procurement'){
      const cm=+gv('ef_cm')||0,ex=+gv('ef_ex')||0;
      row={...row,client:gv('ef_cl')||'—',sku:gv('ef_cat')||'—',order_value:+gv('ef_ov')||0,commission_rate:+gv('ef_cr')||0,commission:cm,expense:ex,net:cm-ex,bank_usd:+gv('ef_bu')||0};
      DATA.procurement.push(row);
      sbTable='procurement_entries';
      sbRow={entry_date:date,client_name:row.client,product_category:row.sku,order_value_usd:+gv('ef_ov')||0,commission_rate:+gv('ef_cr')||0,commission_usd:cm,expense_usd:ex,bank_balance_usd:+gv('ef_bu')||0,note};
    } else {
      row={...row,div_in:+gv('ef_dv')||0,div_from:gv('ef_df'),loan_in:+gv('ef_ln')||0,exp_out:+gv('ef_eo')||0,tr_out:+gv('ef_to')||0,tr_to:gv('ef_tt'),cash_usd:+gv('ef_cu')||0};
      DATA.holding.push(row);
      sbTable='holding_entries';
      sbRow={entry_date:date,dividend_in_usd:+gv('ef_dv')||0,dividend_from:gv('ef_df'),loan_in_usd:+gv('ef_ln')||0,expense_out_usd:+gv('ef_eo')||0,transfer_out_usd:+gv('ef_to')||0,transfer_out_to:gv('ef_tt'),cash_balance_usd:+gv('ef_cu')||0,note};
    }

    if(m) m.textContent='Saqlanmoqda...';
    if(SB&&sbTable&&sbRow){
      try{
        const {error}=await SB.from(sbTable).insert(sbRow);
        if(error)throw error;
        if(m){m.textContent='✓ Supabase ga saqlandi!';setTimeout(()=>m.textContent='',3000);}
      }catch(e){
        console.error('Supabase save error:',e);
        if(m){m.textContent='⚠ Lokal saqlandi (DB: '+e.message+')';setTimeout(()=>m.textContent='',4000);}
      }
    } else {
      if(m){m.textContent='✓ Saqlandi!';setTimeout(()=>m.textContent='',2500);}
    }
  };

  el.innerHTML=`<div style="font-size:15px;font-weight:600;margin-bottom:14px">Ma'lumot kiritish</div><div id="entryArea">${entryHTML('cargo')}</div>`;
}

  forest:  ":root{--bg:#080F0D;--s1:#0C1410;--s2:#111A14;--s3:#16221A;--b1:#1C2E22;--b2:#243A2A;--b3:#2C4832;--t1:#ECFDF5;--t2:#86B09A;--t3:#4A7060;--acc:#4ADE80;--grn:#4ADE80;--red:#F87171;--amb:#FACC15;--pur:#A78BFA;--tel:#60A5FA;--cargo:#60A5FA;--log:#4ADE80;--exc:#FACC15;--proc:#A78BFA;--hold:#FB923C}",
  light:   ":root{--bg:#F1F5F9;--s1:#FFFFFF;--s2:#F8FAFC;--s3:#E2E8F0;--b1:#CBD5E1;--b2:#94A3B8;--b3:#64748B;--t1:#0F172A;--t2:#334155;--t3:#64748B;--acc:#6366F1;--grn:#059669;--red:#DC2626;--amb:#D97706;--pur:#7C3AED;--tel:#0284C7;--cargo:#6366F1;--log:#059669;--exc:#D97706;--proc:#7C3AED;--hold:#EA580C}",
  sky:     ":root{--bg:#EFF6FF;--s1:#FFFFFF;--s2:#F0F9FF;--s3:#E0F2FE;--b1:#BAE6FD;--b2:#7DD3FC;--b3:#38BDF8;--t1:#0C1A2E;--t2:#1E3A5F;--t3:#4A7FA5;--acc:#2563EB;--grn:#059669;--red:#DC2626;--amb:#D97706;--pur:#7C3AED;--tel:#0284C7;--cargo:#2563EB;--log:#059669;--exc:#D97706;--proc:#7C3AED;--hold:#EA580C}"
};

function setT(id) {
  var el = document.getElementById("TS");
  if (el) el.textContent = TCSS[id] || TCSS.slate;
  localStorage.setItem("fht", id);
  var isLight = (id==='light'||id==='sky');
  ["slate","midnight","aurora","carbon","forest","light","sky"].forEach(function(t) {
    var btn = document.getElementById("tb_" + t);
    if (btn) btn.style.border = t === id ? ("2px solid "+(isLight?"#334155":"white")) : (t==='light'?"2px solid #CBD5E1":"2px solid transparent");
  });
  // Light temalarda matn va border ranglarini moslashtirish
  document.body.style.setProperty('--is-light', isLight?'1':'0');
  var topbar = document.querySelector('.topbar');
  if(topbar) topbar.style.borderBottomColor = isLight?'rgba(100,116,139,0.3)':'rgba(108,142,255,0.15)';
}

window.addEventListener("load", function() {
  var saved = localStorage.getItem("fht") || "slate";
  setT(saved);
});
</script>
