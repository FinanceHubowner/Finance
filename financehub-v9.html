<!DOCTYPE html>


<html lang="uz">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>FinanceHub — To'liq Tizim</title>


<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>


@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap');


:root{


  --bg:#0A0E1A;--s1:#0F1424;--s2:#141929;--s3:#1A2035;


  --b1:#1E2840;--b2:#263352;--b3:#2E3D63;


  --t1:#F0EFFF;--t2:#94A3C4;--t3:#506080;


  --acc:#6C8EFF;--grn:#00E5A0;--red:#FF4D6A;


  --amb:#FFB830;--pur:#A78BFF;--tel:#00D4FF;


  --cargo:#6C8EFF;--log:#00E5A0;--exc:#FFB830;--proc:#A78BFF;--hold:#FF7A50;


  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;


  --r:10px;--r2:14px;


  --glow-blue:0 0 20px rgba(108,142,255,0.15);


  --glow-green:0 0 20px rgba(0,229,160,0.15);


}


*{box-sizing:border-box;margin:0;padding:0}


body{background:var(--bg) !important;color:var(--t1);font-family:var(--sans);font-size:13px}


/* --- TOPBAR --- */


.topbar{height:52px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid rgba(108,142,255,0.15);background:var(--s1);position:sticky;top:0;z-index:100;gap:10px;position:relative}


.logo{font-family:var(--mono);font-size:13px;font-weight:600}


.logo em{color:var(--acc);font-style:normal;text-shadow:0 0 20px rgba(108,142,255,0.6)}


.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3)}


.bc-sep{color:var(--b3)}


.bc-item{cursor:pointer;padding:3px 7px;border-radius:4px;transition:.15s}


.bc-item:hover,.bc-item.cur{color:var(--t1)}


.bc-item:hover{background:var(--s3)}


.tr{margin-left:auto;display:flex;gap:6px;align-items:center}


.pb{padding:4px 9px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;font-size:11px;font-family:var(--sans)}


.pb.on{background:rgba(108,142,255,.15);border-color:rgba(108,142,255,.5);color:var(--acc);box-shadow:0 0 12px rgba(108,142,255,0.2)}


/* --- NAV --- */


.nav{display:flex;border-bottom:1px solid rgba(108,142,255,0.12);background:var(--s1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:0 20px;overflow-x:auto;gap:2px}


.navbtn{padding:9px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--t3);cursor:pointer;font-size:12px;font-family:var(--sans);white-space:nowrap;transition:.15s}


.navbtn.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:600;text-shadow:0 0 12px rgba(108,142,255,0.5)}


/* ── Sub-nav (direction-level) ── */


.subnav{display:flex;align-items:center;gap:4px;padding:6px 24px;background:var(--s2);border-bottom:1px solid var(--b1);overflow-x:auto}


.subnav-dir{display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.4px;border:none;background:transparent;cursor:default;white-space:nowrap}


.snbtn{padding:5px 12px;border:1px solid transparent;border-radius:6px;background:transparent;color:var(--t3);cursor:pointer;font-size:11px;font-family:var(--sans);white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:5px}


.snbtn:hover{background:var(--b1);color:var(--t2)}


.snbtn.on{background:var(--b2);color:var(--t1);border-color:var(--b3);font-weight:500}


.snbtn-sep{width:1px;height:16px;background:var(--b2);margin:0 4px;flex-shrink:0}


/* --- PAGES --- */


.page{display:none;padding:20px 24px;animation:fi .25s ease}


.page.on{display:block}


@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}


/* --- CARDS --- */


.card{background:var(--s2);border:1px solid rgba(108,142,255,0.12);border-radius:var(--r2);padding:14px;backdrop-filter:blur(8px)}


.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:14px}


.kpi{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;cursor:pointer;position:relative;transition:all .2s}


.kpi:hover{border-color:var(--acc);transform:translateY(-3px);background:var(--s3)}


.kpi:hover::after{content:'→';position:absolute;bottom:7px;right:10px;font-size:10px;color:var(--acc);font-family:var(--mono)}


.kpi-l{font-size:11px;color:var(--t3);margin-bottom:5px}


.kpi-v{font-size:20px;font-weight:600;font-family:var(--mono)}


.kpi-s{font-size:11px;color:var(--t3);margin-top:3px}


/* --- CHART GRID --- */


.cgrid{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px}


.cc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;cursor:pointer;transition:.2s}


.cc:hover{border-color:var(--b2)}


.cc-lbl{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:9px}


/* --- TABLE --- */


.twrap{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:10px}


.thdr{padding:9px 13px;border-bottom:1px solid var(--b1);background:var(--s2);display:flex;align-items:center;justify-content:space-between}


.tlbl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.7px;text-transform:uppercase}


table{width:100%;border-collapse:collapse;font-size:12px}


th{text-align:left;padding:6px 11px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--b1);font-size:10px}


td{padding:7px 11px;border-bottom:1px solid rgba(26,32,53,.4)}


tr.cr{cursor:pointer}


tr.cr:hover td{background:rgba(255,255,255,.015)}


.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--mono)}


/* --- DIR CARDS --- */


.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:16px}


.dc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;cursor:pointer;position:relative;overflow:hidden;transition:all .25s}


.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}


.dc:hover{transform:translateY(-4px);border-color:var(--acc)}


/* --- KASSA --- */


.kassgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}


.kcard{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;transition:.2s}.kcard:hover{border-color:var(--acc);transform:translateY(-1px)}


.kcard.neg{border-color:rgba(232,53,53,.3)}


/* --- DETAIL --- */


.dhdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}


.dbtn{padding:6px 13px;border-radius:6px;border:1px solid rgba(108,142,255,0.2);background:rgba(108,142,255,0.06);color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:.15s}


.dbtn:hover{border-color:rgba(108,142,255,0.6);color:var(--acc);background:rgba(108,142,255,0.1)}


.srow{display:flex;gap:14px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--b1);margin-bottom:14px}


.st{display:flex;flex-direction:column;gap:2px}


.stl{font-size:10px;color:var(--t3)}


.stv{font-size:17px;font-weight:600;font-family:var(--mono)}


/* --- CHECK --- */


.cpanel{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:14px}


.crows{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}


.crow{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--bg);border-radius:6px;border:1px solid var(--b1)}


.cstat{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:600}


.cstat.ok{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.3);color:var(--grn);box-shadow:0 0 12px rgba(0,229,160,0.1)}


.cstat.err{background:rgba(232,53,53,.1);border:1px solid rgba(232,53,53,.3);color:var(--red)}


/* --- TRANSFER --- */


.flow{display:grid;grid-template-columns:90px 1fr 18px 1fr 100px 70px;gap:7px;align-items:center;padding:8px 11px;border-bottom:1px solid rgba(26,32,53,.4);cursor:pointer;transition:.15s}


.flow:hover{background:rgba(255,255,255,.015)}


.fpill{padding:3px 7px;border-radius:4px;font-size:10px;font-family:var(--mono);white-space:nowrap}


/* --- MISC --- */


/* Light tema uchun override */


body[style*="--is-light: 1"] .topbar,


.light-mode .topbar { border-bottom-color: rgba(100,116,139,0.25) !important; }


.kpi{box-shadow:none;transition:all .2s}


.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}


::-webkit-scrollbar{width:3px;height:3px}


::-webkit-scrollbar-thumb{background:rgba(108,142,255,0.2);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:rgba(108,142,255,0.4)}


#toast{position:fixed;bottom:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:11px;font-family:var(--mono);background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--grn);box-shadow:0 8px 32px rgba(0,229,160,0.15);transform:translateY(50px);opacity:0;transition:.25s;z-index:999}


#toast.on{transform:none;opacity:1}


.slbl{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}


.sep{color:var(--b3)}


/* ── INPUT SYSTEM (faqat entry area ichida) ── */


#entryArea input[type=text],#entryArea input[type=number],#entryArea input[type=date],#entryArea select{


  background:var(--s3);color:var(--t1);border:1px solid var(--b2);border-radius:6px;


  padding:7px 10px;font-size:12px;font-family:var(--sans);outline:none;transition:.15s;width:100%;box-sizing:border-box}


#entryArea input[type=text]:focus,#entryArea input[type=number]:focus,#entryArea input[type=date]:focus,#entryArea select:focus{


  border-color:var(--acc);box-shadow:0 0 0 2px rgba(108,142,255,0.12)}


#entryArea input::placeholder{color:var(--t3)}


</style>


</head>


<body>








<div id="LGN" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#0A0E1A;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px">


<div style="background:#0F1424;border:1px solid rgba(108,142,255,0.25);border-radius:16px;padding:36px;width:100%;max-width:360px">


  <div style="font-size:22px;font-weight:700;font-family:monospace;margin-bottom:6px"><span style="color:#6C8EFF">Finance</span>Hub</div>


  <div style="font-size:12px;color:#506080;margin-bottom:24px">Holding moliyaviy boshqaruv tizimi</div>


  <div style="margin-bottom:12px">


    <div style="font-size:11px;color:#506080;margin-bottom:5px">Email</div>


    <input id="LE" type="email" placeholder="email@example.com"


      style="width:100%;background:#0A0E1A;border:1px solid rgba(108,142,255,0.2);border-radius:8px;padding:10px 12px;color:#F0EFFF;font-size:13px;outline:none;box-sizing:border-box"


      onkeydown="if(event.key==='Enter')LGO()">


  </div>


  <div style="margin-bottom:16px">


    <div style="font-size:11px;color:#506080;margin-bottom:5px">Parol</div>


    <input id="LP" type="password" placeholder="••••••••"


      style="width:100%;background:#0A0E1A;border:1px solid rgba(108,142,255,0.2);border-radius:8px;padding:10px 12px;color:#F0EFFF;font-size:13px;outline:none;box-sizing:border-box"


      onkeydown="if(event.key==='Enter')LGO()">


  </div>


  <button id="LB" onclick="LGO()"


    style="width:100%;padding:12px;border-radius:8px;border:none;background:#6C8EFF;color:#fff;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit">


    Kirish


  </button>


  <div id="LE2" style="color:#FF4D6A;font-size:12px;text-align:center;margin-top:8px;min-height:18px"></div>


  <div style="margin-top:14px;padding-top:12px;border-top:1px solid rgba(108,142,255,0.1);font-size:11px;color:#3A4860;text-align:center;line-height:1.9">


    Supabase da yaratilgan email va parol bilan kiring


  </div>


</div>


</div>





<script>

// User profiles — owner va yo'nalish menejerlar ro'yxati
// Bu ro'yxatda bo'lmagan barcha Supabase foydalanuvchilari
// avtomatik Exchange (Tangachi) yo'nalishiga yo'naltiriladi
var FH_USER_PROFILES = {
  // === OWNER ===
  'chinwakil@controller.com':   {role:'owner',   direction:null,          full_name:'Chinwakil (Owner)'},
  'owner@financehub.com':       {role:'owner',   direction:null,          full_name:'Owner'},
  // === YO'NALISH MENEJERLAR ===
  'logistics@manager.com':      {role:'manager', direction:'logistics',   full_name:'Logistics Manager'},
  'cargo@manager.com':          {role:'manager', direction:'cargo',       full_name:'Cargo Manager'},
  'exchange@manager.com':       {role:'manager', direction:'exchange',    full_name:'Exchange Manager'},
  'procurement@manager.com':    {role:'manager', direction:'procurement', full_name:'Procurement Manager'},
};
// Tanilmagan email → Tangachi (Exchange) xodimi sifatida kiradi
var FH_DEFAULT_PROFILE = {role:'staff', direction:'exchange', full_name:'Exchange Staff'};

var SB = null;

var CUR_USER = null;





// Init Supabase


try {


  SB = supabase.createClient(


    "https://khgnirqhuyswjmxxkonc.supabase.co",


    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoZ25pcnFodXlzd2pteHhrb25jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NjM3NDAsImV4cCI6MjA5NjAzOTc0MH0.leKaMvt2jiUX1MLS6FW-jd6R_Ql17iUBYvcT-p7y8rY"


  );


} catch(e) { console.log("Supabase init error:", e); }





function showDash(profile) {


  CUR_USER = profile;


  document.getElementById("LGN").style.display = "none";


  


  setTimeout(function() {


    var el = document.getElementById("UI");


    if (el) {


      var rc = {owner:"#00E5A0", manager:"#6C8EFF", staff:"#FFB830"};


      var role = profile.role || "staff";


      el.innerHTML =


        "<span style='color:#94A3C4;font-size:11px'>" + (profile.full_name || profile.email) + "</span> " +


        "<span style='background:rgba(108,142,255,0.1);color:" + (rc[role]||"#6C8EFF") + ";font-size:10px;padding:2px 8px;border-radius:999px'>" + role + "</span> " +


        "<button onclick='LGOUT()' style='padding:4px 10px;border-radius:5px;border:1px solid rgba(108,142,255,0.2);background:transparent;color:#506080;cursor:pointer;font-size:11px'>Chiqish</button>";


    }





    var DIR_LBL = {cargo:"Cargo",logistics:"Logistics",exchange:"Exchange",procurement:"Procurement",holding:"Holding Kassa"};


    var DIR_ICO = {cargo:"📦",logistics:"🚛",exchange:"💱",procurement:"🏭",holding:"🏦"};


    var d = profile.direction;

    // Non-owner: ALLOWED_NAVS orqali har doim cheklangan nav
    if (profile.role !== "owner") {
      d = d || "exchange";
    } else {
      window.ALLOWED_NAVS = null;
    }

    if (profile.role !== "owner" && d) {


      window.NAVS = [


        {id: d, lbl: DIR_ICO[d] + " " + DIR_LBL[d]},


        {id: "pl",       lbl: "📊 P&L"},


        {id: "cashflow", lbl: "💵 Cash Flow"},


        {id: "balance",  lbl: "⚖️ Balans"},


        {id: "kassa",    lbl: "💳 Kassalar"},


        {id: "entry",    lbl: "✏️ Kiritish"}


      ];


      ACTV = d;


      DRILL = {dir: d, kpi: null, row: null};


      window.ALLOWED_NAVS = [{id: d, lbl: DIR_ICO[d] + " " + DIR_LBL[d]}];
      buildNav();


      renderL2(d);


    } else {


      window.NAVS = [


        {id:"l1",lbl:"🏦 Holding"},


        {id:"cargo",lbl:"📦 Cargo"},


        {id:"logistics",lbl:"🚛 Logistics"},


        {id:"exchange",lbl:"💱 Exchange"},


        {id:"procurement",lbl:"🏭 Procurement"},


        {id:"pl",lbl:"📊 P&L"},


        {id:"kassa",lbl:"💳 Kassalar"},


        {id:"cashflow",lbl:"💵 Cash Flow"},


        {id:"balance",lbl:"⚖️ Balans"},


        {id:"entry",lbl:"✏️ Kiritish"}


      ];


      ACTV = "l1";


      buildNav();


      renderL1();


    }


  }, 100);


}





async function LGO() {


  var email = (document.getElementById("LE").value || "").trim();


  var pass = document.getElementById("LP").value;


  var err = document.getElementById("LE2");


  var btn = document.getElementById("LB");


  


  if (!email || !pass) { err.textContent = "Email va parol kiriting!"; return; }


  


  err.textContent = "";


  btn.textContent = "Tekshirilmoqda...";


  btn.disabled = true;





  try {


    var res = await SB.auth.signInWithPassword({email: email, password: pass});


    if (res.error) throw res.error;


    


    var uid = res.data.user.id;

    // 1. Aniq belgilangan owner/manager emaillar
    var profile;
    if (FH_USER_PROFILES[email]) {
      profile = FH_USER_PROFILES[email];
    } else {
      // 2. Supabase profiles jadvalidan direction o'qish
      var prof = await SB.from('profiles').select('direction,full_name').eq('id', uid).single();
      var sbDir = prof.data && prof.data.direction ? prof.data.direction : null;
      if (sbDir) {
        // direction bor — o'sha yo'nalish xodimi (role hech qachon owner emas)
        profile = {role:'staff', direction:sbDir, full_name: (prof.data.full_name || email)};
      } else {
        // direction yo'q — Tangachi (Exchange) xodimi
        profile = Object.assign({}, FH_DEFAULT_PROFILE, {full_name: email});
      }
    }

    profile.email = email;
    showDash(profile);


  } catch(e) {


    err.textContent = "Email yoki parol xato!";


    btn.textContent = "Kirish";


    btn.disabled = false;


  }


}





async function LGOUT() {


  await SB.auth.signOut();


  CUR_USER = null;


  document.getElementById("LE").value = "";


  document.getElementById("LP").value = "";


  document.getElementById("LE2").textContent = "";


  document.getElementById("LB").textContent = "Kirish";


  document.getElementById("LB").disabled = false;


  document.getElementById("LGN").style.display = "flex";


}





// Check existing session


window.addEventListener("load", async function() {


  if (!SB) return;


  try {


    var s = await SB.auth.getSession();


    if (s.data && s.data.session) {


      var uid = s.data.session.user.id;
      var semail = s.data.session.user.email;

      var profile;
      if (FH_USER_PROFILES[semail]) {
        profile = FH_USER_PROFILES[semail];
      } else {
        var prof2 = await SB.from('profiles').select('direction,full_name').eq('id', uid).single();
        var sbDir2 = prof2.data && prof2.data.direction ? prof2.data.direction : null;
        if (sbDir2) {
          profile = {role:'staff', direction:sbDir2, full_name: (prof2.data.full_name || semail)};
        } else {
          profile = Object.assign({}, FH_DEFAULT_PROFILE, {full_name: semail});
        }
      }

      profile.email = semail;
      showDash(profile);


    }


  } catch(e) {}


});


</script>

<style id="TS">:root{--bg:#0A0E1A;--s1:#0F1424;--s2:#141929;--s3:#1A2035;--b1:#1E2840;--b2:#263352;--b3:#2E3D63;--t1:#F0EFFF;--t2:#94A3C4;--t3:#506080;--acc:#6C8EFF;--grn:#00E5A0;--red:#FF4D6A;--amb:#FFB830;--pur:#A78BFF;--tel:#00D4FF;--cargo:#6C8EFF;--log:#00E5A0;--exc:#FFB830;--proc:#A78BFF;--hold:#FF7A50}</style>

  <button title="Slate (Qorang'u)" onclick="setT('slate')" style="width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#6C8EFF,#00E5A0);border:2px solid transparent;cursor:pointer;padding:0" id="tb_slate"></button>


  <button title="Midnight" onclick="setT('midnight')" style="width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#38BDF8,#34D399);border:2px solid transparent;cursor:pointer;padding:0" id="tb_midnight"></button>

// INTERCOMPANY ELIMINATION


// Holding div_in from subsidiaries is eliminated in consolidated P&L


// Only Holding's own OpEx and external income is kept


// ════════════════════════════════════════════


function isIntercoTxn(t){


  if(t.is_interco) return true;


  // Auto-detect: Holding income where subcat contains 'Dividend' = interco


  if(t.direction==='holding' && t.type==='income' &&


     t.subcat && (t.subcat.indexOf('Dividend')>=0 || t.subcat.indexOf('dividend')>=0)) return true;


  // Transfer type = interco movement


  if(t.type==='transfer') return true;


  return false;


}





// ════════════════════════════════════════════


// MONTHLY AGGREGATION


// Returns P&L by period for rolling 12-month view


// ════════════════════════════════════════════


// ✅ ACCRUAL-BASED P&L: uses accrual_period (not payment date) for P&L grouping


// IAS 18 / IFRS 15: revenue recognised when earned; IAS 1: expenses matched to revenue period


// `accrual_period` = qaysi oy uchun (P&L), `date` = qachon kassadan o'tgan (CF)


function calcMonthlyPL(direction, excludeInterco){


  var months = {};


  var txns = direction ? TXNS.filter(function(t){return t.direction===direction;}) : TXNS;


  txns.forEach(function(t){


    if(t.status==='Bekor') return;


    if(excludeInterco && isIntercoTxn(t)) return;


    // ✅ Accrual period: explicit field → fallback to period field → fallback to payment date


    // This is the core of "метод начисления": use the period the cost/revenue BELONGS TO,


    // not when cash was paid/received.


    var p = t.accrual_period || t.period || dateToPeriod(t.date);


    if(!p) return;


    if(!months[p]) months[p]={


      period:p, income:0, cogs:0, opex:0, finance:0, transfer:0,


      // Track if any transactions have accrual ≠ payment (for UI indicator)


      has_accrual_diff: false


    };


    // Flag: this month has at least one accrual adjustment


    if(t.accrual_period && t.payment_period && t.accrual_period !== t.payment_period){


      months[p].has_accrual_diff = true;


    }


    var a = +(t.amount)||0;


    // ✅ CapEx → P&L ga kirmaydi (IAS 16: aktivlashtiriladi)


    if(t.is_capex || t.type==='capex') return;


    // ✅ Loan-in → P&L daromad emas (IAS 7)


    if(t.is_loan_in || t.type==='loan_in') return;


    // ✅ Advance → P&L xarajat emas — Balance Sheet prepayment (IAS 2/18)


    if(t.type==='advance') return;


    // ✅ Inventar kirimi → P&L ga kirmaydi — Balance Sheet CA (IAS 2)


    if(t.type==='inventory') return;


    if(t.type==='income')                months[p].income   += a;


    else if(t.type==='refund')           months[p].income   -= a; // Daromaddan ayiriladi


    else if(t.type==='cogs')             months[p].cogs     += a;


    else if(t.type==='opex')             months[p].opex     += a;


    // ✅ Tax, penalty, insurance, provision → OpEx bucket (P&L xarajat)


    else if(t.type==='tax')              months[p].opex     += a;


    else if(t.type==='penalty')          months[p].opex     += a;


    else if(t.type==='insurance')        months[p].opex     += a;


    else if(t.type==='provision')           months[p].opex     += a;


    // ✅ COGS Release (IAS 2.34): yuk yetkazildi → COGS


    else if(t.type==='inventory_release')   months[p].cogs     += a;


    else if(t.type==='finance')             months[p].finance  += a;


    else if(t.type==='transfer')            months[p].transfer += a;


  });


  // Add derived P&L metrics (IFRS chain)


  Object.keys(months).forEach(function(p){


    var m=months[p];


    m.gp     = m.income - m.cogs;


    m.ebitda = m.gp - m.opex;


    m.ebit   = m.ebitda; // D&A allocated at period level separately (not per-txn)


    m.ebt    = m.ebit - m.finance;


    m.tax    = Math.max(0, Math.round(m.ebt * 0.12));


    m.net    = m.ebt - m.tax;


  });


  return months;


}





// Cash Flow grouping by PAYMENT date (separate from P&L accrual grouping)


// IAS 7: cash flows = actual cash movement dates


function calcMonthlyCF(direction){


  var months = {};


  var txns = direction ? TXNS.filter(function(t){return t.direction===direction;}) : TXNS;


  txns.forEach(function(t){


    if(t.status==='Bekor') return;


    // CF uses PAYMENT date, not accrual period


    var p = t.payment_period || dateToPeriod(t.date);


    if(!p) return;


    if(!months[p]) months[p]={period:p, cash_in:0, cash_out:0};


    var a = +(t.amount)||0;


    if(t.type==='income') months[p].cash_in += a;


    else if(t.type!=='transfer') months[p].cash_out += a;


  });


  Object.keys(months).forEach(function(p){


    months[p].net_cf = months[p].cash_in - months[p].cash_out;


  });


  return months;


}





// ════════════════════════════════════════════


// IAS 21 — VALYUTA KURSI FARQLARI (FX GAIN/LOSS)


// ════════════════════════════════════════════


// Realized FX G/L: tranzaksiya kiritilgan kurs vs hozirgi kurs farqi


// Unrealized FX G/L: kassa/AR/AP qoldiqlari joriy kursda qayta baholanishi


//


// Formula (IAS 21.28):


//   FX Gain/Loss = (joriy_kurs - daftardagi_kurs) × chet_valyuta_miqdori


//   Musbat → foyda (kurs qulay o'zgardi)


//   Manfiy → zarar (kurs noqulay o'zgardi)


// ════════════════════════════════════════════


function calcFXGainLoss(){


  var currentRates = { RMB: OB.fx_rate_rmb||7.10, UZS: OB.fx_rate_uzs||12700, USD: 1 };





  // ── 1. REALIZED FX G/L ─────────────────────


  // Har bir valyutali tranzaksiyada: daftardagi kurs vs joriy kurs farqi


  // Misol: RMB 1000 kurs 7.1 bilan yozilgan → $140.85


  //         Endi kurs 7.5 → RMB 1000 = $133.33 → realized loss = -$7.52


  var realized = [];


  TXNS.forEach(function(t){


    if(t.status==='Bekor') return;


    if(!t.currency || t.currency==='USD') return;


    if(!t.amount_orig || !t.fx_rate) return;


    var bookedRate  = +t.fx_rate;                        // kiritilgan kurs


    var currentRate = currentRates[t.currency] || bookedRate;


    if(bookedRate === currentRate) return;                // farq yo'q


    var origAmt     = +t.amount_orig;                    // chet valyuta miqdori


    var bookedUSD   = origAmt / bookedRate;              // daftardagi USD


    var currentUSD  = origAmt / currentRate;             // joriy USD


    var gl          = currentUSD - bookedUSD;            // farq


    // Expense uchun: kurs oshsa → zarar (ko'proq USD kerak)


    // Income uchun: kurs tushsa → zarar (kamroq USD olamiz)


    if(t.type !== 'income') gl = -gl; // xarajatlar uchun teskari


    realized.push({


      txn_id: t.id,


      date: t.date,


      period: t.accrual_period || t.period || dateToPeriod(t.date),


      direction: t.direction,


      currency: t.currency,


      orig_amt: origAmt,


      booked_rate: bookedRate,


      current_rate: currentRate,


      booked_usd: Math.round(bookedUSD*100)/100,


      current_usd: Math.round(currentUSD*100)/100,


      gl: Math.round(gl*100)/100,


      purpose: t.purpose||t.subcat||'',


      type: 'realized'


    });


  });





  // ── 2. UNREALIZED FX G/L ───────────────────


  // Kassa qoldiqlari joriy kursda qayta baholanishi (IAS 21.23)


  // Davr oxirida RMB/UZS kassalari yangi kursda USD ga o'giriladi


  var unrealized = [];


  ensureKassaData();


  DIRS.forEach(function(d){


    var kas = KASSA_DATA[d.id]||{};


    ['RMB','UZS'].forEach(function(cur){


      var rate = currentRates[cur];


      KTYPES.forEach(function(tp){


        var b = kas[cur+'_'+tp]||{};


        var balOrig = b.balance||0; // chet valyutadagi balans


        if(!balOrig) return;


        // We need the "booked rate" — average rate of transactions that built this balance


        // Simplified: use OB rate as reference (ideally weighted average of all cash-in txns)


        var txnRates = TXNS.filter(function(t){


          return t.direction===d.id && t.currency===cur && t.type==='income' && t.status!=='Bekor';


        }).map(function(t){return +t.fx_rate||rate;});


        var avgBookedRate = txnRates.length


          ? txnRates.reduce(function(s,r){return s+r;},0)/txnRates.length


          : rate;


        var bookedUSD  = balOrig / avgBookedRate;


        var currentUSD = balOrig / rate;


        var gl = currentUSD - bookedUSD;


        if(Math.abs(gl) < 0.01) return;


        unrealized.push({


          direction: d.id,


          currency: cur,


          balance_orig: balOrig,


          booked_rate: Math.round(avgBookedRate*1000)/1000,


          current_rate: rate,


          booked_usd: Math.round(bookedUSD*100)/100,


          current_usd: Math.round(currentUSD*100)/100,


          gl: Math.round(gl*100)/100,


          type: 'unrealized'


        });


      });


    });


  });





  var totalRealized   = realized.reduce(function(s,r){return s+r.gl;},0);


  var totalUnrealized = unrealized.reduce(function(s,r){return s+r.gl;},0);


  var totalGL         = totalRealized + totalUnrealized;





  return {


    realized: realized,


    unrealized: unrealized,


    total_realized: Math.round(totalRealized*100)/100,


    total_unrealized: Math.round(totalUnrealized*100)/100,


    total_gl: Math.round(totalGL*100)/100,


    // Per-currency breakdown


    by_currency: (function(){


      var res={};


      realized.forEach(function(r){res[r.currency]=(res[r.currency]||0)+r.gl;});


      unrealized.forEach(function(r){res[r.currency]=(res[r.currency]||0)+r.gl;});


      return res;


    })()


  };


}





// Budget vs Actual for a period+direction


function getBudgetForPeriod(period, direction, type){


  var items = BUDGET_DATA.filter(function(b){


    return b.period===period && (direction?b.direction===direction:true) && (type?b.type===type:true);

}

// FINANCIAL HEALTH KPIs


// ════════════════════════════════════════════


function calcFinancialKPIs(bsVals){


  var ca=bsVals.total_ca, cl=bsVals.total_cl, inv=bsVals.ca_inventory;


  var equity=bsVals.total_equity, debt=bsVals.total_liab;


  var ebitda=bsVals.ebitda, interest=bsVals.interest_total;


  var ar=bsVals.ca_ar, ap=bsVals.cl_ap, rev=bsVals.rev, cogs=bsVals.cogs;


  var daysInPer = bsVals.period_days || 365;


  return {


    current_ratio:   cl>0 ? +(ca/cl).toFixed(2) : null,


    quick_ratio:     cl>0 ? +((ca-inv)/cl).toFixed(2) : null,


    de_ratio:        equity>0 ? +(debt/equity).toFixed(2) : null,


    dscr:            interest>0 ? +(ebitda/interest).toFixed(2) : null,


    ar_days:         rev>0 ? Math.round(ar/(rev/daysInPer)) : null,


    ap_days:         cogs>0 ? Math.round(ap/(cogs/daysInPer)) : null,


    inv_days:        cogs>0 ? Math.round(inv/(cogs/daysInPer)) : null,


    net_margin:      rev>0 ? +(bsVals.net_income/rev*100).toFixed(1) : null,


    ebitda_margin:   rev>0 ? +(ebitda/rev*100).toFixed(2) : null,


    roe:             equity>0 ? +(bsVals.net_income/equity*100).toFixed(1) : null,


    roa:             bsVals.total_assets>0 ? +(bsVals.net_income/bsVals.total_assets*100).toFixed(1) : null,


    working_capital: ca - cl


  };


}

// COA helper: subcat string → {code, name}


function coaSubParse(s){ return typeof s==='object' ? s : {code:'13',name:s}; }


function coaGroup(dir,type){ var c=dir==='holding'?COA_HOLDING:COA; return (c[type]||{}).group||'Метод начисления'; }


function coaCode(dir,type,nm){ var c=dir==='holding'?COA_HOLDING:COA; var s=(c[type]||{}).subs||[]; var f=s.find(function(x){return (typeof x==='object'?x.name:x)===nm;}); return f?(typeof f==='object'?f.code:'13'):'13'; }


function isCapEx(t){ return t.type==='capex'||t.group==='Основные_средства'||(t.coa_code&&(t.coa_code==='21'||t.coa_code==='22'||t.coa_code==='25')); }


function isLoanTxn(t){ return t.type==='loan_in'||t.group==='Кредит'||(t.coa_code&&(t.coa_code==='31'||t.coa_code==='33'||t.coa_code==='34'||t.coa_code==='41'||t.coa_code==='42')); }

// ── Validation engine ─────────────────────────────────────────


// Returns {ok: bool, errors: [], warnings: []}


function validateTxn(txn, extraFields){


  var errors=[], warnings=[];


  var rule = VAL_RULES[txn.coa_code] || VAL_RULES[txn.coa_code+'f'] || {};





  // 1. Majburiy umumiy maydonlar


  if(!txn.amount || txn.amount<=0)      errors.push('❌ Summa kiritilmagan yoki 0');


  if(!txn.purpose || txn.purpose.length<3) errors.push('❌ Sabab/Maqsad kamida 3 ta belgi bo\'lishi kerak');





  // 2. COA qoidasiga ko\'ra majburiy maydonlar


  (rule.require_fields||[]).forEach(function(f){


    if(f==='counterparty' && (!txn.counterparty||txn.counterparty==='—'))


      errors.push('❌ Kontragent/Mijoz talab qilinadi ('+rule.label+')');


    if(f==='note' && (!txn.note||txn.note.length<5))


      errors.push('❌ Izoh majburiy: '+rule.label+' uchun batafsil izoh yozing');


    if(f==='period_range' && !txn.period_range)


      errors.push('❌ Период (masalan 1-25) maoshi uchun talab qilinadi');


  });





  // 3. Miqdor chegaralari


  if(rule.min_amount && txn.amount < rule.min_amount)


    errors.push('❌ Minimal summa: $'+rule.min_amount+' ('+rule.label+')');


  if(rule.warn_threshold && txn.amount >= rule.warn_threshold && !txn.note)


    warnings.push('⚠️ $'+txn.amount+' — katta summa. Izoh qo\'shish tavsiya qilinadi');


  if(rule.require_note_above && txn.amount >= rule.require_note_above && (!txn.note||txn.note.length<10))


    errors.push('❌ $'+rule.require_note_above+' dan katta CapEx uchun batafsil izoh majburiy');





  // 4. Kelajak sana tekshiruvi


  var today=new Date().toISOString().split('T')[0];


  if(txn.date > today)


    warnings.push('⚠️ Kelajak sana kiritilgan: '+txn.date+'. To\'g\'riligini tekshiring');





  // 5. Katta summa ogohlantirishi (universal)


  if(txn.amount > 50000 && !txn.note)


    warnings.push('⚠️ $50,000 dan katta tranzaksiya — izoh va tasdiqlash tavsiya qilinadi');


  if(txn.amount > 100000)


    warnings.push('⚠️ $100,000 dan katta — moliyaviy nazorat (CFO approval) kerak');





  // 6. Non-cash tekshiruvi


  if(rule.is_non_cash && txn.currency!=='USD')


    warnings.push('⚠️ Non-cash yozuv — kassa harakati yo\'q. Valyuta USD bo\'lishi kerak');





  // 7. INPS eslatmasi


  if(rule.warn_no_inps && txn.coa_code==='12'){


    var inpsExists = TXNS.filter(function(t){


      return t.direction===txn.direction && t.coa_code==='51' &&


             t.accrual_period===txn.accrual_period;


    }).length > 0;


    if(!inpsExists)


      warnings.push('⚠️ Maosh kiritildi — INPS 12% va JSHDS 12% to\'lovlarini ham kiriting (Soliq va Yig\'imlar)');


  }





  // 8. Dublikat tekshiruvi


  if(rule.duplicate_check){


    var dup = TXNS.filter(function(t){


      return t.direction===txn.direction && t.type===txn.type &&


             Math.abs(t.amount-txn.amount)<0.01 &&


             t.counterparty===txn.counterparty &&


             t.date===txn.date && t.id!==txn.id;


    });


    if(dup.length>0)


      warnings.push('⚠️ Mumkin bo\'lgan dublikat: Xuddi shunday tranzaksiya ('


        +txn.counterparty+', $'+txn.amount+') bugun allaqachon mavjud!');


  }





  // 9. CapEx-specific: holding tranzaksiya bo'lmasa ham qo'shimcha tekshiruv


  if(isCapEx(txn) && txn.amount > 0){


    var hasAssetName = extraFields && extraFields['ef_asset_name'];


    if(!hasAssetName)


      warnings.push('⚠️ Aktiv nomi/inventar raqami kiritilmagan — IAS 16 bo\'yicha tavsiya qilinadi');


  }





  return {ok: errors.length===0, errors:errors, warnings:warnings};


}

// TXNS → DATA: Haqiqiy tranzaksiyalardan ma'lumot qurish


// ════════════════════════════════════════════


function buildDataFromTXNS(){


  ensureKassaData();


  DATA = {};


  DIRS.forEach(function(d){ DATA[d.id]=[]; });


  // Kassa: KASSA_DATA dan foydalanish


  DATA.kassas = {};


  DIRS.forEach(function(d){ DATA.kassas[d.id] = KASSA_DATA[d.id] || {}; });





  if(!TXNS || TXNS.length === 0) return;





  // Sanalar bo'yicha filterlash


  var activeDates = null;


  if(DATE_FROM && DATE_TO){


    // date range filter


    activeDates = 'range';


  } else if(PER >= 99999){


    activeDates = 'all';


  } else {


    activeDates = new Set(dys(PER));


  }





  // Yo'nalish+sana bo'yicha guruhlash


  // ✅ ACCRUAL: P&L uchun accrual_period orqali filter; CF uchun date orqali filter


  // Dashboard va grafiklarda ACCRUAL period ishlatiladi (P&L to'g'ri chiqishi uchun)


  var byKey = {};


  TXNS.forEach(function(t){


    if(t.status === 'Bekor') return;


    // Accrual date: P&L qaysi davr uchun hisoblanadi


    var accrualDate = (t.accrual_period ? t.accrual_period + '-15' : null) || t.date;


    var dateOk = activeDates === 'all'
      ? true
      : activeDates === 'range'


      ? (accrualDate >= DATE_FROM && accrualDate <= DATE_TO)


      : (activeDates.has(t.date) || activeDates.has(accrualDate));


    if(!dateOk) return;


    var dir = t.direction || 'holding';


    // Group by accrual date for P&L accuracy (not payment date)


    var displayDate = t.date; // Keep original date for display


    var k = dir + '|' + displayDate;


    if(!byKey[k]) byKey[k] = {dir:dir, date:displayDate, txns:[]};


    byKey[k].txns.push(t);


  });





  Object.keys(byKey).forEach(function(k){


    var g = byKey[k], d = g.dir, date = g.date, txns = g.txns;


    if(!DATA[d]) return;





    var income=0, cogs_=0, opex_=0, finance_=0, transfer_=0, capex_=0, loan_in_=0;


    txns.forEach(function(t){


      var a = Math.abs(+(t.amount)||0);


      // ✅ CapEx → P&L xarajat EMAS, Balance Sheet NCA ga boradi (IAS 16)


      if(t.is_capex || t.type==='capex')              capex_    += a;


      // ✅ Loan-in → P&L daromad EMAS, CF Moliyaviy faoliyat (IAS 7)


      else if(t.is_loan_in || t.type==='loan_in')    loan_in_  += a;


      // ✅ Inventar kirimi → Balance Sheet CA (IAS 2) — P&L ga kirmaydi


      else if(t.type==='inventory')                   loan_in_  += a; // BS Joriy aktiv sifatida


      // ✅ Advance → Balance Sheet aktiv (Debitor/Avans), P&L ga kirmaydi


      else if(t.type==='advance')                     loan_in_  += a; // BS Joriy aktiv sifatida


      else if(t.type==='income')                      income    += a;


      // ✅ Refund/qaytarish → daromaddan ayiriladi


      else if(t.type==='refund')                      income    -= a;


      else if(t.type==='cogs')                        cogs_     += a;


      // ✅ COGS Release: inventardan chiqdi → COGS (IAS 2.34)


      else if(t.type==='inventory_release')           cogs_     += a;


      else if(t.type==='opex')                        opex_     += a;


      // ✅ Tax, penalty, insurance, provision → OpEx ga boriladi (P&L)


      else if(t.type==='tax')                         opex_     += a;


      else if(t.type==='penalty')                     opex_     += a;


      else if(t.type==='insurance')                   opex_     += a;


      else if(t.type==='provision')                   opex_     += a;


      else if(t.type==='finance')                     finance_  += a;


      else if(t.type==='transfer')                    transfer_ += a;


    });


    var cp = txns[0].counterparty || '';


    var nt = txns[0].purpose || txns[0].note || '';


    var margin_ = income - cogs_ - opex_ - finance_;





    if(d==='cargo' || d==='logistics'){


      DATA[d].push({date:date, client:cp, sku:'', revenue:income, cogs:cogs_, expense:opex_, margin:margin_, note:nt});


    } else if(d==='exchange'){


      DATA[d].push({date:date, spread:income, expense:opex_, net:income-opex_, note:nt});


    } else if(d==='procurement'){


      DATA[d].push({date:date, client:cp, sku:'', commission:income, expense:opex_, net:income-opex_, note:nt});


    } else { // holding — intercompany div_in alohida ajratiladi


      var div_in = txns.filter(function(t){ return t.type==='income' && t.subcat && t.subcat.indexOf('Dividend')>=0; })


        .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


      var loan_in = txns.filter(function(t){ return t.type==='income' && t.subcat && t.subcat.indexOf('Qarz')>=0; })


        .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


      var other_in = income - div_in - loan_in;


      if(!div_in && !loan_in) div_in = income; // fallback


      DATA[d].push({date:date, div_in:div_in, loan_in:loan_in, exp_out:opex_, tr_out:transfer_,


        tr_to:'', div_from:'', note:nt});


    }


  });





  // Sana bo'yicha tartiblash


  DIRS.forEach(function(d){


    if(DATA[d.id]) DATA[d.id].sort(function(a,b){return a.date>b.date?1:-1;});


  });


}

function searchLogist(query, callback) {


  if(!query || query.length < 2) { callback([]); return; }


  fetch(LOGIST_API + '/search?q=' + encodeURIComponent(query) + '&limit=8')


    .then(function(r){ return r.json(); })


    .then(function(data){


      // Unique companies by inn


      var seen = {}, results = [];


      (data.results||[]).forEach(function(r){


        var key = r.inn || r.kompaniya;


        if(!seen[key]) {


          seen[key] = true;


          results.push({


            inn: r.inn,


            company: r.kompaniya,


            chin_supplier: r.chin_komp,


            product: (r.tovar||'').substring(0,80).replace(/\n/g,' '),


            address: r.uz_komp_adr||'',


            kg: r.kg, value: r.g46


          });


        }


      });


      callback(results);


    })


    .catch(function(){ callback([]); });


}

      if(inn) rows = rows.filter(function(r){ return r.inn === inn; });


      if(!rows.length && company) {


        // INN topilmasa ism bo'yicha qidirish


        return fetch(LOGIST_API + '/search?q=' + encodeURIComponent(company) + '&limit=50')


          .then(function(r2){ return r2.json(); })


          .then(function(d2){


            renderLogistModal(company, inn, d2.results||[]);


          });


      }


      renderLogistModal(company, inn, rows);


    })

      var b = document.getElementById('logist_modal_body');


      if(b) b.innerHTML = '<div style="color:var(--red);padding:20px">❌ Ma\'lumot yuklab bo\'lmadi. Server ishlamayapti.</div>';

}

function renderPipeKanban(deals, focusDir){
  var board = document.getElementById('pipe_board');
  if(!board) return;
  var h = '<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:8px">';
  PIPE_STAGES.forEach(function(stage){
    var col = PIPE_STAGE_COLORS[stage]||'#888';
    var stageDeals = deals.filter(function(d){return d.stage===stage;});
    var stageAmt   = stageDeals.reduce(function(s,d){return s+(+d.amount||0);},0);
    h += '<div style="min-width:210px;max-width:240px;flex:0 0 220px;background:var(--s2);border-radius:10px;border-top:3px solid '+col+';padding:10px">';

    h += '<span style="font-weight:700;font-size:12px;color:'+col+'">'+stage+'</span>';
    h += '<span style="font-size:11px;color:var(--t3)">'+stageDeals.length+' deal</span></div>';
    if(stageAmt>0) h += '<div style="font-size:11px;color:var(--t3);margin-bottom:6px">$'+fS(stageAmt)+'</div>';
    stageDeals.forEach(function(d){

      var pCol = pct>=70?'#00E5A0':pct>=40?'#FFB830':'#6C8EFF';
      h += '<div onclick="pipeEditModal(\''+d.id+'\')" style="background:var(--s1);border:1px solid var(--b2);border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;transition:border-color .15s" '

      h += '</div>';
    });
    // Add deal to this stage button

function pipeGv(id){ var e=document.getElementById(id); return e?e.value.trim():''; }

function pipeSaveDeal(dealId, focusDir){
  if(!pipeGv('pipe_company')){ alert('Kompaniya nomi majburiy!'); return; }
  var now = new Date().toISOString().slice(0,10);
  if(dealId){
    var d = PIPELINE_DEALS.find(function(x){ return String(x.id)===String(dealId); });
    if(d){
      d.company        = pipeGv('pipe_company');
      d.product        = pipeGv('pipe_product');
      d.stage          = pipeGv('pipe_stage');
      d.amount         = +pipeGv('pipe_amount')||0;
      d.probability    = +pipeGv('pipe_prob')||0;
      d.expected_close = pipeGv('pipe_close');
      d.direction      = pipeGv('pipe_dir');
      d.notes          = pipeGv('pipe_notes');
      d.updated        = now;
      // Sync back to CRM client LTV if linked
      if(d.crm_id){
        var cl = CRM_CLIENTS.find(function(c){return c.id===d.crm_id;});
        if(cl && d.stage==='Yopildi'){
          cl.ltv   = (cl.ltv||0) + (d.amount||0);
          cl.deals = (cl.deals||0) + 1;
          cl.last_deal = now;
          crmSave();
        }
      }
    }
  } else {
    PIPELINE_DEALS.push({
      id: Date.now()+Math.random(),
      crm_id: null,
      company:        pipeGv('pipe_company'),
      contact:        '',
      direction:      pipeGv('pipe_dir') || focusDir || 'cargo',
      product:        pipeGv('pipe_product'),
      amount:         +pipeGv('pipe_amount')||0,
      stage:          pipeGv('pipe_stage')||'Lead',
      probability:    +pipeGv('pipe_prob')||20,
      expected_close: pipeGv('pipe_close'),
      notes:          pipeGv('pipe_notes'),
      created:        now,
      updated:        now,
    });
  }
  pipeSave();
  closePipeModal();
  var dir = pipeGv('pipe_dir') || focusDir || null;
  renderPipeline(dir||undefined);
}

function pipeDeleteDeal(dealId){
  if(!confirm('Bu dealni o\'chirasizmi?')) return;
  PIPELINE_DEALS = PIPELINE_DEALS.filter(function(d){ return String(d.id)!==String(dealId); });
  pipeSave();
  closePipeModal();
  renderPipeline(ACTV!=='l1'?ACTV:undefined);
}

function logistAutocomplete(val) {


  var dd = document.getElementById('logist_dropdown');

    dd.style.display='block';


    dd.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--t3)">Qidirilmoqda...</div>';

function dcBucket(days){


  if(days<=0) return {lbl:'Muddatida',col:'var(--grn)',bg:'rgba(0,229,160,0.08)'};


  if(days<=30) return {lbl:'0-30 kun',col:'var(--amb)',bg:'rgba(255,184,48,0.08)'};


  if(days<=60) return {lbl:'31-60 kun',col:'#FF8C00',bg:'rgba(255,140,0,0.08)'};


  if(days<=90) return {lbl:'61-90 kun',col:'var(--red)',bg:'rgba(255,77,106,0.1)'};


  return {lbl:'90+ kun',col:'#E83535',bg:'rgba(232,53,53,0.15)'};

// Net income hisoblash (TXNS dan + eski DATA fallback)


function calcNetIncome(){


  var total=0;


  if(TXNS.length>0){


    TXNS.forEach(function(t){


      if(t.type==='income') total+=t.amount;


      else if(t.type==='cogs'||t.type==='opex'||t.type==='finance') total-=t.amount;


    });


  } else {


    // eski DATA fallback


    var dirs=['cargo','logistics','exchange','procurement'];


    dirs.forEach(function(d){


      var rows=fil(d);


      if(d==='cargo'||d==='logistics') total+=sk(rows,'margin');


      else if(d==='exchange') total+=sk(rows,'net');


      else if(d==='procurement') total+=sk(rows,'net');


    });


  }


  return total;


}





function calcEhsonStats(){


  // ✅ CFO fix: faqat haqiqiy TXNS dan net income, demo data ISHLATILMAYDI


  var ni = calcNetIncome();


  // Agar TXNS bo'lmasa, monthly_net dan foydalanish (foydalanuvchi qo'lda kiritgan)


  var monthly_total = EHSON_DATA.monthly_net.reduce(function(s,m){return s+m.net_income;},0);


  var net_income = (ni > 0) ? ni : monthly_total; // TXNS ustunlik qiladi


  var obligation = Math.round(net_income * EHSON_DATA.rate);


  var paid = EHSON_DATA.payments.reduce(function(s,p){return s+p.amount;},0);


  var debt = Math.max(0, obligation - paid);


  var available = EHSON_DATA.chinwakil_balance;


  return {net_income:net_income, obligation:obligation, paid:paid, debt:debt, available:available};


}

function buildNav(){


  updateDateLabel&&updateDateLabel();


  // ── Top nav ─────────────────────────────────────────────────


  var topActive = ACTV==='l1'?'l1': ['cargo','logistics','exchange','procurement'].includes(ACTV)?ACTV:


    ['crm','pipeline'].includes(ACTV)?ACTV: ACTV.split(':')[0]||'l1';


  var _navs = window.ALLOWED_NAVS || NAVS;
  document.getElementById('mainNav').innerHTML = _navs.map(function(n){


    var isOn = n.id===topActive;


    var dirColors = {cargo:'var(--cargo)',logistics:'var(--log)',exchange:'var(--exc)',procurement:'var(--proc)',l1:'var(--hold)'};


    var accentStyle = isOn && dirColors[n.id] ? 'color:'+dirColors[n.id]+';border-bottom-color:'+dirColors[n.id]+';font-weight:600' : '';


    return '<button class="navbtn'+(isOn?' on':'')+'" onclick="goNav(\''+n.id+'\')" style="'+accentStyle+'">'+n.lbl+'</button>';


  }).join('');





  // ── Sub-nav ──────────────────────────────────────────────────


  var subEl = document.getElementById('subNav');


  var snItems = SUBNAV_DEFS[topActive];


  if(!snItems || ['crm','pipeline'].includes(topActive)){


    subEl.style.display='none'; subEl.innerHTML=''; return;


  }


  var dirInfo = {


    l1:          {name:'Holding',       icon:'🏦', col:'var(--hold)'},


    cargo:       {name:'Cargo',         icon:'📦', col:'var(--cargo)'},


    logistics:   {name:'Logistics',     icon:'🚛', col:'var(--log)'},


    exchange:    {name:'Exchange',      icon:'💱', col:'var(--exc)'},


    procurement: {name:'Procurement',   icon:'🏭', col:'var(--proc)'},


  };


  var di = dirInfo[topActive]||{name:topActive,icon:'',col:'var(--acc)'};


  var h = '<div class="subnav">';


  // Direction badge


  h += '<div class="subnav-dir" style="color:'+di.col+';background:'+di.col+'11;border:1px solid '+di.col+'33">'


     + di.icon+' '+di.name+'</div>';


  h += '<div class="snbtn-sep"></div>';


  // Sub-nav buttons


  snItems.forEach(function(s){


    var isOn = ACTV_SUB===s.id;


    var navId = topActive+':'+s.id;


    h += '<button class="snbtn'+(isOn?' on':'')+'" onclick="goNav(\''+navId+'\')">'


       + s.icon+' '+s.lbl+'</button>';


  });


  h += '</div>';


  subEl.innerHTML = h;


  subEl.style.display = 'block';


}





function goNav(id){


  // ── Parse hierarchical id: "cargo:pl" → dir="cargo", sub="pl"


  var parts = id.split(':');


  var topId = parts[0];


  var subId = parts[1] || 'dashboard';





  // If clicking top-nav direction (no sub specified), keep current sub or default to dashboard


  if(parts.length===1 && SUBNAV_DEFS[topId]){


    // Keep sub if it exists in this direction's menu, else reset


    var subExists = (SUBNAV_DEFS[topId]||[]).some(function(s){return s.id===ACTV_SUB;});


    subId = subExists ? ACTV_SUB : 'dashboard';


    id = topId + ':' + subId;


    parts = [topId, subId];


  }





  ACTV = topId;


  ACTV_SUB = subId;


  DRILL = {dir:null,kpi:null,row:null};





  ['l1','l2','l3','l4'].forEach(function(l){


    var el=document.getElementById('pg-'+l);


    el.classList.remove('on');


    el.innerHTML='';


  });


  Object.values(CHARTS).forEach(function(c){c.destroy();});


  CHARTS={};


  buildNav();





  // ── Standalone pages (no sub-nav) ─────────────────────


  // crm is a sub-page — handled below


  // pipeline handled as sub-page


  if(topId==='ob_settings') { renderOBSettings(); return; }





  // ── Holding (l1) ──────────────────────────────────────


  if(topId==='l1'){


    if(subId==='dashboard')  renderL1();


    else if(subId==='pl')    renderPL(null);          // consolidated


    else if(subId==='cashflow') renderCashflow(null);  // consolidated


    else if(subId==='balance')  renderBalance();


    else if(subId==='kassa')    renderKassa();


    else if(subId==='debcred')  renderDebCred();


    // payroll direction-level only


    else renderL1();


    return;


  }





  // ── Direction pages ───────────────────────────────────


  var dirId = topId; // cargo | logistics | exchange | procurement


  DRILL.dir = dirId;





  if(subId==='dashboard'){


    if(dirId==='exchange') renderExchangeDash();
    else renderL2(dirId);


  } else if(subId==='pl'){


    renderPL(dirId);


  } else if(subId==='cashflow'){


    renderCashflow(dirId);


  } else if(subId==='inventory'){


    renderInventoryPage(dirId);


  } else if(subId==='debcred'){


    renderDebCred(dirId);


  } else if(subId==='kassa'){


    renderKassa(dirId);


  } else if(subId==='entry'){


    if(dirId==='exchange') renderExchangeEntry();
    else renderEntry(dirId);

// ── DATE RANGE ──────────────────────────────────────────────


var DATE_FROM=null, DATE_TO=null, CUSTOM_MODE=false;





function setQuick(mode, btn){


  CUSTOM_MODE=false;


  document.getElementById('customPicker').style.display='none';


  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));


  btn.classList.add('on');


  const today=new Date();


  const fmt=d=>d.toISOString().split('T')[0];


  if(mode==='today'){


    DATE_FROM=fmt(today); DATE_TO=fmt(today); PER=1;


  } else if(mode==='week'){


    const f=new Date(today); f.setDate(f.getDate()-6);


    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=7;


  } else if(mode==='month'){


    const f=new Date(today); f.setDate(f.getDate()-29);


    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=30;


  } else if(mode==='quarter'){


    const f=new Date(today); f.setDate(f.getDate()-89);


    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=90;


  } else if(mode==='all'){


    DATE_FROM=null; DATE_TO=null; PER=99999;


  }


  updateDateLabel();


  if(DEMO_MODE) genDemoData(); else buildDataFromTXNS();


  goNavCurrent();


}





function toggleCustom(){


  const p=document.getElementById('customPicker');


  const showing=p.style.display==='flex';


  p.style.display=showing?'none':'flex';


  if(!showing){


    const today=new Date();


    const fmt=d=>d.toISOString().split('T')[0];


    const f=new Date(today); f.setDate(f.getDate()-29);


    document.getElementById('dateFrom').value=DATE_FROM||fmt(f);


    document.getElementById('dateTo').value=DATE_TO||fmt(today);


  }


}





function applyCustom(){


  const from=document.getElementById('dateFrom').value;


  const to=document.getElementById('dateTo').value;


  if(!from||!to){toast('Sanalarni tanlang!');return;}


  if(from>to){toast('Boshlanish sanasi kattaroq!');return;}


  DATE_FROM=from; DATE_TO=to;


  CUSTOM_MODE=true;


  const diff=Math.ceil((new Date(to)-new Date(from))/(1000*60*60*24))+1;


  PER=diff;


  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));


  document.getElementById('customBtn').classList.add('on');


  document.getElementById('customPicker').style.display='none';


  updateDateLabel();


  if(DEMO_MODE) genDemoData(); else buildDataFromTXNS();


  goNavCurrent();


}





function updateDateLabel(){


  const el=document.getElementById('dateLabel');


  if(!el)return;


  if(DATE_FROM&&DATE_TO&&DATE_FROM===DATE_TO){


    el.textContent='Bugun: '+DATE_FROM.slice(5);


  } else if(DATE_FROM&&DATE_TO){


    el.textContent=DATE_FROM.slice(5)+' → '+DATE_TO.slice(5);


  } else {


    el.textContent='Barcha davr';


  }


}





function setPer(n,btn){


  PER=n;genData();


  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));


  btn.classList.add('on');


  goNavCurrent();


}

  var sub = ACTV_SUB && ACTV_SUB!=='dashboard' && SUBNAV_DEFS[ACTV] ? ':'+ACTV_SUB : '';


  goNav(ACTV + sub);


}





function toast(msg){


  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');


  setTimeout(()=>t.classList.remove('on'),2500);


}

function showKD(kpi){


  DRILL.kpi=kpi;


  const dirId=kpi.dirId||DRILL.dir;


  const dir=DIRS.find(d=>d.id===dirId)||{name:'Holding',c:'#4A7FF5',e:'🏦'};


  const rows=dirId?fil(dirId):[];


  const ad=dys(PER);


  let dv=[];





  if(kpi.metric&&dirId){


    const ag={};rows.forEach(r=>{if(!ag[r.date])ag[r.date]=0;ag[r.date]+=(+r[kpi.metric]||0);});


    dv=ad.map(d=>ag[d]||0);


  } else if(kpi.type==='holding'){


    dv=ad.map(date=>{let v=0;DIRS.forEach(d=>{const rw=(DATA[d.id]||[]).filter(r=>r.date===date);


      if(kpi.metric==='revenue'){if(d.id==='cargo'||d.id==='logistics')v+=sk(rw,'revenue');else if(d.id==='exchange')v+=sk(rw,'spread');else if(d.id==='procurement')v+=sk(rw,'commission');else v+=sk(rw,'div_in');}


      else if(kpi.metric==='profit'){if(d.id==='cargo'||d.id==='logistics')v+=sk(rw,'margin');else if(d.id==='exchange')v+=sk(rw,'net');else if(d.id==='procurement')v+=sk(rw,'net');else v+=sk(rw,'div_in')-sk(rw,'exp_out');}


    });return v;});


  } else {dv=ad.map(()=>rnd(1000,10000));}





  const avg=dv.length?Math.round(dv.reduce((a,b)=>a+b,0)/dv.length):0;


  const total=dv.reduce((a,b)=>a+b,0);


  const maxV=Math.max(...dv,1),minV=Math.min(...dv);


  const prevRows=(DATA[dirId]||[]).filter(r=>dys(PER*2).slice(0,PER).includes(r.date));


  const prevAg={};prevRows.forEach(r=>{if(!prevAg[r.date])prevAg[r.date]=0;prevAg[r.date]+=(+r[kpi.metric||'revenue']||0);});


  const pv=dys(PER*2).slice(0,PER).map(d=>prevAg[d]||0);


  const pTotal=pv.reduce((a,b)=>a+b,0);


  const chg=pTotal>0?Math.round((total-pTotal)/pTotal*100):0;





  // Tranzaksiyalar jadvalini oldin hisoblash (IIFE dan qochish uchun)


  var allRawRows = dirId


    ? fil(dirId).map(function(r){return Object.assign({},r,{_rowDir:dirId});})


    : DIRS.reduce(function(acc,d){


        return acc.concat(fil(d.id).map(function(r){return Object.assign({},r,{_rowDir:d.id});}));


      },[]);


  allRawRows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});


  var showDirCol = !dirId;





  var txTableHTML = '<div class="twrap"><div class="thdr"><div class="tlbl">Tranzaksiyalar detali</div>'


    +'<div style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+allRawRows.length+' ta yozuv</div></div>'


    +'<div style="overflow-x:auto"><table><thead><tr>'


    +'<th>Sana</th>'+(showDirCol?'<th>Yo\'nalish</th>':'')


    +'<th>Klient</th><th>Kategoriya</th>'


    +'<th style="text-align:right">Qiymat</th>'


    +'<th style="text-align:right">Foyda/Zarar</th>'


    +'<th>Status</th><th>Izoh</th>'


    +'</tr></thead><tbody>';





  allRawRows.forEach(function(r){


    var rd=r._rowDir;


    var dc=DIRS.find(function(x){return x.id===rd;})||dir;


    var cat='—', mainVal=0, profit=0, statusOk=true, statusLabel='', statusColor='', clientTxt='';


    if(rd==='cargo'||rd==='logistics'){


      cat=r.sku||'—'; mainVal=r.revenue||0; profit=r.margin||0; clientTxt=r.client||'—';


      statusOk=profit>=0; statusLabel=profit>=0?'Foydali':'Zarar'; statusColor=profit>=0?'#00E5A0':'#FF4D6A';


    } else if(rd==='exchange'){


      cat='RMB↔USD'; mainVal=r.spread||0; profit=r.net||0;


      statusOk=profit>=0; statusLabel=profit>=0?'Foydali':'Zarar'; statusColor=profit>=0?'#00E5A0':'#FF4D6A';


    } else if(rd==='procurement'){


      cat=r.sku||'—'; mainVal=r.order_value||0; profit=r.net||0; clientTxt=r.client||'—';


      statusOk=profit>=0; statusLabel=profit>=0?'Foydali':'Zarar'; statusColor=profit>=0?'#00E5A0':'#FF4D6A';


    } else {


      cat=r.div_in>0?'Dividend':r.loan_in>0?'Qarz':r.tr_out>0?'Perebroska':'Xarajat';


      mainVal=r.div_in||r.loan_in||r.tr_out||r.exp_out||0; profit=mainVal;


      statusOk=r.div_in>0||r.loan_in>0; statusLabel=statusOk?'Kirim':'Chiqim'; statusColor=statusOk?'#00E5A0':'#FFB830';


    }


    var note=r.note||'';


    var safeR=JSON.stringify(Object.assign({},r,{_dir:rd})).replace(/"/g,'&quot;');


    txTableHTML += '<tr class="cr" onclick="showRow('+safeR+')">'


      +'<td style="font-family:var(--mono);color:var(--t3)">'+(r.date?r.date.slice(5):'—')+'</td>'


      +(showDirCol?'<td><span class="bdg" style="background:'+dc.c+'18;color:'+dc.c+'">'+dc.e+' '+dc.name+'</span></td>':'')


      +'<td style="font-weight:500">'+(clientTxt||r.div_from||r.tr_to||'—')+'</td>'


      +'<td><span class="bdg" style="background:'+dc.c+'15;color:'+dc.c+'">'+cat+'</span></td>'


      +'<td style="text-align:right;font-family:var(--mono)">'+$$(mainVal)+'</td>'


      +'<td style="text-align:right;font-family:var(--mono);font-weight:600;color:'+(profit>=0?'#00E5A0':'#FF4D6A')+'">'+(profit>=0?'+':'')+$$(profit)+'</td>'


      +'<td><span style="padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);background:'+statusColor+'18;color:'+statusColor+';border:1px solid '+statusColor+'44">'+(statusOk?'▲':'▼')+' '+statusLabel+'</span></td>'


      +'<td style="color:var(--t3);font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+note+'</td>'


      +'</tr>';


  });


  txTableHTML += '</tbody></table></div></div>';





  ['l1','l2','l3','l4'].forEach(l=>{const p=document.getElementById('pg-'+l);p.classList.remove('on');p.style.display='';});


  const el=document.getElementById('pg-l3');


  el.classList.add('on');


  const backFn = dirId ? "renderL2('"+dirId+"')" : "goNav('l1')";


  setBc([{lbl:'Holding',fn:"goNav('l1')"},{lbl:dir.name,fn:dirId?"renderL2('"+dirId+"')":''},{ lbl:kpi.title,fn:''}]);





  el.innerHTML=`


  <div class="dhdr">


    <button class="dbtn" onclick="${backFn}">← Orqaga</button>


    <div style="width:38px;height:38px;border-radius:8px;background:${kpi.color}18;border:1px solid ${kpi.color}33;display:flex;align-items:center;justify-content:center;font-size:18px">${dir.e}</div>


    <div><div style="font-size:15px;font-weight:600">${kpi.title}</div>


    <div style="font-size:11px;color:var(--t3)">${dir.name} · ${PER} kunlik chuqur tahlil</div></div>


  </div>


  <div class="srow">


    <div class="st"><div class="stl">Jami (${PER} kun)</div><div class="stv" style="color:${kpi.color}">${$$(total)}</div></div>


    <div class="st"><div class="stl">Kunlik o'rtacha</div><div class="stv">${$$(avg)}</div></div>


    <div class="st"><div class="stl">Maksimum</div><div class="stv" style="color:#17B374">${$$(maxV)}</div></div>


    <div class="st"><div class="stl">Minimum</div><div class="stv" style="color:${minV<0?'#E83535':'var(--t2)'}">${$$(minV)}</div></div>


    <div class="st"><div class="stl">Oldingi davr</div><div class="stv" style="color:${chg>=0?'#17B374':'#E83535'}">${chg>=0?'▲':'▼'} ${Math.abs(chg)}%</div></div>


  </div>


  <div class="cgrid" style="margin-bottom:10px">


    <div class="cc"><div class="cc-lbl">Kunlik dinamika + o'rtacha</div><div style="height:210px"><canvas id="l3m"></canvas></div></div>


    <div class="cc"><div class="cc-lbl">Bu davr vs oldingi davr</div><div style="height:210px"><canvas id="l3c"></canvas></div></div>


  </div>


  <div class="card" style="margin-bottom:10px"><div class="cc-lbl" style="margin-bottom:9px">Haftalik yig'indi</div><div style="height:140px"><canvas id="l3w"></canvas></div></div>


  <div class="twrap" style="margin-bottom:10px">


    <div class="thdr">


      <div class="tlbl">Kunlik yig'indi</div>


    </div>


    <table><thead><tr>


      <th>Sana</th>


      <th style="text-align:right">Qiymat</th>


      <th style="text-align:right">O'rtachaga nisbat</th>


      <th>Trend</th>


    </tr></thead><tbody>


    ${ad.slice().reverse().map((date,i)=>{const val=dv[ad.length-1-i]||0;const df=val-avg;const bw=maxV>0?Math.round(Math.abs(val)/maxV*80):0;


    return`<tr class="cr" onclick="showDayD('${date}','${dirId||'holding'}')">


      <td style="font-family:var(--mono);color:var(--t3)">${date}</td>


      <td style="text-align:right;font-family:var(--mono);font-weight:500;color:${kpi.color}">${$$(val)}</td>


      <td style="text-align:right;font-family:var(--mono);color:${df>=0?'#17B374':'#E83535'}">${df>=0?'+':''}${$$(df)}</td>


      <td><div style="height:3px;width:${bw}px;background:${kpi.color}88;border-radius:2px;display:inline-block"></div></td>


    </tr>`;}).join('')}


    </tbody></table>


  </div>





  ${txTableHTML}


  `;





  setTimeout(()=>{


    mkC('l3m',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[


      {label:kpi.title,data:dv,borderColor:kpi.color,backgroundColor:kpi.color+'18',fill:true,tension:.4,pointRadius:0,borderWidth:2},


      {label:'O\'rtacha',data:ad.map(()=>avg),borderColor:'#4A5570',borderDash:[4,2],pointRadius:0,borderWidth:1},


    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});


    mkC('l3c',{type:'bar',data:{labels:ad.map((_,i)=>`${i+1}k`),datasets:[


      {label:'Bu davr',data:dv,backgroundColor:kpi.color+'88',borderRadius:3},


      {label:'Oldingi',data:pv,backgroundColor:'#4A557044',borderRadius:3},

// P&L + 3-STATEMENT MODEL


// ════════════════════════════════════════════


var PL_TAB = 'period';     // 'period' | 'monthly' | 'budget'


var PL_INTERCO = true;     // intercompany elimination on/off





function renderPL(focusDir){


  if(focusDir) DRILL.dir=focusDir;


  const el=document.getElementById('pg-l1');el.classList.add('on');


  setBc((function(){


    var base = [{lbl:'🏦 Holding',fn:"goNav('l1')"}];


    if(focusDir){


      var d=DIRS.find(function(x){return x.id===focusDir;})||{};


      base.push({lbl:(d.e||'')+' '+(d.name||focusDir),fn:"goNav('"+focusDir+"')"});


    }


    base.push({lbl:'📈 P&L',fn:''});


    return base;


  })());





  // Get direction filter


  const dir = focusDir || (CUR_USER && CUR_USER.role !== 'owner' ? CUR_USER.direction : null);





  // Tabs + Interco switch


  function tabBtn(id,lbl){


    var on=PL_TAB===id;


    return '<button onclick="PL_TAB=\''+id+'\';renderPL()" style="padding:7px 16px;border-radius:8px;border:1px solid '+(on?'var(--acc)':'var(--b2)')+';background:'+(on?'rgba(108,142,255,0.12)':'transparent')+';color:'+(on?'var(--acc)':'var(--t3)')+';cursor:pointer;font-size:12px;font-family:var(--sans);font-weight:'+(on?'600':'400')+'">'+lbl+'</button>';


  }


  var headerH = '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px">';


  headerH += tabBtn('period','📊 Davr P&L');


  headerH += tabBtn('monthly','📅 Oylik Trend');


  headerH += tabBtn('budget','🎯 Budget vs Aktual');


  headerH += '<div style="margin-left:auto;display:flex;align-items:center;gap:8px">';


  headerH += '<label style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--tel);cursor:pointer">';


  headerH += '<input type="checkbox" id="pl_interco_chk"'+(PL_INTERCO?' checked':'')+' onchange="PL_INTERCO=this.checked;renderPL()">';


  headerH += 'Interco Elimination</label></div></div>';





  // Generate P&L data from existing DATA


  const dirs = dir ? [DIRS.find(d=>d.id===dir)] : DIRS;





  const TAX_RATE = 0.12; // O'zbekiston korporativ soliq stavkasi (12%)


  // ✅ CFO FIX: D&A — OB.ppe_net + OB.intangibles_net dan hisoblash (rev×% EMAS)


  // Standart: PPE 10 yil, Nomoddiy 5 yil (straight-line)


  const totalDA_annual = Math.round((OB.ppe_net||0)/10 + (OB.intangibles_net||0)/5);


  const daysInPeriod = PER || 30;


  const totalDA_period = Math.round(totalDA_annual * daysInPeriod / 365);





  const plData = dirs.map(d=>{


    const rows = fil(d.id);


    let rev=0, cogs=0, opex=0, interest=0;





    if(d.id==='cargo'||d.id==='logistics'){


      rev = sk(rows,'revenue');


      cogs = sk(rows,'cogs');


      opex = sk(rows,'expense');


      // Finance xarajati TXNS dan (type='finance')


      interest = TXNS.filter(function(t){return t.direction===d.id&&t.type==='finance';})


        .reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0);


    } else if(d.id==='exchange'){


      rev = sk(rows,'spread');


      cogs = 0;


      opex = sk(rows,'expense');


    } else if(d.id==='procurement'){


      rev = sk(rows,'commission');


      cogs = 0;


      opex = sk(rows,'expense');


    } else { // holding — intercompany konsolidatsiyada hisobga olinmaydi


      rev = sk(rows,'div_in') + sk(rows,'loan_in'); // interco note below


      cogs = 0;


      opex = sk(rows,'exp_out');


      interest = 0;


    }





    // D&A: yo'nalish ulushi (rev bo'yicha)


    const da = d.id !== 'holding' ? Math.round(totalDA_period * 0.25) : 0;





    const gp = rev - cogs;


    const gpPct = rev > 0 ? (gp/rev*100).toFixed(1) : 0;


    const ebitda = gp - opex;


    const ebitdaPct = rev > 0 ? (ebitda/rev*100).toFixed(1) : 0;


    const ebit = ebitda - da;


    // ✅ CFO FIX: Soliq EBT dan hisoblanadi (EBIT dan EMAS)


    const ebt = ebit - interest;


    const tax = d.id === 'holding' ? 0 : Math.max(0, Math.round(ebt * TAX_RATE));


    const netIncome = ebt - tax;


    const netPct = rev > 0 ? (netIncome/rev*100).toFixed(1) : 0;





    return {dir:d, rev, cogs, gp, gpPct, opex, ebitda, ebitdaPct, da, ebit, interest, tax, ebt, netIncome, netPct};


  });





  // ✅ INTERCOMPANY ELIMINATION


  // Holding's interco div_in subtracted from consolidated revenue


  const intercoElim = PL_INTERCO ? TXNS.filter(function(t){


    return t.direction==='holding' && t.type==='income' && isIntercoTxn(t);


  }).reduce(function(s,t){return s+Math.abs(+(t.amount)||0);},0) : 0;





  // Consolidated totals (with elimination)


  const totalRev     = plData.reduce((s,d)=>s+d.rev,0) - intercoElim;


  const totalCOGS    = plData.reduce((s,d)=>s+d.cogs,0);


  const totalGP      = totalRev - totalCOGS;


  const totalOpEx    = plData.reduce((s,d)=>s+d.opex,0);


  const totalEBITDA  = totalGP - totalOpEx;


  const totalDA      = plData.reduce((s,d)=>s+d.da,0);


  const totalEBIT    = totalEBITDA - totalDA;


  const totalInterest= plData.reduce((s,d)=>s+d.interest,0);





  // ✅ IAS 21 — FX Gain/Loss (valyuta kursi farqlari)


  // Realized: daftardagi kurs ≠ joriy kurs farqi (tranzaksiya qatori uchun)


  // Unrealized: kassa/AR/AP qoldiqlari davr oxirida qayta baholanishi


  const fxResult = calcFXGainLoss();


  const totalFXGL = fxResult.total_gl; // musbat = foyda, manfiy = zarar





  // IAS 21: FX G/L → EBT dan oldin, foizdan keyin (finance item)


  const totalEBT     = totalEBIT - totalInterest + totalFXGL;


  const totalTax     = plData.reduce((s,d)=>s+d.tax,0);


  const totalNet     = totalEBT - totalTax;





  // P&L lines definition — IAS 21 bo'yicha FX qatori qo'shildi


  const plLines = [


    {lbl:'💰 Revenue (Daromad)', key:'rev', c:'#00E5A0', bold:true},


    {lbl:'  ↳ Interco Elimination', key:'_elim', c:'#00D4FF', neg:true, note: PL_INTERCO&&intercoElim>0},


    {lbl:'📦 Minus: COGS', key:'cogs', c:'#FF4D6A', neg:true},


    {lbl:'📊 Gross Profit (GP)', key:'gp', c:'#6C8EFF', bold:true, pct:'gpPct'},


    {lbl:'⚙️ Minus: OpEx', key:'opex', c:'#FF4D6A', neg:true},


    {lbl:'📈 EBITDA', key:'ebitda', c:'#FFB830', bold:true, pct:'ebitdaPct'},


    {lbl:'🏗️ Minus: D&A', key:'da', c:'#FF7A50', neg:true},


    {lbl:'⚡ EBIT', key:'ebit', c:'#A78BFF', bold:true},


    {lbl:'🏦 Minus: Foiz (Interest)', key:'interest', c:'#FF4D6A', neg:true},


    {lbl:'💱 FX Foyda/(Zarar) — IAS 21', key:'_fxgl', c:'#00D4FF', fxgl:true,


      tooltip:'Realized: kurs o\'zgarishidan tranzaksiya darajasida | Unrealized: kassa/AR davr oxiri qayta baholash'},


    {lbl:'📋 EBT (Soliqqa tortiluvchi)', key:'ebt', c:'#94A3C4', bold:true},


    {lbl:'🏛️ Minus: Soliq (12%)', key:'tax', c:'#FF4D6A', neg:true},


    {lbl:'✅ Net Income (Sof foyda)', key:'netIncome', c:'var(--grn)', bold:true, pct:'netPct'},


  ];





  // Totals map


  const totals = {


    rev: totalRev, _elim: intercoElim,


    cogs: totalCOGS, gp: totalGP,


    opex: totalOpEx, ebitda: totalEBITDA,


    da: totalDA, ebit: totalEBIT,


    interest: totalInterest,


    _fxgl: totalFXGL,


    ebt: totalEBT,


    tax: totalTax, netIncome: totalNet,


    gpPct: totalRev>0?(totalGP/totalRev*100).toFixed(1):'0',


    ebitdaPct: totalRev>0?(totalEBITDA/totalRev*100).toFixed(1):'0',


    netPct: totalRev>0?(totalNet/totalRev*100).toFixed(1):'0',


  };





  // ─── KPI SUMMARY STRIP ─────────────────────────────────


  function kpiStrip(){


    return '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:16px">'


    +[


      {l:'Revenue',v:$$(totalRev),c:'#00E5A0', s: PL_INTERCO&&intercoElim>0?'Interco eliminatsiya: -'+$$(intercoElim):''},


      {l:'Gross Profit',v:$$(totalGP),c:'#6C8EFF', s:totalRev>0?(totalGP/totalRev*100).toFixed(1)+'% GP marjin':''},


      {l:'EBITDA',v:$$(totalEBITDA),c:'#FFB830', s:totalRev>0?(totalEBITDA/totalRev*100).toFixed(1)+'% EBITDA marjin':''},


      {l:'Net Income',v:$$(totalNet),c:totalNet>=0?'#00E5A0':'#FF4D6A', s:totalRev>0?(totalNet/totalRev*100).toFixed(1)+'% net marjin':''},


    ].map(function(k){


      return '<div class="kpi" onclick="plKpiDetail(\''+k.l.toLowerCase().replace(' ','_')+'\')" style="cursor:pointer" onmouseenter="this.style.borderColor=\''+k.c+'66\'" onmouseleave="this.style.borderColor=\'\'">'


        +'<div class="kpi-l">'+k.l+'</div>'


        +'<div class="kpi-v" style="color:'+k.c+'">'+k.v+'</div>'


        +(k.s?'<div class="kpi-s">'+k.s+'</div>':'')


        +'</div>';


    }).join('')+'</div>';


  }





  // ─── PERIOD P&L TABLE ─────────────────────────────────


  function periodTabHTML(){


    var h='<div class="cgrid" style="margin-bottom:14px">';


    // Waterfall


    h+='<div class="cc"><div class="cc-lbl">P&L Waterfall</div><div style="height:240px"><canvas id="pl_wf"></canvas></div></div>';


    // Expense pie


    h+='<div class="cc"><div class="cc-lbl">Xarajat tarkibi</div><div style="height:240px"><canvas id="pl_pie"></canvas></div></div>';


    h+='</div>';





    // P&L table by direction


    h+='<div class="twrap" style="margin-bottom:14px"><div class="thdr">'


      +'<div class="tlbl">To\'liq P&L — Yo\'nalishlar kesimida'+(PL_INTERCO?' · Interco eliminatsiya ON':' · ⚠️ Interco ON qiling')+'</div>'


      +(intercoElim>0?'<div style="font-size:10px;color:var(--tel)">🔄 Eliminated: '+$$(intercoElim)+'</div>':'')


      +'</div><div style="overflow-x:auto"><table><thead><tr>'

window.saveBudgetEntry = function(){


  var gv=function(id){var e=document.getElementById(id);return e?e.value:'';};


  var period=gv('bd_period'); var dir2=gv('bd_dir');


  var type2=gv('bd_type'); var amt=parseFloat(gv('bd_amt'))||0;


  if(!period||!amt){var m=document.getElementById('bd_msg');if(m){m.style.color='var(--red)';m.textContent='⚠ Maydonlarni to\'ldiring!';}return;}


  // Remove existing for same period+dir+type, then add


  BUDGET_DATA=BUDGET_DATA.filter(function(b){return !(b.period===period&&b.direction===dir2&&b.type===type2);});


  BUDGET_DATA.push({period:period, direction:dir2, type:type2, amount_usd:amt, updated:new Date().toISOString()});


  budgetSave();


  var m=document.getElementById('bd_msg');


  if(m){m.style.color='var(--grn)';m.textContent='✅ Budget saqlandi!';}


  setTimeout(function(){drillClose();PL_TAB='budget';renderPL(DRILL.dir);},800);


};

// CASH FLOW


// ════════════════════════════════════════════


function renderCashflow(focusDir){


  if(focusDir) DRILL.dir=focusDir;


  const el=document.getElementById('pg-l1');el.classList.add('on');


  setBc((function(){


    var base=[{lbl:'🏦 Holding',fn:"goNav('l1')"}];


    if(focusDir){var d=DIRS.find(function(x){return x.id===focusDir;})||{};


      base.push({lbl:(d.e||'')+' '+(d.name||focusDir),fn:"goNav('"+focusDir+"')"});}


    base.push({lbl:'💵 Cash Flow',fn:''}); return base;


  })());





  const c=fil('cargo'),l=fil('logistics'),e=fil('exchange'),p=fil('procurement'),h=fil('holding');


  const ad=dys(PER);





  // ── IAS 7 Cash Flow Statement ──────────────────────────────


  // I. OPERATING ACTIVITIES


  const op_revenue   = sk(c,'revenue')+sk(l,'revenue')+sk(e,'spread')+sk(p,'commission');


  const op_cogs      = -(sk(c,'cogs')+sk(l,'cogs'));


  const op_opex      = -(sk(c,'expense')+sk(l,'expense')+sk(e,'expense')+sk(p,'expense'));


  const op_wc_ar     = -Math.round(op_revenue*0.08);  // receivables increase


  const op_wc_inv    = -Math.round(Math.abs(op_cogs)*0.05); // inventory build


  const op_wc_ap     = Math.round(Math.abs(op_cogs)*0.04);  // payables increase


  const op_da        = Math.round(op_revenue*0.02);   // D&A add-back


  const op_tax_paid  = -Math.round(Math.max(0,(op_revenue+op_cogs+op_opex))*0.10);


  const cfo = op_revenue+op_cogs+op_opex+op_wc_ar+op_wc_inv+op_wc_ap+op_da+op_tax_paid;





  // II. INVESTING ACTIVITIES


  const inv_capex    = -Math.round(op_revenue*0.04);


  const inv_loans_given = -sk(h,'tr_out');


  const inv_loan_rcv = Math.round(sk(h,'loan_in')*0.3);


  const cfi = inv_capex+inv_loans_given+inv_loan_rcv;





  // III. FINANCING ACTIVITIES


  const fin_loans_in  = sk(h,'loan_in') - Math.round(sk(h,'loan_in')*0.3);


  const fin_div_paid  = -Math.round(sk(h,'div_in')*0.6);


  const fin_exp       = -sk(h,'exp_out');


  const cff = fin_loans_in+fin_div_paid+fin_exp;





  const net_change = cfo+cfi+cff;


  const begin_cash = Math.round(Math.abs(net_change)*1.8+12000);


  const end_cash   = begin_cash+net_change;





  // Daily arrays for charts


  const iArr=ad.map(d=>{const fd=r=>r.date===d;return sk(c.filter(fd),'revenue')+sk(l.filter(fd),'revenue')+sk(e.filter(fd),'spread')+sk(p.filter(fd),'commission')+sk(h.filter(fd),'div_in');});


  const oArr=ad.map(d=>{const fd=r=>r.date===d;return-(sk(c.filter(fd),'cogs')+sk(c.filter(fd),'expense')+sk(l.filter(fd),'cogs')+sk(l.filter(fd),'expense')+sk(e.filter(fd),'expense')+sk(p.filter(fd),'expense')+sk(h.filter(fd),'exp_out'));});


  let cum=begin_cash;


  const cumArr=iArr.map((v,i)=>{cum+=v+oArr[i];return cum;});





  // Helper: row builder


  function cfRow(indent,label,val,isSub,isBold,key,note){


    const col=val===null?'var(--t3)':val>=0?'#00E5A0':'#FF4D6A';


    const bg=isBold?'background:rgba(255,255,255,0.03);border-top:1px solid var(--b2);':'';


    return `<tr class="${key?'cr':''}" style="${bg}cursor:${key?'pointer':'default'}" ${key?`onclick="cfDetail('${key}')"`:''}


      onmouseenter="${key?"this.style.background='rgba(108,142,255,0.04)'":''}"


      onmouseleave="${key?"this.style.background=''":""}">


      <td style="padding:4px 10px;font-size:11px;${isBold?'font-weight:700':'color:var(--t3)'}">


        ${'&nbsp;'.repeat(indent*3)}${label}${key?'<span style="font-size:9px;color:#6C8EFF;margin-left:5px">⤵</span>':''}


        ${note?`<div style="font-size:9px;color:var(--t3);margin-top:1px">${note}</div>`:''}


      </td>


      <td style="text-align:right;font-family:var(--mono);font-size:11px;padding:4px 10px;${isBold?'font-weight:700':''}color:${val===null?'var(--t3)':col}">


        ${val===null?'—':( val>=0?'+':'')+$$(val)}


      </td>


      <td style="text-align:right;padding:4px 10px;width:70px">


        ${isBold&&val!==null?`<div style="display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-family:var(--mono);background:${val>=0?'rgba(0,229,160,0.1)':'rgba(255,77,106,0.1)'};color:${val>=0?'#00E5A0':'#FF4D6A'}">${val>=0?'+':'-'}${$$(Math.abs(val||0))}</div>`:''}


      </td>


    </tr>`;


  }





  el.innerHTML=`


  <!-- KPI Summary -->


  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px">


    ${[


      {l:'CFO',sub:'Operatsion',v:cfo,key:'cfo',note:'Asosiy biznes'},


      {l:'CFI',sub:'Investitsiya',v:cfi,key:'cfi',note:'CapEx & Qarzlar'},
