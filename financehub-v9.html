<style>
@import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&family=Geist:wght@300;400;500;600&display=swap');
:root{
  --bg:#0A0E1A;--s1:#0F1424;--s2:#141929;--s3:#1A2035;
  --b1:#1E2840;--b2:#263352;--b3:#2E3D63;
  --t1:#F0EFFF;--t2:#94A3C4;--t3:#506080;
  --acc:#6C8EFF;--grn:#00E5A0;--red:#FF4D6A;
  --amb:#FFB830;--pur:#A78BFF;--tel:#00D4FF;
  --cargo:#6C8EFF;--log:#00E5A0;--exc:#FFB830;--proc:#A78BFF;--hold:#FF7A50;
  --mono:'Geist Mono',monospace;--sans:'Geist',sans-serif;
  --r:10px;--r2:14px;
  --glow-blue:0 0 20px rgba(108,142,255,0.15);
  --glow-green:0 0 20px rgba(0,229,160,0.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg) !important;color:var(--t1);font-family:var(--sans);font-size:13px}
/* --- TOPBAR --- */
.topbar{height:52px;display:flex;align-items:center;padding:0 24px;border-bottom:1px solid rgba(108,142,255,0.15);background:var(--s1);position:sticky;top:0;z-index:100;gap:10px;position:relative}
.logo{font-family:var(--mono);font-size:13px;font-weight:600}
.logo em{color:var(--acc);font-style:normal;text-shadow:0 0 20px rgba(108,142,255,0.6)}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3)}
.bc-sep{color:var(--b3)}
.bc-item{cursor:pointer;padding:3px 7px;border-radius:4px;transition:.15s}
.bc-item:hover,.bc-item.cur{color:var(--t1)}
.bc-item:hover{background:var(--s3)}
.tr{margin-left:auto;display:flex;gap:6px;align-items:center}
.pb{padding:4px 9px;border-radius:5px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;font-size:11px;font-family:var(--sans)}
.pb.on{background:rgba(108,142,255,.15);border-color:rgba(108,142,255,.5);color:var(--acc);box-shadow:0 0 12px rgba(108,142,255,0.2)}
/* --- NAV --- */
.nav{display:flex;border-bottom:1px solid rgba(108,142,255,0.12);background:var(--s1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:0 24px;overflow-x:auto}
.navbtn{padding:10px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--t3);cursor:pointer;font-size:12px;font-family:var(--sans);white-space:nowrap;transition:.15s}
.navbtn.on{color:var(--acc);border-bottom-color:var(--acc);font-weight:500;text-shadow:0 0 12px rgba(108,142,255,0.5)}
/* --- PAGES --- */
.page{display:none;padding:20px 24px;animation:fi .25s ease}
.page.on{display:block}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
/* --- CARDS --- */
.card{background:var(--s2);border:1px solid rgba(108,142,255,0.12);border-radius:var(--r2);padding:14px;backdrop-filter:blur(8px)}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:9px;margin-bottom:14px}
.kpi{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:14px;cursor:pointer;position:relative;transition:all .2s}
.kpi:hover{border-color:var(--acc);transform:translateY(-3px);background:var(--s3)}
.kpi:hover::after{content:'→';position:absolute;bottom:7px;right:10px;font-size:10px;color:var(--acc);font-family:var(--mono)}
.kpi-l{font-size:11px;color:var(--t3);margin-bottom:5px}
.kpi-v{font-size:20px;font-weight:600;font-family:var(--mono)}
.kpi-s{font-size:11px;color:var(--t3);margin-top:3px}
/* --- CHART GRID --- */
.cgrid{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px}
.cc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;cursor:pointer;transition:.2s}
.cc:hover{border-color:var(--b2)}
.cc-lbl{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:9px}
/* --- TABLE --- */
.twrap{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden;margin-bottom:10px}
.thdr{padding:9px 13px;border-bottom:1px solid var(--b1);background:var(--s2);display:flex;align-items:center;justify-content:space-between}
.tlbl{font-size:10px;font-family:var(--mono);color:var(--t3);letter-spacing:.7px;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 11px;color:var(--t3);font-weight:500;border-bottom:1px solid var(--b1);font-size:10px}
td{padding:7px 11px;border-bottom:1px solid rgba(26,32,53,.4)}
tr.cr{cursor:pointer}
tr.cr:hover td{background:rgba(255,255,255,.015)}
.bdg{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--mono)}
/* --- DIR CARDS --- */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-bottom:16px}
.dc{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px;cursor:pointer;position:relative;overflow:hidden;transition:all .25s}
.dc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.dc:hover{transform:translateY(-4px);border-color:var(--acc)}
/* --- KASSA --- */
.kassgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.kcard{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:12px;transition:.2s}.kcard:hover{border-color:var(--acc);transform:translateY(-1px)}
.kcard.neg{border-color:rgba(232,53,53,.3)}
/* --- DETAIL --- */
.dhdr{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.dbtn{padding:6px 13px;border-radius:6px;border:1px solid rgba(108,142,255,0.2);background:rgba(108,142,255,0.06);color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:.15s}
.dbtn:hover{border-color:rgba(108,142,255,0.6);color:var(--acc);background:rgba(108,142,255,0.1)}
.srow{display:flex;gap:14px;flex-wrap:wrap;padding:10px 0;border-bottom:1px solid var(--b1);margin-bottom:14px}
.st{display:flex;flex-direction:column;gap:2px}
.stl{font-size:10px;color:var(--t3)}
.stv{font-size:17px;font-weight:600;font-family:var(--mono)}
/* --- CHECK --- */
.cpanel{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.crows{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px}
.crow{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;background:var(--bg);border-radius:6px;border:1px solid var(--b1)}
.cstat{display:flex;align-items:center;gap:7px;padding:5px 13px;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:600}
.cstat.ok{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.3);color:var(--grn);box-shadow:0 0 12px rgba(0,229,160,0.1)}
.cstat.err{background:rgba(232,53,53,.1);border:1px solid rgba(232,53,53,.3);color:var(--red)}
/* --- TRANSFER --- */
.flow{display:grid;grid-template-columns:90px 1fr 18px 1fr 100px 70px;gap:7px;align-items:center;padding:8px 11px;border-bottom:1px solid rgba(26,32,53,.4);cursor:pointer;transition:.15s}
.flow:hover{background:rgba(255,255,255,.015)}
.fpill{padding:3px 7px;border-radius:4px;font-size:10px;font-family:var(--mono);white-space:nowrap}
/* --- MISC --- */
/* Light tema uchun override */
body[style*="--is-light: 1"] .topbar,
.light-mode .topbar { border-bottom-color: rgba(100,116,139,0.25) !important; }
.kpi{box-shadow:none;transition:all .2s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:rgba(108,142,255,0.2);border-radius:2px}::-webkit-scrollbar-thumb:hover{background:rgba(108,142,255,0.4)}
#toast{position:fixed;bottom:16px;right:16px;padding:10px 16px;border-radius:8px;font-size:11px;font-family:var(--mono);background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:var(--grn);box-shadow:0 8px 32px rgba(0,229,160,0.15);transform:translateY(50px);opacity:0;transition:.25s;z-index:999}
#toast.on{transform:none;opacity:1}
.slbl{font-size:10px;color:var(--t3);letter-spacing:.7px;text-transform:uppercase;font-family:var(--mono);margin-bottom:8px}
.sep{color:var(--b3)}
/* ── INPUT SYSTEM (faqat entry area ichida) ── */
#entryArea input[type=text],#entryArea input[type=number],#entryArea input[type=date],#entryArea select{
  background:var(--s3);color:var(--t1);border:1px solid var(--b2);border-radius:6px;
  padding:7px 10px;font-size:12px;font-family:var(--sans);outline:none;transition:.15s;width:100%;box-sizing:border-box}
#entryArea input[type=text]:focus,#entryArea input[type=number]:focus,#entryArea input[type=date]:focus,#entryArea select:focus{
  border-color:var(--acc);box-shadow:0 0 0 2px rgba(108,142,255,0.12)}
#entryArea input::placeholder{color:var(--t3)}
</style>
</head>

function showDash(profile) {
  CUR_USER = profile;
  document.getElementById("LGN").style.display = "none";
  
  setTimeout(function() {
    var el = document.getElementById("UI");
    if (el) {
      var rc = {owner:"#00E5A0", manager:"#6C8EFF", staff:"#FFB830"};
      var role = profile.role || "staff";

      ];

      buildNav();
      renderL2(d);
    } else {
      window.NAVS = [
        {id:"l1",lbl:"🏦 Holding"},

        {id:"logistics",lbl:"🚛 Logistics"},

async function LGO() {
  var email = (document.getElementById("LE").value || "").trim();
  var pass = document.getElementById("LP").value;
  var err = document.getElementById("LE2");
  var btn = document.getElementById("LB");
  
  if (!email || !pass) { err.textContent = "Email va parol kiriting!"; return; }
  
  err.textContent = "";
  btn.textContent = "Tekshirilmoqda...";
  btn.disabled = true;

  try {
    var res = await SB.auth.signInWithPassword({email: email, password: pass});
    if (res.error) throw res.error;
    
    var uid = res.data.user.id;
    var prof = await SB.from("profiles").select("*").eq("id", uid).single();
    
    var profile = prof.data || {role:"owner", direction:null, full_name: email};
    profile.email = email;
    
    showDash(profile);
  } catch(e) {
    err.textContent = "Email yoki parol xato!";
    btn.textContent = "Kirish";
    btn.disabled = false;
  }
}

async function LGOUT() {
  await SB.auth.signOut();
  CUR_USER = null;
  document.getElementById("LE").value = "";
  document.getElementById("LP").value = "";
  document.getElementById("LE2").textContent = "";
  document.getElementById("LB").textContent = "Kirish";
  document.getElementById("LB").disabled = false;
  document.getElementById("LGN").style.display = "flex";
}

// Check existing session
window.addEventListener("load", async function() {
  if (!SB) return;
  try {
    var s = await SB.auth.getSession();
    if (s.data && s.data.session) {
      var uid = s.data.session.user.id;
      var prof = await SB.from("profiles").select("*").eq("id", uid).single();
      var profile = prof.data || {role:"owner", direction:null, full_name: s.data.session.user.email};
      profile.email = s.data.session.user.email;
      showDash(profile);
    }
  } catch(e) {}
});
</script>

function genData(){
  DATA={};
  const ad=dys(30);
  DIRS.forEach(d=>{
    const rows=[];
    ad.forEach((date,i)=>{
      if(d.id==='cargo'||d.id==='logistics'){
        const sk2=d.id==='cargo'?CSKUS:LSKUS;
        const rArr=d.id==='cargo'?CARGO_REASONS:LOGI_REASONS;
        CLIENTS.slice(0,rnd(3,5)).forEach(cl=>{
          const rv=rnd(2000,15000),cg=Math.round(rv*rnd(40,62)/100),ex=rnd(200,1200);
          rows.push({date,client:cl,sku:sk2[rnd(0,sk2.length-1)],revenue:rv,cogs:cg,expense:ex,margin:rv-cg-ex,
            bank_usd:rnd(40000,120000),bank_cny:rnd(100000,600000),
            note:rArr[rnd(0,rArr.length-1)]});
        });
      } else if(d.id==='exchange'){
        const sp=rnd(400,2500),ex=rnd(80,500);
        rows.push({date,rmb_to_usd:rnd(30000,200000),rmb_rate:(rnd(688,722)/100),
          usd_to_rmb:rnd(20000,150000),usd_rate:(rnd(688,722)/100),
          spread:sp,expense:ex,net:sp-ex,cash_usd:rnd(80000,400000),cash_cny:rnd(300000,2000000),
          note:EXCH_REASONS[rnd(0,EXCH_REASONS.length-1)]});
      } else if(d.id==='procurement'){
        CLIENTS.slice(0,rnd(2,4)).forEach(cl=>{
          const ov=rnd(3000,40000),cr=rnd(3,9)/100,cm=Math.round(ov*cr),ex=rnd(100,800);
          rows.push({date,client:cl,sku:PSKUS[rnd(0,PSKUS.length-1)],order_value:ov,commission_rate:cr,commission:cm,
            expense:ex,net:cm-ex,bank_usd:rnd(20000,80000),
            note:PROC_REASONS[rnd(0,PROC_REASONS.length-1)]});
        });
      } else {
        const dv=i%7===0?rnd(4000,25000):0;
        const ln=i%11===0?rnd(8000,60000):0;
        const eo=rnd(300,4000),to=i%8===0?rnd(3000,30000):0;
        rows.push({date,div_in:dv,div_from:dv>0?['Cargo','Logistics'][rnd(0,1)]:'',
          loan_in:ln,exp_out:eo,tr_out:to,tr_to:to>0?DIRS.filter(x=>x.id!=='holding')[rnd(0,3)].name:'',
          cash_usd:rnd(60000,220000),
          note:to>0?HOLD_TR_REASONS[rnd(0,HOLD_TR_REASONS.length-1)]:HOLD_EXP_REASONS[rnd(0,HOLD_EXP_REASONS.length-1)]});
      }
    });
    DATA[d.id]=rows;
  });
  DATA.kassas={};
  DIRS.forEach(d=>{
    DATA.kassas[d.id]={};
    CURS.forEach(cur=>KTYPES.forEach(tp=>{
      const base={USD:rnd(5000,90000),RMB:rnd(50000,600000),UZS:rnd(5e6,200e6)}[cur];
      DATA.kassas[d.id][`${cur}_${tp}`]={balance:base,prev:base-rnd(-8000,12000),in:rnd(0,20000),out:rnd(0,15000)};
    }));
  });
}
genData();

// Logist bazasidan qidirish
function searchLogist(query, callback) {
  if(!query || query.length < 2) { callback([]); return; }
  fetch(LOGIST_API + '/search?q=' + encodeURIComponent(query) + '&limit=8')
    .then(function(r){ return r.json(); })
    .then(function(data){
      // Unique companies by inn
      var seen = {}, results = [];
      (data.results||[]).forEach(function(r){
        var key = r.inn || r.kompaniya;
        if(!seen[key]) {
          seen[key] = true;
          results.push({
            inn: r.inn,
            company: r.kompaniya,
            chin_supplier: r.chin_komp,
            product: (r.tovar||'').substring(0,80).replace(/\n/g,' '),
            address: r.uz_komp_adr||'',
            kg: r.kg, value: r.g46
          });
        }
      });
      callback(results);
    })
    .catch(function(){ callback([]); });
}

function buildCRMCards() {
  var statusColors = {VIP:'#FFB830',Faol:'#00E5A0',Potentsial:'#6C8EFF',Sovuq:'#506080'};
  var dirColors = {logistics:'#00E5A0',cargo:'#6C8EFF',exchange:'#FFB830',procurement:'#A78BFF'};
  var filtered = CRM_CLIENTS.filter(function(c){
    var s = (CRM_FILTER.search||'').toLowerCase();
    if(s && c.company.toLowerCase().indexOf(s)===-1 && c.contact.toLowerCase().indexOf(s)===-1 && c.product.toLowerCase().indexOf(s)===-1) return false;
    if(CRM_FILTER.status && c.status!==CRM_FILTER.status) return false;
    if(CRM_FILTER.direction && c.direction!==CRM_FILTER.direction) return false;
    return true;
  });

  var h = '<div style="font-size:11px;color:var(--t3);margin-bottom:10px;font-family:var(--mono)">'+filtered.length+' ta mijoz topildi</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;margin-bottom:16px">';
  filtered.forEach(function(c){
    var sc = statusColors[c.status]||'#506080';
    var dc = dirColors[c.direction]||'#6C8EFF';
    var initials = c.company.split(' ').slice(0,2).map(function(w){return w[0];}).join('');
    h += '<div class="card" style="cursor:pointer;border:1px solid var(--b1);transition:.2s" onclick="showClientDetail('+c.id+')" onmouseover="this.style.borderColor=\''+sc+'\'" onmouseout="this.style.borderColor=\'var(--b1)\'">';
    h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';
    h += '<div style="width:40px;height:40px;border-radius:10px;background:'+sc+'22;border:1px solid '+sc+'44;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:'+sc+';font-family:var(--mono);flex-shrink:0">'+initials+'</div>';
    h += '<div style="min-width:0"><div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.company+'</div>';
    h += '<div style="font-size:11px;color:var(--t3)">'+c.contact+' · '+c.city+'</div></div>';
    h += '<span style="margin-left:auto;padding:2px 9px;border-radius:999px;font-size:10px;font-family:var(--mono);background:'+sc+'18;color:'+sc+';border:1px solid '+sc+'33;flex-shrink:0">'+c.status+'</span>';
    h += '</div>';
    h += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">';
    h += '<span style="font-size:10px;background:'+dc+'15;color:'+dc+';padding:2px 8px;border-radius:4px;font-family:var(--mono)">'+c.direction+'</span>';
    h += '<span style="font-size:10px;color:var(--t3);padding:2px 8px;border-radius:4px;background:var(--s3)">'+c.product.split(',')[0].trim()+'</span>';
    h += '</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding-top:10px;border-top:1px solid var(--b1)">';
    h += '<div style="text-align:center"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:'+dc+'">$'+fS(c.ltv)+'</div><div style="font-size:9px;color:var(--t3)">LTV</div></div>';
    h += '<div style="text-align:center"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:var(--t1)">'+c.deals+'</div><div style="font-size:9px;color:var(--t3)">Deallar</div></div>';
    h += '<div style="text-align:center"><div style="font-size:12px;font-weight:600;font-family:var(--mono);color:var(--t2)">'+(c.last_deal?c.last_deal.slice(5):'—')+'</div><div style="font-size:9px;color:var(--t3)">Oxirgi deal</div></div>';
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

// ── CRM SEARCH INLINE AUTOCOMPLETE ────────────────────────────
var _crmAcTimer = null;
function crmLiveAC(q) {
  var dd = document.getElementById('crm_search_dd');
  if(!dd) return;
  clearTimeout(_crmAcTimer);
  if(!q || q.length < 2) { dd.style.display='none'; return; }

  // Agar Logist server oflayn bo'lsa
  if(!LOGIST_AVAILABLE) {
    dd.innerHTML = '<div style="padding:10px 12px;font-size:11px">'
      +'<span style="color:var(--amb)">⚠️ Logist server ishlamayapti</span><br>'
      +'<span style="color:var(--t3)">Ishga tushirish uchun: </span>'
      +'<code style="color:var(--acc);font-size:10px">Logist_Start.bat</code>'
      +'<span style="color:var(--t3)"> ni ikki marta bosing</span>'
      +'</div>';
    dd.style.display='block';
    return;
  }

  dd.innerHTML = '<div style="padding:8px 12px;font-size:11px;color:var(--t3)">🔍 Qidirilmoqda...</div>';
  dd.style.display='block';

  _crmAcTimer = setTimeout(function(){
    searchLogist(q, function(results){
      if(!results || !results.length){ dd.style.display='none'; return; }
      var h='';
      results.slice(0,8).forEach(function(r){
        var nm=(r.company||'').replace(/</g,'&lt;');
        var inn=r.inn?(' <span style="color:var(--t3);font-size:10px">INN:'+r.inn+'</span>'):'';
        var prod=(r.product||'').substring(0,50);
        var already=CRM_CLIENTS.some(function(c){return c.company.toLowerCase()===nm.toLowerCase();});
        h+='<div onclick="crmPickAC(\''+nm.replace(/'/g,"\\'")+'\',\''+r.inn+'\')" '
          +'style="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--b1);display:flex;justify-content:space-between;align-items:center" '
          +'onmouseover="this.style.background=\'var(--s3)\'" onmouseout="this.style.background=\'\'">'
          +'<div><div style="font-size:12px;font-weight:500;color:var(--t1)">'+nm+inn+'</div>'
          +'<div style="font-size:10px;color:var(--t3)">📦 '+prod+'</div></div>'
          +(already?'<span style="font-size:9px;color:var(--grn);white-space:nowrap">✓ CRM da</span>'
                   :'<span style="font-size:9px;color:var(--acc);white-space:nowrap">+ Qo\'shish</span>')
          +'</div>';
      });
      if(!h){ dd.style.display='none'; return; }
      dd.innerHTML='<div style="padding:6px 12px;font-size:10px;color:var(--grn);border-bottom:1px solid var(--b1)">🔗 Logist baza — '+results.length+' ta topildi</div>'+h;
      dd.style.display='block';
    });
  }, 350);
}

function logistAutocomplete(val) {
  var dd = document.getElementById('logist_dropdown');
  if(!dd) return;
  if(!val || val.length < 2) { dd.style.display='none'; return; }

  if(LOGIST_AVAILABLE) {
    dd.style.display='block';
    dd.innerHTML = '<div style="padding:10px;font-size:11px;color:var(--t3)">Qidirilmoqda...</div>';
    searchLogist(val, function(results){
      if(!results.length){
        dd.innerHTML='<div style="padding:10px;font-size:11px;color:var(--t3)">Topilmadi</div>';
        return;
      }
      var ddHtml = '';
      results.forEach(function(r){
        ddHtml += '<div onclick="fillFromLogist('+JSON.stringify(r).replace(/"/g,"'")+',this.closest(\'#logist_dropdown\'))" '
          + 'style="padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--b1);transition:.1s" '
          + 'onmouseover="this.style.background=\'var(--s3)\'" onmouseout="this.style.background=\'\'">';
        ddHtml += '<div style="font-size:12px;font-weight:600;color:var(--t1)">'+r.company+'</div>';
        ddHtml += '<div style="font-size:10px;color:var(--t3);margin-top:2px">🇨🇳 '+r.chin_supplier+'</div>';
        ddHtml += '<div style="font-size:10px;color:var(--t3)">📦 '+(r.product||'').substring(0,60)+'</div>';
        ddHtml += '</div>';
      });
      dd.innerHTML = ddHtml;
    });
  }
}

function fillFromLogist(r, dd) {
  // Kompaniya ma'lumotlarini avtomatik to'ldirish
  var set = function(id, val){ var e=document.getElementById(id); if(e&&val) e.value=val; };
  set('ef_cn', r.company);
  set('ef_cy', (r.address||'').split(',').slice(0,2).join(',').trim());
  set('ef_pr', (r.product||'').substring(0,80).replace(/\n/g,', '));
  set('ef_sup', r.chin_supplier||'');
  set('ef_src', 'Logist baza (bojxona)');
  if(dd) dd.style.display='none';
  toast('✓ '+r.company+' ma\'lumotlari to\'ldirildi!');
}

// CRM bosh sahifasida Logist qidiruv

function saveNewClient() {
  var gv = function(id){var e=document.getElementById(id);return e?e.value.trim():'';};
  if(!gv('ef_cn')||!gv('ef_cp')||!gv('ef_ph')){
    var m=document.getElementById('add_msg');
    if(m){m.style.color='var(--red)';m.textContent='⚠ Majburiy maydonlarni to\'ldiring!';}
    return;
  }
  var newClient = {
    id: CRM_CLIENTS.length+1,
    company: gv('ef_cn'), contact: gv('ef_cp'), phone: gv('ef_ph'),
    email: gv('ef_em'), city: gv('ef_cy'), product: gv('ef_pr'),
    direction: gv('ef_dir'), status: gv('ef_st'), source: gv('ef_src')||'Qo\'lda',
    ltv:0, deals:0, last_deal:'', notes: gv('ef_nt')
  };
  CRM_CLIENTS.push(newClient);

  // Save to Supabase if available
  if(typeof SB !== 'undefined' && SB) {
    SB.from('clients').insert({
      company_name: newClient.company, contact_person: newClient.contact,
      phone: newClient.phone, email: newClient.email, city: newClient.city,
      product_category: newClient.product, direction: newClient.direction,
      status: newClient.status, source: newClient.source, notes: newClient.notes
    }).then(function(r){if(r.error)console.log('Supabase error:',r.error);});

  toast('✓ '+newClient.company+' bazaga qo\'shildi!');
  setTimeout(function(){goNav('crm');}, 800);
}

// ── DATE RANGE ──────────────────────────────────────────────
let DATE_FROM=null, DATE_TO=null, CUSTOM_MODE=false;

function setQuick(mode, btn){
  CUSTOM_MODE=false;
  document.getElementById('customPicker').style.display='none';
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const today=new Date();
  const fmt=d=>d.toISOString().split('T')[0];
  if(mode==='today'){
    DATE_FROM=fmt(today); DATE_TO=fmt(today); PER=1;
  } else if(mode==='week'){
    const f=new Date(today); f.setDate(f.getDate()-6);
    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=7;
  } else if(mode==='month'){
    const f=new Date(today); f.setDate(f.getDate()-29);
    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=30;
  } else if(mode==='quarter'){
    const f=new Date(today); f.setDate(f.getDate()-89);
    DATE_FROM=fmt(f); DATE_TO=fmt(today); PER=90;
  } else if(mode==='all'){
    DATE_FROM=null; DATE_TO=null; PER=365;
  }
  updateDateLabel();
  genData();
  goNav(ACTV);
}

function toggleCustom(){
  const p=document.getElementById('customPicker');
  const showing=p.style.display==='flex';
  p.style.display=showing?'none':'flex';
  if(!showing){
    const today=new Date();
    const fmt=d=>d.toISOString().split('T')[0];
    const f=new Date(today); f.setDate(f.getDate()-29);
    document.getElementById('dateFrom').value=DATE_FROM||fmt(f);
    document.getElementById('dateTo').value=DATE_TO||fmt(today);
  }
}

function applyCustom(){
  const from=document.getElementById('dateFrom').value;
  const to=document.getElementById('dateTo').value;
  if(!from||!to){toast('Sanalarni tanlang!');return;}
  if(from>to){toast('Boshlanish sanasi kattaroq!');return;}
  DATE_FROM=from; DATE_TO=to;
  CUSTOM_MODE=true;
  const diff=Math.ceil((new Date(to)-new Date(from))/(1000*60*60*24))+1;
  PER=diff;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  document.getElementById('customBtn').classList.add('on');
  document.getElementById('customPicker').style.display='none';
  updateDateLabel();
  genData();
  goNav(ACTV);
}

function updateDateLabel(){
  const el=document.getElementById('dateLabel');
  if(!el)return;
  if(DATE_FROM&&DATE_TO&&DATE_FROM===DATE_TO){
    el.textContent='Bugun: '+DATE_FROM.slice(5);
  } else if(DATE_FROM&&DATE_TO){
    el.textContent=DATE_FROM.slice(5)+' → '+DATE_TO.slice(5);
  } else {
    el.textContent='Barcha davr';
  }
}

function setPer(n,btn){
  PER=n;genData();
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  goNav(ACTV);
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

// L2 — DIRECTION
// ════════════════════════════════════════════
function renderL2(dirId){
  const dir=DIRS.find(d=>d.id===dirId);
  DRILL.dir=dirId;
  ['l1','l2','l3','l4'].forEach(l=>{const p=document.getElementById('pg-'+l);p.classList.remove('on');p.style.display='';});
  const el=document.getElementById('pg-l2');
  el.classList.add('on');
  setBc([{lbl:'Holding',fn:'goNav("l1")'},{lbl:dir.name,fn:''}]);

  const rows=fil(dirId);
  let kpis=[],tableHTML='';

  if(dirId==='cargo'||dirId==='logistics'){
    const rv=sk(rows,'revenue'),cg=sk(rows,'cogs'),ex=sk(rows,'expense'),mg=sk(rows,'margin');
    const mp=rv>0?Math.round(mg/rv*100):0;
    kpis=[
      {id:'rev',t:'Jami daromad',v:$$(rv),c:'#17B374',m:'revenue',s:`${rows.length} tranzaksiya`},
      {id:'cogs',t:'COGS',v:$$(cg),c:'#E83535',m:'cogs',s:`${pct(cg,rv)}% daromaddan`},
      {id:'exp',t:'Xarajat',v:$$(ex),c:'#D48C0A',m:'expense',s:`${pct(ex,rv)}%`},
      {id:'mg',t:'Marjinal foyda',v:$$(mg),c:dir.c,m:'margin',s:`Marjin: ${mp}%`},
      {id:'mp',t:'Marjinallik %',v:`${mp}%`,c:'#0DB5A0',m:'margin_pct',s:''},
    ];
    const byC={};rows.forEach(r=>{if(!byC[r.client])byC[r.client]={rv:0,mg:0,cnt:0};byC[r.client].rv+=r.revenue;byC[r.client].mg+=r.margin;byC[r.client].cnt++;});
    tableHTML=`<div class="twrap"><div class="thdr"><div class="tlbl">Klient variance</div></div>
    <table><thead><tr><th>Klient</th><th style="text-align:right">Daromad</th><th style="text-align:right">Marjin</th><th style="text-align:right">%</th><th>Ulush</th></tr></thead><tbody>
    ${Object.entries(byC).sort((a,b)=>b[1].rv-a[1].rv).map(([cl,v])=>{const sh=pct(v.rv,rv);return`
    <tr class="cr" onclick="showClientD('${cl}','${dirId}')">
      <td style="font-weight:500">${cl}</td>
      <td style="text-align:right;font-family:var(--mono);color:#17B374">${$$(v.rv)}</td>
      <td style="text-align:right;font-family:var(--mono);color:${v.mg>=0?dir.c:'#E83535'}">${$$(v.mg)}</td>
      <td style="text-align:right;font-family:var(--mono)">${v.rv>0?Math.round(v.mg/v.rv*100):0}%</td>
      <td><div style="height:3px;width:${sh}px;max-width:80px;background:${dir.c};border-radius:2px;display:inline-block"></div> ${sh}%</td>
    </tr>`;}).join('')}
    </tbody></table></div>
    <div class="twrap" style="margin-top:8px"><div class="thdr"><div class="tlbl">SKU variance</div></div>
    <table><thead><tr><th>SKU</th><th style="text-align:right">Daromad</th><th style="text-align:right">Marjin</th></tr></thead><tbody>
    ${(()=>{const bs={};rows.forEach(r=>{if(!bs[r.sku])bs[r.sku]={rv:0,mg:0};bs[r.sku].rv+=r.revenue;bs[r.sku].mg+=r.margin;});
    return Object.entries(bs).sort((a,b)=>b[1].rv-a[1].rv).map(([s,v])=>`
    <tr class="cr" onclick="showSkuD('${s}','${dirId}')"><td>${s}</td>
    <td style="text-align:right;font-family:var(--mono);color:#17B374">${$$(v.rv)}</td>
    <td style="text-align:right;font-family:var(--mono);color:${v.mg>=0?dir.c:'#E83535'}">${$$(v.mg)}</td></tr>`).join('');})()}
    </tbody></table></div>`;
  } else if(dirId==='exchange'){
    const rv=sk(rows,'rmb_to_usd'),uv=sk(rows,'usd_to_rmb'),sp=sk(rows,'spread'),ex=sk(rows,'expense'),nt=sk(rows,'net');
    const last=rows[rows.length-1]||{};
    kpis=[
      {id:'rmb',t:'RMB→USD hajmi',v:`¥${fS(rv)}`,c:'#D48C0A',m:'rmb_to_usd',s:`${rows.length} kun`},
      {id:'usd',t:'USD→RMB hajmi',v:$$(uv),c:'#4A7FF5',m:'usd_to_rmb',s:''},
      {id:'sp',t:'Jami spread',v:$$(sp),c:'#17B374',m:'spread',s:'Brutto foyda'},
      {id:'ex',t:'Xarajat',v:$$(ex),c:'#E83535',m:'expense',s:''},
      {id:'nt',t:'Sof foyda',v:$$(nt),c:dir.c,m:'net',s:''},
      {id:'cusd',t:'Kassa USD',v:$$(last.cash_usd||0),c:'#0DB5A0',m:'cash_usd',s:'Oxirgi kun'},
      {id:'ccny',t:'Kassa CNY',v:`¥${fS(last.cash_cny||0)}`,c:'#D48C0A',m:'cash_cny',s:'Oxirgi kun'},
    ];
    tableHTML=`<div class="twrap"><div class="thdr"><div class="tlbl">Kunlik konversiya tarixi</div></div>
    <table><thead><tr><th>Sana</th><th style="text-align:right">RMB→USD</th><th>Kurs</th><th style="text-align:right">USD→RMB</th><th style="text-align:right">Spread</th><th style="text-align:right">Net</th></tr></thead><tbody>
    ${rows.slice().reverse().map(r=>`<tr class="cr" onclick="showRow(${JSON.stringify({...r,_dir:'exchange'}).replace(/"/g,'&quot;')})">
      <td style="font-family:var(--mono);color:var(--t3)">${r.date?.slice(5)}</td>
      <td style="text-align:right;font-family:var(--mono)">¥${fS(r.rmb_to_usd)}</td>
      <td style="font-family:var(--mono);color:var(--t3)">${r.rmb_rate}</td>
      <td style="text-align:right;font-family:var(--mono)">${$$(r.usd_to_rmb)}</td>
      <td style="text-align:right;font-family:var(--mono);color:#17B374">${$$(r.spread)}</td>
      <td style="text-align:right;font-family:var(--mono);font-weight:600;color:${r.net>=0?dir.c:'#E83535'}">${$$(r.net)}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  } else if(dirId==='procurement'){
    const ov=sk(rows,'order_value'),cm=sk(rows,'commission'),ex=sk(rows,'expense'),nt=sk(rows,'net');
    const ac=rows.length?sk(rows,'commission_rate')/rows.length*100:0;
    kpis=[
      {id:'ov',t:'Buyurtma qiymati',v:$$(ov),c:dir.c,m:'order_value',s:`${rows.length} ta`},
      {id:'cm',t:'Komissiya',v:$$(cm),c:'#17B374',m:'commission',s:`O'rt: ${ac.toFixed(1)}%`},
      {id:'ex',t:'Xarajat',v:$$(ex),c:'#E83535',m:'expense',s:''},
      {id:'nt',t:'Sof foyda',v:$$(nt),c:'#4A7FF5',m:'net',s:''},
      {id:'ac',t:'Ort. komissiya',v:`${ac.toFixed(1)}%`,c:'#0DB5A0',m:'avg_cr',s:''},
    ];
    tableHTML=`<div class="twrap"><div class="thdr"><div class="tlbl">Tranzaksiyalar</div></div>
    <table><thead><tr><th>Klient</th><th>Kategoriya</th><th style="text-align:right">Buyurtma</th><th style="text-align:right">Komissiya</th><th style="text-align:right">Net</th><th>Sana</th></tr></thead><tbody>
    ${rows.slice().reverse().slice(0,12).map(r=>`<tr class="cr" onclick="showRow(${JSON.stringify({...r,_dir:'procurement'}).replace(/"/g,'&quot;')})">
      <td style="font-weight:500">${r.client}</td>
      <td><span class="bdg" style="background:${dir.c}18;color:${dir.c}">${r.sku}</span></td>
      <td style="text-align:right;font-family:var(--mono)">${$$(r.order_value)}</td>
      <td style="text-align:right;font-family:var(--mono);color:#17B374">${$$(r.commission)}</td>
      <td style="text-align:right;font-family:var(--mono);font-weight:600;color:${r.net>=0?dir.c:'#E83535'}">${$$(r.net)}</td>
      <td style="color:var(--t3);font-family:var(--mono)">${r.date?.slice(5)}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  } else {
    const dv=sk(rows,'div_in'),ln=sk(rows,'loan_in'),eo=sk(rows,'exp_out'),to=sk(rows,'tr_out');
    const nt=dv+ln-eo-to;
    kpis=[
      {id:'dv',t:'Dividend kirdi',v:$$(dv),c:'#17B374',m:'div_in',s:''},
      {id:'ln',t:'Qarz kirdi',v:$$(ln),c:'#4A7FF5',m:'loan_in',s:''},
      {id:'eo',t:'Xarajat chiqdi',v:$$(eo),c:'#E83535',m:'exp_out',s:''},
      {id:'to',t:'Perebroska',v:$$(to),c:'#D48C0A',m:'tr_out',s:''},
      {id:'nt',t:'Saldo',v:$$(nt),c:nt>=0?dir.c:'#E83535',m:'net',s:''},
    ];
    tableHTML=`<div class="twrap"><div class="thdr"><div class="tlbl">Kassa harakatlari</div></div>
    <table><thead><tr><th>Sana</th><th style="text-align:right">Div. kirdi</th><th style="text-align:right">Qarz</th><th style="text-align:right">Xarajat</th><th style="text-align:right">Perebroska</th><th>Kimga</th></tr></thead><tbody>
    ${rows.slice().reverse().map(r=>`<tr class="cr" onclick="showRow(${JSON.stringify({...r,_dir:'holding'}).replace(/"/g,'&quot;')})">
      <td style="font-family:var(--mono);color:var(--t3)">${r.date?.slice(5)}</td>
      <td style="text-align:right;font-family:var(--mono);color:#17B374">${r.div_in>0?$$(r.div_in):'—'}</td>
      <td style="text-align:right;font-family:var(--mono);color:#4A7FF5">${r.loan_in>0?$$(r.loan_in):'—'}</td>
      <td style="text-align:right;font-family:var(--mono);color:#E83535">${$$(r.exp_out)}</td>
      <td style="text-align:right;font-family:var(--mono);color:#D48C0A">${r.tr_out>0?$$(r.tr_out):'—'}</td>
      <td style="color:var(--t2)">${r.tr_to||r.div_from||'—'}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  }

  const ad=dys(PER);
  el.innerHTML=`
  <div class="dhdr">
    <button class="dbtn" onclick="goNav('l1')">← Orqaga</button>
    <span style="font-size:24px">${dir.e}</span>
    <div><div style="font-size:16px;font-weight:600">${dir.name}</div>
    <div style="font-size:11px;color:var(--t3)">${dir.d} · ${PER} kun</div></div>
    <span class="bdg" style="margin-left:auto;background:${dir.c}18;color:${dir.c};border:1px solid ${dir.c}33;font-size:12px;padding:4px 10px">${dir.s}</span>
  </div>
  <div class="kgrid">${kpis.map(k=>`
    <div class="kpi" onclick="showKD({id:'${k.id}',title:'${k.t}',color:'${k.c}',metric:'${k.m}',type:'kpi',dirId:'${dirId}'})">
      <div class="kpi-l">${k.t}</div><div class="kpi-v" style="color:${k.c}">${k.v}</div>
      <div class="kpi-s">${k.s}</div></div>`).join('')}</div>
  <div class="cgrid">
    <div class="cc" onclick="showKD({id:'d_main',title:'${dir.name} Kunlik Tahlil',color:'${dir.c}',type:'dir_chart',dirId:'${dirId}'})">
      <div class="cc-lbl">Kunlik dinamika</div><div style="height:200px"><canvas id="l2m"></canvas></div>
    </div>
    <div class="cc" onclick="showKD({id:'d_dist',title:'Taqsimot',color:'${dir.c}',type:'dir_dist',dirId:'${dirId}'})">
      <div class="cc-lbl">${dirId==='cargo'||dirId==='logistics'?'Klient ulushi':dirId==='procurement'?'SKU ulushi':'Taqsimot'}</div>
      <div style="height:200px"><canvas id="l2d"></canvas></div>
    </div>
  </div>
  ${tableHTML}`;

  setTimeout(()=>{
    if(dirId==='cargo'||dirId==='logistics'){
      const rows2=fil(dirId);
      const ag={};rows2.forEach(r=>{if(!ag[r.date])ag[r.date]={rv:0,cg:0,mg:0};ag[r.date].rv+=r.revenue;ag[r.date].cg+=r.cogs;ag[r.date].mg+=r.margin;});
      const aa=ad.map(d=>ag[d]||{rv:0,cg:0,mg:0});
      mkC('l2m',{type:'bar',data:{labels:ad.map(d=>d.slice(5)),datasets:[
        {label:'Daromad',data:aa.map(a=>a.rv),backgroundColor:'#17B37488',borderRadius:3},
        {label:'COGS',data:aa.map(a=>a.cg),backgroundColor:'#E8353588',borderRadius:3},
        {label:'Marjin',data:aa.map(a=>a.mg),backgroundColor:dir.c+'88',borderRadius:3},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});
      const bc={};rows2.forEach(r=>{if(!bc[r.client])bc[r.client]=0;bc[r.client]+=r.revenue;});
      const ce=Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,6);
      mkC('l2d',{type:'doughnut',data:{labels:ce.map(e=>e[0]),datasets:[{data:ce.map(e=>e[1]),backgroundColor:['#4A7FF5','#17B374','#D48C0A','#7B55F5','#E8652A','#0DB5A0'].map(c=>c+'99'),borderWidth:1,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:{...TIP,callbacks:{label:c=>`${c.label}: ${$$(c.raw)}`}}},cutout:'55%'}});
    } else if(dirId==='exchange'){
      const rows2=fil(dirId);
      mkC('l2m',{type:'line',data:{labels:rows2.map(r=>r.date.slice(5)),datasets:[
        {label:'Spread',data:rows2.map(r=>r.spread),borderColor:'#17B374',tension:.4,pointRadius:0,borderWidth:2},
        {label:'Net',data:rows2.map(r=>r.net),borderColor:dir.c,tension:.4,pointRadius:0,borderWidth:2},
        {label:'Xarajat',data:rows2.map(r=>r.expense),borderColor:'#E83535',borderDash:[4,2],tension:.4,pointRadius:0,borderWidth:1.5},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});
      mkC('l2d',{type:'bar',data:{labels:rows2.map(r=>r.date.slice(5)),datasets:[
        {label:'RMB→USD',data:rows2.map(r=>r.rmb_to_usd),backgroundColor:'#D48C0A88',borderRadius:3},
        {label:'USD→RMB',data:rows2.map(r=>r.usd_to_rmb),backgroundColor:'#4A7FF588',borderRadius:3},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:{...TIP,callbacks:{label:c=>`${c.dataset.label}: ${fS(c.raw)}`}}},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>fS(v)},grid:GR}}}});
    } else if(dirId==='procurement'){
      const rows2=fil(dirId);
      const ag={};rows2.forEach(r=>{if(!ag[r.date])ag[r.date]={ov:0,cm:0};ag[r.date].ov+=r.order_value;ag[r.date].cm+=r.commission;});
      const aa=ad.map(d=>ag[d]||{ov:0,cm:0});
      mkC('l2m',{type:'bar',data:{labels:ad.map(d=>d.slice(5)),datasets:[
        {label:'Buyurtma',data:aa.map(a=>a.ov),backgroundColor:dir.c+'55',borderRadius:3},
        {label:'Komissiya',data:aa.map(a=>a.cm),backgroundColor:'#17B37488',borderRadius:3},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});
      const bs={};rows2.forEach(r=>{if(!bs[r.sku])bs[r.sku]=0;bs[r.sku]+=r.order_value;});
      const se=Object.entries(bs).sort((a,b)=>b[1]-a[1]);
      mkC('l2d',{type:'doughnut',data:{labels:se.map(e=>e[0]),datasets:[{data:se.map(e=>e[1]),backgroundColor:['#7B55F5','#4A7FF5','#17B374','#D48C0A','#E8652A'].map(c=>c+'99'),borderWidth:1,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:{...TIP,callbacks:{label:c=>`${c.label}: ${$$(c.raw)}`}}},cutout:'55%'}});
    } else {
      const rows2=fil(dirId);
      const ag={};rows2.forEach(r=>{if(!ag[r.date])ag[r.date]={dv:0,ln:0,eo:0,to:0};ag[r.date].dv+=r.div_in;ag[r.date].ln+=r.loan_in;ag[r.date].eo+=r.exp_out;ag[r.date].to+=r.tr_out;});
      const aa=ad.map(d=>ag[d]||{dv:0,ln:0,eo:0,to:0});
      mkC('l2m',{type:'bar',data:{labels:ad.map(d=>d.slice(5)),datasets:[
        {label:'Div. kirdi',data:aa.map(a=>a.dv),backgroundColor:'#17B37488',borderRadius:3},
        {label:'Qarz',data:aa.map(a=>a.ln),backgroundColor:'#4A7FF588',borderRadius:3},
        {label:'Xarajat',data:aa.map(a=>-a.eo),backgroundColor:'#E8353588',borderRadius:3},
        {label:'Perebroska',data:aa.map(a=>-a.to),backgroundColor:'#D48C0A88',borderRadius:3},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});
      const rows3=fil(dirId);
      mkC('l2d',{type:'doughnut',data:{labels:['Div. kirdi','Qarz','Xarajat','Perebroska'],datasets:[{data:[sk(rows3,'div_in'),sk(rows3,'loan_in'),sk(rows3,'exp_out'),sk(rows3,'tr_out')],backgroundColor:['#17B37488','#4A7FF588','#E8353588','#D48C0A88'],borderColor:['#17B374','#4A7FF5','#E83535','#D48C0A'],borderWidth:1,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:{...TIP,callbacks:{label:c=>`${c.label}: ${$$(c.raw)}`}}},cutout:'55%'}});
    }
  },40);
}

// ════════════════════════════════════════════
// L3 — KPI DETAIL
// ════════════════════════════════════════════
function showKD(kpi){
  DRILL.kpi=kpi;
  const dirId=kpi.dirId||DRILL.dir;
  const dir=DIRS.find(d=>d.id===dirId)||{name:'Holding',c:'#4A7FF5',e:'🏦'};
  const rows=dirId?fil(dirId):[];
  const ad=dys(PER);
  let dv=[];

  if(kpi.metric&&dirId){
    const ag={};rows.forEach(r=>{if(!ag[r.date])ag[r.date]=0;ag[r.date]+=(+r[kpi.metric]||0);});
    dv=ad.map(d=>ag[d]||0);
  } else if(kpi.type==='holding'){
    dv=ad.map(date=>{let v=0;DIRS.forEach(d=>{const rw=(DATA[d.id]||[]).filter(r=>r.date===date);
      if(kpi.metric==='revenue'){if(d.id==='cargo'||d.id==='logistics')v+=sk(rw,'revenue');else if(d.id==='exchange')v+=sk(rw,'spread');else if(d.id==='procurement')v+=sk(rw,'commission');else v+=sk(rw,'div_in');}
      else if(kpi.metric==='profit'){if(d.id==='cargo'||d.id==='logistics')v+=sk(rw,'margin');else if(d.id==='exchange')v+=sk(rw,'net');else if(d.id==='procurement')v+=sk(rw,'net');else v+=sk(rw,'div_in')-sk(rw,'exp_out');}
    });return v;});
  } else {dv=ad.map(()=>rnd(1000,10000));}

  const avg=dv.length?Math.round(dv.reduce((a,b)=>a+b,0)/dv.length):0;
  const total=dv.reduce((a,b)=>a+b,0);
  const maxV=Math.max(...dv,1),minV=Math.min(...dv);
  const prevRows=(DATA[dirId]||[]).filter(r=>dys(PER*2).slice(0,PER).includes(r.date));
  const prevAg={};prevRows.forEach(r=>{if(!prevAg[r.date])prevAg[r.date]=0;prevAg[r.date]+=(+r[kpi.metric||'revenue']||0);});
  const pv=dys(PER*2).slice(0,PER).map(d=>prevAg[d]||0);
  const pTotal=pv.reduce((a,b)=>a+b,0);
  const chg=pTotal>0?Math.round((total-pTotal)/pTotal*100):0;

  // Tranzaksiyalar jadvalini oldin hisoblash (IIFE dan qochish uchun)
  var allRawRows = dirId
    ? fil(dirId).map(function(r){return Object.assign({},r,{_rowDir:dirId});})
    : DIRS.reduce(function(acc,d){
        return acc.concat(fil(d.id).map(function(r){return Object.assign({},r,{_rowDir:d.id});}));
      },[]);
  allRawRows.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
  var showDirCol = !dirId;

  var txTableHTML = '<div class="twrap"><div class="thdr"><div class="tlbl">Tranzaksiyalar detali</div>'
    +'<div style="font-size:11px;color:var(--t3);font-family:var(--mono)">'+allRawRows.length+' ta yozuv</div></div>'
    +'<div style="overflow-x:auto"><table><thead><tr>'
    +'<th>Sana</th>'+(showDirCol?'<th>Yo\'nalish</th>':'')
    +'<th>Klient</th><th>Kategoriya</th>'
    +'<th style="text-align:right">Qiymat</th>'
    +'<th style="text-align:right">Foyda/Zarar</th>'
    +'<th>Status</th><th>Izoh</th>'
    +'</tr></thead><tbody>';

  allRawRows.forEach(function(r){
    var rd=r._rowDir;
    var dc=DIRS.find(function(x){return x.id===rd;})||dir;
    var cat='—', mainVal=0, profit=0, statusOk=true, statusLabel='', statusColor='', clientTxt='';
    if(rd==='cargo'||rd==='logistics'){
      cat=r.sku||'—'; mainVal=r.revenue||0; profit=r.margin||0; clientTxt=r.client||'—';
      statusOk=profit>=0; statusLabel=profit>=0?'Foydali':'Zarar'; statusColor=profit>=0?'#00E5A0':'#FF4D6A';
    } else if(rd==='exchange'){
      cat='RMB↔USD'; mainVal=r.spread||0; profit=r.net||0;
      statusOk=profit>=0; statusLabel=profit>=0?'Foydali':'Zarar'; statusColor=profit>=0?'#00E5A0':'#FF4D6A';
    } else if(rd==='procurement'){

function showRow(row){
  if(typeof row==='string')row=JSON.parse(row);
  DRILL.row=row;
  const dirId=row._dir||DRILL.dir;
  const dir=DIRS.find(d=>d.id===dirId)||{name:'Holding',c:'#4A7FF5',e:'📋'};
  ['l1','l2','l3','l4'].forEach(function(l){var p=document.getElementById('pg-'+l);p.classList.remove('on');p.style.display='';});
  const el=document.getElementById('pg-l4');
  el.classList.add('on');
  const labels={date:'Sana',client:'Klient',sku:'Xizmat/SKU',revenue:'Daromad',cogs:'COGS',expense:'Xarajat',margin:'Marjin',
    rmb_to_usd:'RMB→USD',rmb_rate:'Kurs(RMB)',usd_to_rmb:'USD→RMB',usd_rate:'Kurs(USD)',spread:'Spread',net:'Sof foyda',
    cash_usd:'Kassa USD',cash_cny:'Kassa CNY',order_value:'Buyurtma',commission_rate:'Komissiya%',commission:'Komissiya',
    div_in:'Div. kirdi',div_from:'Kimdan',loan_in:'Qarz kirdi',exp_out:'Xarajat',tr_out:'Perebroska',tr_to:'Kimga',bank_usd:'Bank USD',
    note:'Izoh/Sabab'};
  const amtK=['revenue','cogs','expense','margin','spread','net','cash_usd','cash_cny','order_value','commission','div_in','loan_in','exp_out','tr_out','bank_usd'];
  const sdRows=(DATA[dirId]||[]).filter(function(r){return r.date===row.date&&r!==row;}).slice(0,4);

  // Rahbariyat xulosasi uchun hisoblar
  var kimga='—', nima='—', xarajat=0, daromad=0, natija=0;
  if(dirId==='cargo'||dirId==='logistics'){
    kimga=row.client||'—';
    nima=row.note||((row.sku||'')+' xizmati');
    xarajat=(row.cogs||0)+(row.expense||0);
    daromad=row.revenue||0;
    natija=row.margin||0;
  } else if(dirId==='exchange'){
    kimga='Valyuta bozori';
    nima=row.note||'Valyuta almashtirish operatsiyasi';
    xarajat=row.expense||0;
    daromad=row.spread||0;
    natija=row.net||0;
  } else if(dirId==='procurement'){
    kimga=row.client||'—';
    nima=row.note||((row.sku||'')+' xaridi');
    xarajat=row.expense||0;
    daromad=row.commission||0;
    natija=row.net||0;
  } else {
    kimga=row.tr_to||row.div_from||'Holding kassa';
    nima=row.note||(row.div_in>0?'Dividend olindi':row.tr_out>0?'Perebroska':'Xarajat');
    xarajat=(row.exp_out||0)+(row.tr_out||0);
    daromad=(row.div_in||0)+(row.loan_in||0);
    natija=daromad-xarajat;
  }
  var natijaTxt = natija>=0?'Foydali / Musbat':'Zarar / Manfiy';
  var natijaColor = natija>=0?'#00E5A0':'#FF4D6A';
  var nisbat = (daromad>0&&xarajat>0) ? 'Nisbat: '+(daromad/xarajat).toFixed(2)+'x' : '';

  // Rahbariyat xulosasi HTML (string concat — nested template yoqil)
  var summaryHTML = '<div class="card" style="margin-bottom:14px;border-left:3px solid '+dir.c+'">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">'
    +'<span style="font-size:18px">📋</span>'
    +'<div style="font-size:13px;font-weight:600">Rahbariyat Xulosasi</div>'
    +'<span style="margin-left:auto;padding:3px 10px;border-radius:999px;font-size:11px;font-family:var(--mono);background:'+natijaColor+'18;color:'+natijaColor+';border:1px solid '+natijaColor+'44">'+(natija>=0?'▲':'▼')+' '+natijaTxt+'</span>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">'
    +'<div style="background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--b1)">'
    +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">🔍 Nima uchun?</div>'
    +'<div style="font-size:13px;font-weight:500;line-height:1.4">'+nima+'</div></div>'
    +'<div style="background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--b1)">'
    +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">👤 Kimga / Kimdan?</div>'
    +'<div style="font-size:13px;font-weight:500">'+kimga+'</div>'
    +'<div style="font-size:10px;color:var(--t3);margin-top:2px">'+dir.name+' · '+(row.date||'')+'</div></div>'
    +'<div style="background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--b1)">'
    +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">💸 Xarajat qilindi</div>'
    +'<div style="font-size:18px;font-weight:700;font-family:var(--mono);color:#FF4D6A">'+$$(xarajat)+'</div>'
    +(daromad>0?'<div style="font-size:10px;color:#00E5A0;margin-top:2px">Daromad: '+$$(daromad)+'</div>':'')
    +'</div>'
    +'<div style="background:var(--bg);border-radius:8px;padding:12px;border:1px solid var(--b1)">'
    +'<div style="font-size:10px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">📊 Natija</div>'
    +'<div style="font-size:18px;font-weight:700;font-family:var(--mono);color:'+natijaColor+'">'+(natija>=0?'+':'')+$$(natija)+'</div>'
    +'<div style="font-size:10px;color:var(--t3);margin-top:2px">'+nisbat+'</div></div>'
    +'</div></div>';

  // Barcha maydonlar HTML
  var fieldsHTML = Object.entries(row).filter(function(e){
    var k=e[0]; return !k.startsWith('_')&&row[k]!==undefined&&row[k]!==null&&row[k]!=='';
  }).map(function(e){
    var k=e[0],v=e[1];
    var lbl=labels[k]||k;
    var isA=amtK.includes(k), isR=k.includes('rate');
    var col=isA?(+v>=0?'#17B374':'#E83535'):'var(--t1)';
    var disp=isA?$$(+v):isR?((+v)*100).toFixed(2)+'%':v;
    return '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--b1)">'
      +'<div style="color:var(--t3);font-size:12px">'+lbl+'</div>'
      +'<div style="font-family:var(--mono);font-weight:500;color:'+col+'">'+disp+'</div></div>';
  }).join('');

  // Boshqa yozuvlar HTML
  var sdHTML = sdRows.length ? sdRows.map(function(r){
    var safeR=JSON.stringify(Object.assign({},r,{_dir:dirId})).replace(/"/g,'&quot;');
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b1);cursor:pointer" onclick="showRow('+safeR+')">'
      +'<div><div style="font-size:12px;font-weight:500">'+(r.client||r.sku||'—')+'</div>'
      +'<div style="font-size:10px;color:var(--t3)">'+(r.note||r.sku||'')+'</div></div>'
      +'<div style="font-family:var(--mono);font-size:12px;color:'+dir.c+'">'+$$(r.margin||r.net||r.commission||0)+'</div></div>';
  }).join('') : '<div style="color:var(--t3);font-size:12px">Boshqa yozuv yo\'q</div>';

  var backFn2 = dirId ? "renderL2('"+dirId+"')" : "goNav('l1')";

  el.innerHTML = summaryHTML
    + '<div class="dhdr">'
    + '<button class="dbtn" onclick="goBack()">← Orqaga</button>'
    + '<span style="font-size:24px">'+dir.e+'</span>'
    + '<div><div style="font-size:15px;font-weight:600">Tranzaksiya detali</div>'
    + '<div style="font-size:11px;color:var(--t3)">'+dir.name+' · '+(row.date||'')+(row.client?' · '+row.client:'')+'</div></div></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    + '<div class="card">'
    + '<div class="slbl" style="margin-bottom:10px">Barcha ma\'lumotlar</div>'
    + fieldsHTML
    + (row.note ? '<div style="margin-top:10px;padding:10px;background:var(--bg);border-radius:6px;border-left:3px solid '+dir.c+'">'
        +'<div style="font-size:10px;color:var(--t3);margin-bottom:4px">📝 IZOH / SABAB</div>'
        +'<div style="font-size:12px;line-height:1.5">'+row.note+'</div></div>' : '')
    + '</div>'
    + '<div>'
    + '<div class="card" style="margin-bottom:10px">'
    + '<div class="slbl" style="margin-bottom:8px">Shu kungi boshqa yozuvlar</div>'
    + sdHTML
    + '</div>'
    + '<div class="card">'
    + '<div class="slbl" style="margin-bottom:8px">Tezkor navigatsiya</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px">'
    + '<button class="dbtn" style="text-align:left" onclick="'+backFn2+'">← '+dir.name+' dashboardiga</button>'
    + '<button class="dbtn" style="text-align:left" onclick="goNav(\'l1\')">← Holding overviewga</button>'
    + '<button class="dbtn" style="text-align:left;color:var(--acc)" onclick="toast(\'Excel eksport tez orada!\')">↓ Excel eksport</button>'
    + '</div></div></div></div>';
}

function goBack(){
  if(DRILL.kpi) goToL3();
  else if(DRILL.dir) renderL2(DRILL.dir);
  else goNav('l1');
}
function goToL3(){
  document.getElementById('pg-l4').classList.remove('on');
  document.getElementById('pg-l3').classList.add('on');
}
function showDayD(date,dirId){
  const rows=(DATA[dirId]||[]).filter(r=>r.date===date);
  if(rows.length)showRow({...rows[0],_dir:dirId});
}

function showClientD(client,dirId){

function showSkuD(sku,dirId){

}

    tbl += '<tr style="background:' + bg + ';">';
    tbl += '<td style="padding:8px 12px;color:var(--fg,#e0eaff);">' + d.id + '</td>';
    tbl += '<td style="padding:8px 12px;color:var(--muted,#8899aa);">' + d.contract + '</td>';
    tbl += '<td style="padding:8px 12px;color:var(--fg,#e0eaff);">' + d.client + '</td>';
    tbl += '<td style="padding:8px 12px;color:var(--muted,#8899aa);">' + d.product + '</td>';
    tbl += '<td style="padding:8px 12px;color:var(--fg,#e0eaff);font-weight:600;">$' + d.total.toLocaleString() + '</td>';
    tbl += '<td style="padding:8px 12px;color:#00E5A0;">$' + d.paid.toLocaleString() + '</td>';
    tbl += '<td style="padding:8px 12px;color:#FF7A50;">$' + rem.toLocaleString() + '</td>';
    tbl += '<td style="padding:8px 12px;"><span style="background:' + stageColor + ';color:#fff;border-radius:6px;padding:2px 8px;font-size:11px;">' + d.stage + '</span></td>';
    tbl += '<td style="padding:8px 12px;color:var(--muted,#8899aa);">' + d.manager + '</td>';
    tbl += '<td style="padding:8px 12px;color:var(--muted,#8899aa);">' + d.date + '</td>';
    var statusColor = d.stage === "To'landi" ? '#C6EFCE' : (d.stage === 'Jarayonda' ? '#FFEB9C' : '#ddd');
    tbl += '<td style="padding:8px 12px;"><span style="background:' + statusColor + ';color:#333;border-radius:6px;padding:2px 8px;font-size:11px;">' + d.stage + '</span></td>';
    tbl += '</tr>';
  });
  tbl += '</tbody></table></div>';

  el.innerHTML = '<div style="padding:20px;">'
    + '<h2 style="color:var(--fg,#e0eaff);margin-bottom:20px;">📈 Sales Pipeline</h2>'
    + cards

    + tbl
    + '</div>';
}

// P&L + 3-STATEMENT MODEL
// ════════════════════════════════════════════
function renderPL(){
  const el=document.getElementById('pg-l1');el.classList.add('on');
  setBc([{lbl:'Holding',fn:'goNav("l1")'},{lbl:'P&L Hisobot',fn:''}]);

  // Get direction filter
  const dir = CUR_USER && CUR_USER.role !== 'owner' ? CUR_USER.direction : null;

  // Generate P&L data from existing DATA
  const dirs = dir ? [DIRS.find(d=>d.id===dir)] : DIRS;

  const plData = dirs.map(d=>{
    const rows = fil(d.id);
    let rev=0, cogs=0, opex=0, da=0, interest=0, tax=0;

    if(d.id==='cargo'||d.id==='logistics'){
      rev = sk(rows,'revenue');
      cogs = sk(rows,'cogs');
      opex = sk(rows,'expense');
      da = rev * 0.02; // 2% depreciation estimate
      interest = 0;
      tax = Math.max(0, (rev-cogs-opex-da)*0.12); // 12% tax
    } else if(d.id==='exchange'){
      rev = sk(rows,'spread');
      cogs = 0;
      opex = sk(rows,'expense');
      da = 0;
      tax = Math.max(0, (rev-opex)*0.12);
    } else if(d.id==='procurement'){
      rev = sk(rows,'commission');
      cogs = 0;
      opex = sk(rows,'expense');
      da = 0;
      tax = Math.max(0, (rev-opex)*0.12);
    } else {
      rev = sk(rows,'div_in') + sk(rows,'loan_in');
      cogs = 0;
      opex = sk(rows,'exp_out');
      da = 0;
      tax = 0;
    }

    const gp = rev - cogs;
    const gpPct = rev > 0 ? (gp/rev*100).toFixed(1) : 0;
    const ebitda = gp - opex;
    const ebitdaPct = rev > 0 ? (ebitda/rev*100).toFixed(1) : 0;
    const ebit = ebitda - da;
    const ebt = ebit - interest;
    const netIncome = ebt - tax;
    const netPct = rev > 0 ? (netIncome/rev*100).toFixed(1) : 0;

    return {dir:d, rev, cogs, gp, gpPct, opex, ebitda, ebitdaPct, da, ebit, interest, tax, ebt, netIncome, netPct};
  });

  const totalRev = plData.reduce((s,d)=>s+d.rev,0);
  const totalNet = plData.reduce((s,d)=>s+d.netIncome,0);
  const totalGP = plData.reduce((s,d)=>s+d.gp,0);
  const totalEBITDA = plData.reduce((s,d)=>s+d.ebitda,0);

  // Waterfall chart data
  const wfData = [
    {lbl:'Daromad', val:totalRev, c:'#00E5A0'},
    {lbl:'COGS', val:-plData.reduce((s,d)=>s+d.cogs,0), c:'#FF4D6A'},
    {lbl:'Gross Profit', val:totalGP, c:'#6C8EFF', isTotal:true},
    {lbl:'OpEx', val:-plData.reduce((s,d)=>s+d.opex,0), c:'#FF4D6A'},
    {lbl:'EBITDA', val:totalEBITDA, c:'#FFB830', isTotal:true},
    {lbl:'D&A', val:-plData.reduce((s,d)=>s+d.da,0), c:'#FF7A50'},
    {lbl:'EBIT', val:plData.reduce((s,d)=>s+d.ebit,0), c:'#A78BFF', isTotal:true},
    {lbl:'Soliq', val:-plData.reduce((s,d)=>s+d.tax,0), c:'#FF4D6A'},
    {lbl:'Net Income', val:totalNet, c: totalNet>=0?'#00E5A0':'#FF4D6A', isTotal:true},
  ];

  el.innerHTML = `
  <!-- SUMMARY KPIs -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:16px">
    ${[
      {l:'Revenue',v:$$(totalRev),c:'#00E5A0'},
      {l:'Gross Profit',v:$$(totalGP),c:'#6C8EFF',s:`${totalRev>0?(totalGP/totalRev*100).toFixed(1):0}% marjin`},
      {l:'EBITDA',v:$$(totalEBITDA),c:'#FFB830',s:`${totalRev>0?(totalEBITDA/totalRev*100).toFixed(1):0}% marjin`},
      {l:'Net Income',v:$$(totalNet),c:totalNet>=0?'#00E5A0':'#FF4D6A',s:`${totalRev>0?(totalNet/totalRev*100).toFixed(1):0}% marjin`},
    ].map(k=>`
    <div class="kpi">
      <div class="kpi-l">${k.l}</div>
      <div class="kpi-v" style="color:${k.c}">${k.v}</div>
      ${k.s?`<div class="kpi-s">${k.s}</div>`:''}
    </div>`).join('')}
  </div>

  <!-- P&L WATERFALL + PIE -->
  <div class="cgrid" style="margin-bottom:14px">
    <div class="cc">
      <div class="cc-lbl">P&L Waterfall — daromaddan sof foydagacha</div>
      <div style="height:240px"><canvas id="pl_wf"></canvas></div>
    </div>
    <div class="cc">
      <div class="cc-lbl">Xarajat tarkibi</div>
      <div style="height:240px"><canvas id="pl_pie"></canvas></div>
    </div>
  </div>

  <!-- DETAILED P&L TABLE -->
  <div class="twrap" style="margin-bottom:14px">
    <div class="thdr"><div class="tlbl">To'liq P&L Hisobot — yo'nalishlar kesimida</div></div>
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th style="min-width:160px">Ko'rsatkich</th>
          ${plData.map(d=>`<th style="text-align:right;color:${d.dir.c}">${d.dir.e} ${d.dir.name}</th>`).join('')}
          ${plData.length>1?'<th style="text-align:right;color:var(--t2)">JAMI</th>':''}
        </tr>
      </thead>
      <tbody>
        ${[
          {lbl:'💰 Revenue (Daromad)', key:'rev', c:'#00E5A0', bold:true},
          {lbl:'  Minus: COGS', key:'cogs', c:'#FF4D6A', neg:true},
          {lbl:'📊 Gross Profit (GP)', key:'gp', c:'#6C8EFF', bold:true, pct:'gpPct'},
          {lbl:'  Minus: OpEx', key:'opex', c:'#FF4D6A', neg:true},
          {lbl:'📈 EBITDA', key:'ebitda', c:'#FFB830', bold:true, pct:'ebitdaPct'},
          {lbl:'  Minus: D&A', key:'da', c:'#FF7A50', neg:true},
          {lbl:'⚡ EBIT', key:'ebit', c:'#A78BFF', bold:true},
          {lbl:'  Minus: Foiz', key:'interest', c:'#FF4D6A', neg:true},
          {lbl:'📋 EBT', key:'ebt', c:'#94A3C4', bold:true},
          {lbl:'  Minus: Soliq (12%)', key:'tax', c:'#FF4D6A', neg:true},
          {lbl:'✅ Net Income', key:'netIncome', c:'var(--grn)', bold:true, pct:'netPct'},
        ].map(row=>{
          const total = plData.reduce((s,d)=>s+d[row.key],0);
          return `<tr style="${row.bold?'border-top:1px solid var(--b2);background:rgba(255,255,255,0.02)':''}">
            <td style="font-size:12px;${row.bold?'font-weight:600':'color:var(--t3)'}">${row.lbl}</td>
            ${plData.map(d=>{
              const v = d[row.key];
              const pctVal = row.pct ? d[row.pct] : null;
              return `<td style="text-align:right;font-family:var(--mono);font-size:12px;color:${v<0?'#FF4D6A':row.c}${row.bold?';font-weight:600':''}">
                ${row.neg && v>0 ? '-' : ''}${$$(Math.abs(v))}
                ${pctVal?`<span style="font-size:10px;color:var(--t3);margin-left:4px">${pctVal}%</span>`:''}
              </td>`;
            }).join('')}
            ${plData.length>1?`<td style="text-align:right;font-family:var(--mono);font-size:12px;color:${total<0?'#FF4D6A':row.c}${row.bold?';font-weight:700':''}">
              ${row.neg && total>0 ? '-' : ''}${$$(Math.abs(total))}
            </td>`:''}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>

  <!-- MARGIN TRENDS -->
  <div class="cgrid">
    <div class="cc">
      <div class="cc-lbl">Kunlik daromad va sof foyda trendi</div>
      <div style="height:200px"><canvas id="pl_trend"></canvas></div>

          borderRadius:4,

      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...TIP,callbacks:{label:c=>`${c.label}: ${$$(c.raw)}`}}},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}
    });

    // Expense pie
    const expData = [
      {l:'COGS', v:plData.reduce((s,d)=>s+d.cogs,0), c:'#FF4D6A'},
      {l:'OpEx', v:plData.reduce((s,d)=>s+d.opex,0), c:'#FFB830'},

    // Trend chart

        else if(id==='exchange') v+=sk(rw,'spread');

        else if(id==='holding') v+=sk(rw,'div_in')+sk(rw,'loan_in');

      return v;
    });
    const trendNet = trendRev.map(r=>r*0.15); // simplified net
    mkC('pl_trend',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[
      {label:'Revenue',data:trendRev,borderColor:'#00E5A0',backgroundColor:'#00E5A015',fill:true,tension:.4,pointRadius:0,borderWidth:2},
      {label:'Net Income',data:trendNet,borderColor:'#6C8EFF',tension:.4,pointRadius:0,borderWidth:2},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});

    // Margin chart
    const gpPcts = ad.map(date=>{
      let r=0,c=0;
      (dir?[dir]:DIRS.map(d=>d.id)).forEach(id=>{
        const rw=(DATA[id]||[]).filter(r=>r.date===date);
        if(id==='cargo'||id==='logistics'){r+=sk(rw,'revenue');c+=sk(rw,'cogs');}
        else if(id==='exchange') r+=sk(rw,'spread');
        else if(id==='procurement') r+=sk(rw,'commission');
        else if(id==='holding') r+=sk(rw,'div_in')+sk(rw,'loan_in');
      });
      return r>0?Math.round((r-c)/r*100):0;
    });
    mkC('pl_margin',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[
      {label:'GP Margin %',data:gpPcts,borderColor:'#6C8EFF',tension:.4,pointRadius:0,borderWidth:2},
      {label:'Net Margin %',data:gpPcts.map(v=>Math.round(v*0.35)),borderColor:'#00E5A0',tension:.4,pointRadius:0,borderWidth:1.5,borderDash:[4,2]},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:LG,tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>v+'%'},grid:GR}}}});
  },50);
}

  ${DIRS.map(d=>{

  const iArr=ad.map(d=>{const fd=r=>r.date===d;return sk(c.filter(fd),'revenue')+sk(l.filter(fd),'revenue')+sk(e.filter(fd),'spread')+sk(p.filter(fd),'commission')+sk(h.filter(fd),'div_in');});

  let cum=0;const cumArr=iArr.map((v,i)=>{cum+=v+oArr[i];return cum;});

  el.innerHTML=`
  <div class="kgrid">
    <div class="kpi" onclick="showKD({id:'cf_in',title:'Jami Inflow',color:'#17B374',type:'cf'})"><div class="kpi-l">Jami kirish (inflow)</div><div class="kpi-v" style="color:#17B374">${$$(inflow)}</div></div>

  </div>
  <div class="card" style="margin-bottom:10px"><div class="cc-lbl">Kunlik kirish / chiqish</div><div style="height:220px"><canvas id="cf_bar"></canvas></div></div>
  <div class="card" style="margin-bottom:10px"><div class="cc-lbl">Kümülatif naqd pozitsiya</div><div style="height:180px"><canvas id="cf_area"></canvas></div></div>
  <div class="twrap"><div class="thdr"><div class="tlbl">Perebroska jadvali</div></div>
  <table><thead><tr><th>Sana</th><th>Kimdan</th><th>Kimga</th><th style="text-align:right">Miqdor</th></tr></thead><tbody>
  ${h.filter(r=>r.tr_out>0).map(r=>`<tr class="cr" onclick="showRow(${JSON.stringify({...r,_dir:'holding'}).replace(/"/g,'&quot;')})">
    <td style="font-family:var(--mono);color:var(--t3)">${r.date?.slice(5)}</td>

    mkC('cf_area',{type:'line',data:{labels:ad.map(d=>d.slice(5)),datasets:[{label:'Saldo',data:cumArr,borderColor:'#0DB5A0',backgroundColor:'rgba(13,181,160,.1)',fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:TIP},scales:{x:{ticks:TX,grid:GR},y:{ticks:{...TX,callback:v=>`$${fS(v)}`},grid:GR}}}});
  },40);
}
